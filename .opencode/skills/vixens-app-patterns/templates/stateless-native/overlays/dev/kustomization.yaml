---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

components:
  - ../../../../_shared/components/base
  - ../../../../_shared/components/probes/basic

patches:
  # Dev: replicas=0 (disabled by default)
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: any
      spec:
        replicas: 0
    target:
      kind: Deployment

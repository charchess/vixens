---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: APP_NAME
  labels:
    vixens.io/sizing-v2: "true"
    vixens.io/vpa-mode: Auto
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: APP_NAME
  template:
    metadata:
      labels:
        app: APP_NAME
        vixens.io/sizing.APP_NAME: "V-nano"
      annotations:
        vixens.io/nometrics: "true"
        vixens.io/fast-start: "true"
        goldilocks.fairwinds.com/enabled: "true"
        autoscaling.k8s.io/vpa: "true"
    spec:
      priorityClassName: vixens-medium
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: APP_NAME
          image: IMAGE_REGISTRY/IMAGE_NAME:IMAGE_TAG
          ports:
            - name: http
              containerPort: 80
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

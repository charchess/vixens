---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: NAMESPACE_NAME

resources:
  - ../../base

components:
  - ../../../../_shared/components/gold-maturity
  - ../../../../_shared/components/base
  - ../../../../_shared/components/resources
  - ../../../../_shared/components/poddisruptionbudget/0
  - ../../../../_shared/components/priority/medium
  - ../../../../_shared/components/revision-history-limit

patches:
  # Prod: envSlug override
  - patch: |
      apiVersion: secrets.infisical.com/v1alpha1
      kind: InfisicalSecret
      metadata:
        name: any
      spec:
        authentication:
          universalAuth:
            secretsScope:
              envSlug: prod
    target:
      kind: InfisicalSecret

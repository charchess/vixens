---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: NAMESPACE_NAME

resources:
  - ../../base

components:
  - ../../../../_shared/components/revision-history-limit

patches:
  # Gold-maturity annotations via JSON patches
  # (Helm chart may not support deploymentAnnotations)
  - patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: "10"
      - op: add
        path: /metadata/annotations/goldilocks.fairwinds.com~1enabled
        value: "true"
      - op: add
        path: /metadata/annotations/vpa.kubernetes.io~1updateMode
        value: "Off"
    target:
      kind: Deployment
      name: APP_NAME

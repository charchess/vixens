---
name: Validate & Security

on:
  push:
    branches: [dev, main]
  pull_request:

jobs:
  # 1️⃣ Validation YAML robuste
  yaml-lint:
    name: YAML Syntax & Style
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup yamllint
        run: |
          sudo apt-get update && sudo apt-get install -y yamllint

      - name: Validate YAML syntax
        run: |
          echo "🔍 Validation YAML syntax"

          # Création du fichier ligne par ligne
          echo "---" > yamllint-config.yml
          echo "extends: default" >> yamllint-config.yml
          echo "" >> yamllint-config.yml
          echo "yaml-files:" >> yamllint-config.yml
          echo "  - '*.yaml'" >> yamllint-config.yml
          echo "  - '*.yml'" >> yamllint-config.yml
          echo "  - '.yamllint'" >> yamllint-config.yml
          echo "" >> yamllint-config.yml
          echo "rules:" >> yamllint-config.yml
          echo "  # ============ ERREURS CRITIQUES ============" >> yamllint-config.yml
          echo "  indentation:" >> yamllint-config.yml
          echo "    spaces: 2" >> yamllint-config.yml
          echo "    indent-sequences: true" >> yamllint-config.yml
          echo "    check-multi-line-strings: false" >> yamllint-config.yml
          echo "    level: error" >> yamllint-config.yml
          echo "" >> yamllint-config.yml
          echo "  key-duplicates:" >> yamllint-config.yml
          echo "    level: error" >> yamllint-config.yml
          echo "" >> yamllint-config.yml
          echo "  # ============ WARNINGS ============" >> yamllint-config.yml
          echo "  line-length:" >> yamllint-config.yml
          echo "    max: 80" >> yamllint-config.yml
          echo "    allow-non-breakable-words: true" >> yamllint-config.yml
          echo "    allow-non-breakable-inline-mappings: true" >> yamllint-config.yml
          echo "    level: warning" >> yamllint-config.yml
          echo "" >> yamllint-config.yml
          echo "  trailing-spaces:" >> yamllint-config.yml
          echo "    level: warning" >> yamllint-config.yml
          echo "" >> yamllint-config.yml
          echo "  new-lines:" >> yamllint-config.yml
          echo "    type: unix" >> yamllint-config.yml
          echo "    level: warning" >> yamllint-config.yml
          echo "" >> yamllint-config.yml
          echo "  # ============ DÉSACTIVÉES ============" >> yamllint-config.yml
          echo "  comments: disable" >> yamllint-config.yml
          echo "  comments-indentation: disable" >> yamllint-config.yml
          echo "  brackets: disable" >> yamllint-config.yml
          echo "  truthy: disable" >> yamllint-config.yml


          # PR: valider uniquement les fichiers changés
          # Push: valider tous les fichiers
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "📋 PR Mode: Validating only changed files"
            gh pr view ${{ github.event.pull_request.number }} \
              --json files --jq '.files.[].path' | \
              grep -E '\.(yaml|yml)$' | \
              grep -E '^(apps|argocd)/' | \
              grep -v -E '(crds/|charts/|upstream\.yaml|poolers\.yaml)' | \
              xargs -r yamllint -c yamllint-config.yml || true
          else
            echo "📋 Push Mode: Validating all files"
            find apps argocd \( -name "*.yaml" -o -name "*.yml" \) \
              ! -path "*/crds/*" \
              ! -path "*/charts/*" \
              ! -name "upstream.yaml" \
              ! -name "poolers.yaml" | \
              xargs yamllint -c yamllint-config.yml
          fi

  # 2️⃣ Validation structurelle Kubernetes (kubeconform)
  kube-structure:
    name: Kubernetes Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubeconform
        run: |
          # kubeconform remplace kubeval (déprécié depuis 2022)
          KUBECONFORM_VERSION=0.6.7
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate with kubeconform (CRDs ignorées)
        run: |
          echo "🔍 Validation structure Kubernetes (kubeconform)"

          # Valider uniquement les ressources standards (exclure values/ et charts/)
          find apps argocd -type f \( -name '*.yaml' -o -name '*.yml' \) \
            ! -path '*/values/*' \
            ! -path '*/charts/*' \
            ! -name 'values.yaml' \
            ! -name '*-json.yaml' \
            -print0 |
            xargs -0 kubeconform \
            -ignore-missing-schemas \
            -kubernetes-version 1.30.0 \
            -strict \
            -skip Application,AppProject,CustomResourceDefinition,InfisicalSecret,Middleware,HelmRelease,HelmRepository,Kustomization,Cluster,PostgresCluster,Pooler,ScheduledBackup

  # 3️⃣ Validation spécifique ArgoCD
  argocd-validate:
    name: ArgoCD Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup yq
        uses: mikefarah/yq@v4.44.1

      - name: Validate ArgoCD applications
        run: |
          echo "🔍 Validation Applications ArgoCD"

          # Validation complète des Applications
          find argocd -name "*.yaml" -type f | while read file; do
            if [ "$(yq eval '.kind' "$file" 2>/dev/null)" = "Application" ]; then
              echo "📋 Validation: $(basename "$file")"

              # Vérification détaillée
              yq eval '
                .apiVersion == "argoproj.io/v1alpha1" and
                .kind == "Application" and
                .metadata.name != null and
                .metadata.name != "" and
                .spec.project != null and
                .spec.project != "" and
                .spec.source.repoURL != null and
                .spec.source.repoURL != "" and
                .spec.source.path != null and
                .spec.source.path != "" and
                .spec.destination.server != null and
                .spec.destination.server != "" and
                .spec.destination.namespace != null and
                .spec.destination.namespace != ""
              ' "$file" || {
                echo "❌ Structure ArgoCD invalide: $file"
                yq eval '.' "$file"  # Afficher le contenu pour debugging
                exit 1
              }
            fi
          done

  # 4️⃣ Kustomize Build Validation
  kustomize-build:
    name: Kustomize Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Validate kustomize builds
        run: |
          echo "🔍 Validation Kustomize builds"

          # Trouver tous les overlays (dev/prod)
          FAILED=0
          for overlay in $(find apps -type d -name "dev" -o -type d -name "prod" | grep overlays); do
            if [ -f "$overlay/kustomization.yaml" ]; then
              echo "📋 Building: $overlay"
              if ! kustomize build "$overlay" > /dev/null 2>&1; then
                echo "❌ FAILED: $overlay"
                kustomize build "$overlay" 2>&1 | head -20
                FAILED=1
              else
                # Vérifier le nombre de ressources générées
                COUNT=$(kustomize build "$overlay" 2>/dev/null | grep -c '^kind:' || echo 0)
                if [ "$COUNT" -eq 0 ]; then
                  echo "⚠️ WARNING: $overlay produces 0 resources"
                else
                  echo "✅ OK: $overlay ($COUNT resources)"
                fi
              fi
            fi
          done

          # Build ArgoCD overlays
          for overlay in argocd/overlays/dev argocd/overlays/prod; do
            if [ -d "$overlay" ]; then
              echo "📋 Building: $overlay"
              if ! kustomize build "$overlay" > /dev/null 2>&1; then
                echo "❌ FAILED: $overlay"
                kustomize build "$overlay" 2>&1 | head -20
                FAILED=1
              else
                COUNT=$(kustomize build "$overlay" 2>/dev/null | grep -c '^kind:' || echo 0)
                echo "✅ OK: $overlay ($COUNT resources)"
              fi
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "❌ Some kustomize builds failed"
            exit 1
          fi

          echo "✅ All kustomize builds passed"

  # 5️⃣ Secret Scanning (gitleaks)
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git log scanning

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # 6️⃣ Vérification du flux de branches (pure trunk-based: feature → main)
  branch-flow:
    name: Branch Flow Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Enforce pure trunk-based flow (feature → main directly)
        run: |
          # Branche source de la PR
          SOURCE="${{ github.head_ref }}"
          # Branche cible de la PR
          TARGET="${{ github.base_ref }}"

          echo "🔀 PR from '$SOURCE' into '$TARGET'"

          case "$TARGET" in
            main)
              # Feature branches allowed, protected branches blocked
              if [[ "$SOURCE" =~ ^(dev|test|staging)$ ]]; then
                echo "❌ Protected branch '$SOURCE' cannot merge to 'main'"
                echo "   Only feature branches can merge to main"
                echo "   Note: dev/test/staging branches are archived (ADR-017)"
                exit 1
              fi
              echo "✅ Feature branch '$SOURCE' allowed to merge into 'main'"
              exit 0 ;;
            dev|test|staging)
              echo "❌ Branch '$TARGET' is archived (ADR-017)"
              echo "   Use pure trunk-based workflow: feature → main"
              echo "   Dev watches main (HEAD), Prod watches prod-stable tag"
              exit 1 ;;
            *)
              echo "❌ Unknown target branch '$TARGET'"
              exit 1 ;;
          esac

  # 7️⃣ Validation de sécurité
  security-scan:
    name: Security Best Practices
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Security checks
        run: |
          echo "🔍 Vérification sécurité"

          # Installation de checkov
          pip3 install checkov

          # Scan des bonnes pratiques
          checkov --directory . \
            --framework kubernetes \
            --compact --quiet || true

      - name: Check security patterns
        run: |
          echo "🔍 Recherche de patterns de sécurité"

          # Vérification des patterns dangereux
          find apps argocd -name "*.yaml" -type f | while read file; do
            echo "  📄 $(basename "$file")"

            # Recherche de patterns problématiques
            if grep -q "privileged: true" "$file"; then
              echo "    ⚠️ Privilèges élevés détectés"
            fi

            if grep -q "runAsUser: 0\|runAsRoot: true" "$file"; then
              echo "    ⚠️ Exécution en root détectée"
            fi

            if grep -q "allowPrivilegeEscalation: true" "$file"; then
              echo "    ⚠️ Élévation de privilèges autorisée"
            fi
          done

  # 8️⃣ Vérification de la configuration production (trunk-based)
  prod-config-check:
    name: "Production Configuration Checks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: "Verify trunk-based workflow compliance"
        run: |
          echo "🔍 Vérification configuration production (trunk-based workflow)"

          # Trunk-based: prod doit utiliser targetRevision: prod-stable (tag mobile)
          # Vérifier qu'on n'utilise pas 'main' ou 'prod' comme targetRevision
          if grep -rE "targetRevision:\s+main\s*$" argocd/overlays/prod; then
            echo "::error::Found 'targetRevision: main' in argocd/overlays/prod."
            echo "::error::Trunk-based workflow requires 'targetRevision: prod-stable' for production."
            exit 1
          fi

          # Rejeter 'prod' seul (pas 'prod-stable' ou 'prod-v1.2.3')
          # Gemini suggère souvent targetRevision: prod à tort
          if grep -rE "targetRevision:\s+[\"']?prod[\"']?\s*$" argocd/overlays/prod; then
            echo "::error::Found 'targetRevision: prod' in argocd/overlays/prod."
            echo "::error::Trunk-based workflow requires 'targetRevision: prod-stable' for production."
            echo "::error::Note: 'prod' branch does not exist. Use 'prod-stable' tag instead."
            exit 1
          fi

          # Vérifier que prod utilise bien envSlug: prod (pas dev)
          if grep -r "envSlug: dev" apps/*/*/overlays/prod; then
            echo "::error::Found 'envSlug: dev' in apps/*/*/overlays/prod. Please use 'prod' for production."
            exit 1
          fi

          # Vérifier absence de références au repo deprecated
          if grep -r "vixens-new.git" argocd; then
            echo "::error::Found 'vixens-new.git references' in argocd. Please use 'vixens.git', vixens-new is deprecated."
            exit 1
          fi

          echo "✅ Production configuration compliant with trunk-based workflow"

  # 9️⃣ Résumé final
  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [yaml-lint, kube-structure, argocd-validate, kustomize-build, secret-scan, security-scan, branch-flow, prod-config-check]
    if: always()
    steps:
      - name: Create summary
        run: |
          echo "## ✅ Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| YAML Lint | ${{ needs.yaml-lint.result }} |" \
            >> $GITHUB_STEP_SUMMARY
          echo "| K8s Structure (kubeconform) | ${{ needs.kube-structure.result }} |" \
            >> $GITHUB_STEP_SUMMARY
          echo "| ArgoCD Apps | ${{ needs.argocd-validate.result }} |" \
            >> $GITHUB_STEP_SUMMARY
          echo "| Kustomize Build | ${{ needs.kustomize-build.result }} |" \
            >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan (gitleaks) | ${{ needs.secret-scan.result }} |" \
            >> $GITHUB_STEP_SUMMARY
          echo "| Security Check | ${{ needs.security-scan.result }} |" \
            >> $GITHUB_STEP_SUMMARY
          echo "| Branch Flow | ${{ needs.branch-flow.result }} |" \
            >> $GITHUB_STEP_SUMMARY
          echo "| Prod Config Check | ${{ needs.prod-config-check.result }} |" \
            >> $GITHUB_STEP_SUMMARY

---
name: Validate & Security

on:
  push:
    branches: [dev, main]
  pull_request:

jobs:
  # 1️⃣ Validation YAML robuste
  yaml-lint:
    name: YAML Syntax & Style
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup yamllint
        run: |
          sudo apt-get update && sudo apt-get install -y yamllint

      - name: Validate YAML syntax
        run: |
          echo "🔍 Validation YAML syntax"
          echo "📋 Using repo yamllint-config.yml (strict style enforcement)"

          # PR: valider uniquement les fichiers changés
          # Push: valider tous les fichiers
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "📋 PR Mode: Validating only changed files"
            gh pr view ${{ github.event.pull_request.number }} \
              --json files --jq '.files.[].path' | \
              grep -E '\.(yaml|yml)$' | \
              grep -E '^(apps|argocd)/' | \
              grep -v -E '(crds/|charts/|upstream\.yaml|poolers\.yaml)' | \
              xargs -r yamllint -c yamllint-config.yml || true
          else
            echo "📋 Push Mode: Validating all files"
            find apps argocd \( -name "*.yaml" -o -name "*.yml" \) \
              ! -path "*/crds/*" \
              ! -path "*/charts/*" \
              ! -name "upstream.yaml" \
              ! -name "poolers.yaml" \
              ! -name "argocd-crds.yaml" \
              ! -name "argocd-install.yaml" \
              ! -name "manifests.yaml" \
              ! -name "servicemonitors.yaml" | \
              xargs yamllint -c yamllint-config.yml
          fi

  # 2️⃣ Validation spécifique ArgoCD
  argocd-validate:
    name: ArgoCD Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup yq
        uses: mikefarah/yq@v4.44.1

      - name: Validate ArgoCD applications
        run: |
          echo "🔍 Validation Applications ArgoCD"

          # Validation complète des Applications
          find argocd -name "*.yaml" -type f | while read file; do
            if [ "$(yq eval '.kind' "$file" 2>/dev/null)" = "Application" ]; then
              echo "📋 Validation: $(basename "$file")"

              # Vérification détaillée
              yq eval '
                .apiVersion == "argoproj.io/v1alpha1" and
                .kind == "Application" and
                .metadata.name != null and
                .metadata.name != "" and
                .spec.project != null and
                .spec.project != "" and
                .spec.source.repoURL != null and
                .spec.source.repoURL != "" and
                .spec.source.path != null and
                .spec.source.path != "" and
                .spec.destination.server != null and
                .spec.destination.server != "" and
                .spec.destination.namespace != null and
                .spec.destination.namespace != ""
              ' "$file" || {
                echo "❌ Structure ArgoCD invalide: $file"
                yq eval '.' "$file"  # Afficher le contenu pour debugging
                exit 1
              }
            fi
          done

  # 3️⃣ Kustomize Build + Kubeconform (valide la sortie buildée, pas les fichiers individuels)
  kustomize-validate:
    name: Kustomize Build & K8s Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup tools
        run: |
          # Kustomize
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

          # Helm (requis pour --enable-helm)
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

          # Kubeconform (remplace kubeval déprécié)
          KUBECONFORM_VERSION=0.6.7
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Build and validate all overlays
        run: |
          echo "🔍 Kustomize Build + Kubeconform Validation"
          echo "   (valide les ressources APRÈS merge des patches)"
          echo ""

          FAILED=0
          WARNED=0
          SKIP_KINDS="Application,AppProject,CustomResourceDefinition,InfisicalSecret,Middleware,HelmRelease,HelmRepository,Kustomization,Cluster,PostgresCluster,Pooler,ScheduledBackup,VolumeSnapshotClass,VolumeSnapshot,CiliumL2AnnouncementPolicy,CiliumLoadBalancerIPPool"

          # Fonction de validation
          validate_overlay() {
            local overlay="$1"
            echo "📋 Building: $overlay"

            # Détecter si l'overlay a une base vide (Helm-only apps)
            local base_dir
            base_dir=$(grep -oP '\.\./.*/base' "$overlay/kustomization.yaml" 2>/dev/null | head -1)
            if [ -n "$base_dir" ]; then
              local full_base="$overlay/$base_dir"
              if [ -f "$full_base/kustomization.yaml" ]; then
                local base_resources
                base_resources=$(grep -cE '^(resources:|helmCharts:)' "$full_base/kustomization.yaml" 2>/dev/null || echo 0)
                if [ "$base_resources" -eq 0 ]; then
                  echo "⏭️ SKIP: $overlay (base vide - app Helm-only via ArgoCD)"
                  return 0
                fi
              fi
            fi

            # Build kustomize avec support Helm
            if ! kustomize build --enable-helm "$overlay" > /tmp/built.yaml 2>&1; then
              echo "❌ KUSTOMIZE FAILED: $overlay"
              cat /tmp/built.yaml | head -20
              return 1
            fi

            # Compter les ressources
            COUNT=$(grep -c '^kind:' /tmp/built.yaml 2>/dev/null || echo 0)
            if [ "$COUNT" -eq 0 ]; then
              echo "⚠️ WARNING: $overlay produces 0 resources"
              WARNED=$((WARNED+1))
              return 0
            fi

            # Valider avec kubeconform (sur le YAML buildé)
            if ! kubeconform -ignore-missing-schemas -kubernetes-version 1.30.0 -strict -skip "$SKIP_KINDS" /tmp/built.yaml 2>&1; then
              echo "❌ KUBECONFORM FAILED: $overlay"
              return 1
            fi

            echo "✅ OK: $overlay ($COUNT resources)"
            return 0
          }

          # Valider tous les overlays apps/
          for overlay in $(find apps -type d \( -name "dev" -o -name "prod" \) | grep overlays); do
            if [ -f "$overlay/kustomization.yaml" ]; then
              if ! validate_overlay "$overlay"; then
                FAILED=1
              fi
            fi
          done

          # Valider les overlays ArgoCD
          for overlay in argocd/overlays/dev argocd/overlays/prod; do
            if [ -d "$overlay" ] && [ -f "$overlay/kustomization.yaml" ]; then
              if ! validate_overlay "$overlay"; then
                FAILED=1
              fi
            fi
          done

          echo ""
          if [ "$FAILED" -eq 1 ]; then
            echo "❌ Some validations failed"
            exit 1
          fi

          echo "✅ All kustomize builds and K8s validations passed"

  # 4️⃣ Secret Scanning (gitleaks)
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git log scanning

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # 5️⃣ Vérification du flux de branches (pure trunk-based: feature → main)
  branch-flow:
    name: Branch Flow Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Enforce pure trunk-based flow (feature → main directly)
        run: |
          SOURCE="${{ github.head_ref }}"
          TARGET="${{ github.base_ref }}"

          echo "🔀 PR from '$SOURCE' into '$TARGET'"

          case "$TARGET" in
            main)
              if [[ "$SOURCE" =~ ^(dev|test|staging)$ ]]; then
                echo "❌ Protected branch '$SOURCE' cannot merge to 'main'"
                echo "   Only feature branches can merge to main"
                echo "   Note: dev/test/staging branches are archived (ADR-017)"
                exit 1
              fi
              echo "✅ Feature branch '$SOURCE' allowed to merge into 'main'"
              exit 0 ;;
            dev|test|staging)
              echo "❌ Branch '$TARGET' is archived (ADR-017)"
              echo "   Use pure trunk-based workflow: feature → main"
              exit 1 ;;
            *)
              echo "❌ Unknown target branch '$TARGET'"
              exit 1 ;;
          esac

  # 6️⃣ Validation de sécurité
  security-scan:
    name: Security Best Practices
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Security checks
        run: |
          echo "🔍 Vérification sécurité"
          pip3 install checkov
          checkov --directory . \
            --framework kubernetes \
            --compact --quiet || true

      - name: Check security patterns
        run: |
          echo "🔍 Recherche de patterns de sécurité"
          WARNINGS=0

          find apps argocd -name "*.yaml" -type f | while read file; do
            if grep -q "privileged: true" "$file"; then
              echo "⚠️ Privilèges élevés: $file"
              WARNINGS=$((WARNINGS+1))
            fi
            if grep -q "runAsUser: 0" "$file"; then
              echo "⚠️ Exécution en root: $file"
              WARNINGS=$((WARNINGS+1))
            fi
            if grep -q "allowPrivilegeEscalation: true" "$file"; then
              echo "⚠️ Élévation de privilèges: $file"
              WARNINGS=$((WARNINGS+1))
            fi
          done

  # 7️⃣ Vérification de la configuration production (trunk-based)
  prod-config-check:
    name: Production Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify trunk-based workflow compliance
        run: |
          echo "🔍 Vérification configuration production"

          if grep -rE "targetRevision:\s+main\s*$" argocd/overlays/prod 2>/dev/null; then
            echo "::error::Found 'targetRevision: main' in prod. Use 'prod-stable' tag."
            exit 1
          fi

          if grep -rE "targetRevision:\s+[\"']?prod[\"']?\s*$" argocd/overlays/prod 2>/dev/null; then
            echo "::error::Found 'targetRevision: prod' in prod. Use 'prod-stable' tag."
            exit 1
          fi

          if grep -r "envSlug: dev" apps/*/*/overlays/prod 2>/dev/null; then
            echo "::error::Found 'envSlug: dev' in prod overlay."
            exit 1
          fi

          if grep -r "vixens-new.git" argocd 2>/dev/null; then
            echo "::error::Found deprecated 'vixens-new.git' reference."
            exit 1
          fi

          echo "✅ Production configuration OK"

  # 8️⃣ Résumé final
  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [yaml-lint, argocd-validate, kustomize-validate, secret-scan, security-scan, branch-flow, prod-config-check]
    if: always()
    steps:
      - name: Create summary
        run: |
          echo "## ✅ Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| YAML Lint | ${{ needs.yaml-lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ArgoCD Apps | ${{ needs.argocd-validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Kustomize + Kubeconform | ${{ needs.kustomize-validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Check | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch Flow | ${{ needs.branch-flow.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Prod Config | ${{ needs.prod-config-check.result }} |" >> $GITHUB_STEP_SUMMARY

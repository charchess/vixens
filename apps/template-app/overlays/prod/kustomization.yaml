---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - ingress.yaml
# Optional: add _shared components for apps that don't have these in their base
# components:
#   - ../../../../_shared/components/tolerations         # CP toleration (if not in base)
#   - ../../../../_shared/components/priority/medium       # priorityClassName
#   - ../../../../_shared/components/revision-history-limit # revisionHistoryLimit: 3
patches:
  - target:
      kind: InfisicalSecret
      name: template-app-secrets-sync
    patch: |
      - op: replace
        path: /spec/authentication/universalAuth/secretsScope/envSlug
        value: prod
commonLabels:
  environment: prod

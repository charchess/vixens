---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: netbird-dashboard
  namespace: networking
  labels:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    vixens.io/nossoneeded: "true"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Network
    gethomepage.dev/name: NetBird
    gethomepage.dev/icon: netbird.svg
    gethomepage.dev/description: VPN management dashboard
spec:
  ingressClassName: traefik
  rules:
    - host: netbird.truxonline.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: netbird-dashboard
                port:
                  number: 80
  tls:
    - hosts:
        - netbird.truxonline.com
      secretName: netbird-dashboard-tls
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: netbird-relay
  namespace: networking
  labels:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    vixens.io/nossoneeded: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: netbird-relay.truxonline.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: netbird-relay
                port:
                  number: 33080
  tls:
    - hosts:
        - netbird-relay.truxonline.com
      secretName: netbird-relay-tls
---
# Management gRPC — Traefik annotation h2c ignorée sur Ingress, IngressRoute requis
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: netbird-api-tls
  namespace: networking
spec:
  secretName: netbird-api-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - netbird-api.truxonline.com
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: netbird-api
  namespace: networking
  annotations:
    vixens.io/nossoneeded: "true"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`netbird-api.truxonline.com`)
      kind: Rule
      services:
        - name: netbird-management
          port: 80
          scheme: h2c
          passHostHeader: true
  tls:
    secretName: netbird-api-tls
---
# Signal gRPC — port 10000 via service, h2c requis
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: netbird-signal-tls
  namespace: networking
spec:
  secretName: netbird-signal-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - netbird-signal.truxonline.com
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: netbird-signal
  namespace: networking
  annotations:
    vixens.io/nossoneeded: "true"
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`netbird-signal.truxonline.com`)
      kind: Rule
      services:
        - name: netbird-signal
          port: 80
          scheme: h2c
          passHostHeader: true
  tls:
    secretName: netbird-signal-tls

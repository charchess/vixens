---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-router
  annotations:
    vpa.kubernetes.io/updateMode: "Off"
  labels:
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: netbird-router
  template:
    metadata:
      labels:
        app: netbird-router
        vixens.io/sizing.router: V-nano
        vixens.io/backup-profile: "ephemeral"
      annotations:
        vixens.io/fast-start: "true"
        vixens.io/explicitly-allow-root: "true"
    spec:
      priorityClassName: vixens-low
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
      # Root + privileged requis pour WireGuard (raw sockets + sysctl)
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        seccompProfile:
          type: Unconfined
      containers:
        - name: router
          image: netbirdio/netbird:0.70.4
          command:
            - /bin/sh
            - -c
            - |
              set -e
              netbird service run &
              sleep 10
              netbird up --setup-key "$NB_SETUP_KEY" --management-url "$NB_MANAGEMENT_URL"
              wait
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
            capabilities:
              drop: []
          env:
            - name: NB_SETUP_KEY
              valueFrom:
                secretKeyRef:
                  name: netbird-secrets
                  key: NETBIRD_ROUTER_SETUP_KEY
            - name: NB_MANAGEMENT_URL
              value: "https://netbird-api.dev.truxonline.com"
            - name: NB_HOSTNAME
              value: "netbird-router"
            - name: NB_LOG_LEVEL
              value: "info"
          livenessProbe:
            exec:
              command: ["netbird", "status", "--json"]
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command: ["netbird", "status", "--json"]
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 10
          volumeMounts:
            - name: netbird-data
              mountPath: /var/lib/netbird
            - name: tun
              mountPath: /dev/net/tun
      volumes:
        - name: netbird-data
          persistentVolumeClaim:
            claimName: netbird-router-data
        - name: tun
          hostPath:
            path: /dev/net/tun
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: netbird-router
spec:
  podSelector:
    matchLabels:
      app: netbird-router
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # WireGuard UDP from any peer
    - ports:
        - protocol: UDP
          port: 51820
  egress:
    # DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Management gRPC (via Traefik TLS)
    - ports:
        - protocol: TCP
          port: 443
    # Signal gRPC (via Traefik TLS)
    # Relay WebSocket (via Traefik TLS)
    # WireGuard UDP to peers
    - ports:
        - protocol: UDP
          port: 51820

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: netbird-management
spec:
  podSelector:
    matchLabels:
      app: netbird-management
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from Traefik (HTTP)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 33073
  egress:
    # Allow all egress (homelab: DNS, inter-app, external APIs)
    - {}

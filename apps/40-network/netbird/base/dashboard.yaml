---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbird-dashboard
  annotations:
    vpa.kubernetes.io/updateMode: "Off"
    goldilocks.fairwinds.com/enabled: "true"
  labels:
    vixens.io/vpa-mode: Auto
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: netbird-dashboard
  template:
    metadata:
      labels:
        app: netbird-dashboard
        vixens.io/sizing.dashboard: V-small
        vixens.io/backup-profile: "relaxed"
      annotations:
        vixens.io/fast-start: "true"
        vixens.io/no-long-connections: "true"
    spec:
      priorityClassName: vixens-low
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
      securityContext:
        # runAsNonRoot: true  # DISABLED: netbirdio/dashboard runs as root — verify image before re-enabling
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-nginx-dirs
          image: busybox:1.37.0
          command:
            - sh
            - -c
            - mkdir -p /var/lib/nginx/logs /var/lib/nginx/tmp /run/nginx && chmod -R 777 /var/lib/nginx /run/nginx
          volumeMounts:
            - name: nginx-tmp
              mountPath: /var/lib/nginx
            - name: nginx-run
              mountPath: /run/nginx
      containers:
        - name: dashboard
          image: netbirdio/dashboard:v2.34.2
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add: ["NET_BIND_SERVICE", "CHOWN", "SETUID", "SETGID"]
              drop: ["ALL"]
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-tmp
              mountPath: /var/lib/nginx
            - name: nginx-run
              mountPath: /run/nginx
      volumes:
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: netbird-dashboard
spec:
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: netbird-dashboard

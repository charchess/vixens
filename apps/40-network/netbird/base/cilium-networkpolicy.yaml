---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: netbird-dashboard
spec:
  endpointSelector:
    matchLabels:
      app: netbird-dashboard
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - {}

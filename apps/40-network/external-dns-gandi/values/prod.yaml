---
# ExternalDNS Gandi Configuration (Public)
provider: gandi
domainFilters:
  - truxonline.com
image:
  registry: registry.k8s.io
  repository: external-dns/external-dns
  tag: v0.20.0
extraEnvVars:
  - name: GANDI_PAT
    valueFrom:
      secretKeyRef:
        name: external-dns-gandi-secret
        key: GANDI_API_KEY
# Arguments
extraArgs:
  annotation-filter: external-dns.alpha.kubernetes.io/public=true
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
livenessProbe:
  enabled: false
readinessProbe:
  enabled: false
# Ownership
txtOwnerId: prod-gandi-public
# Scope
policy: sync
sources:
  - ingress
priorityClassName: vixens-high
podLabels:
  vixens.io/sizing.external-dns: G-nano
podAnnotations:
  vixens.io/fast-start: "true"
  vixens.io/service-binding: "false"
  prometheus.io/scrape: "true"
  prometheus.io/port: "7979"
  prometheus.io/path: "/metrics"

commonAnnotations:  # Deployment metadata annotations (Gold maturity: sync-wave + goldilocks)
  argocd.argoproj.io/sync-wave: "5"
  goldilocks.fairwinds.com/enabled: "true"
  vpa.kubernetes.io/updateMode: "Off"

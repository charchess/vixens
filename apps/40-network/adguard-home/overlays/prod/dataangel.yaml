---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adguard-home
spec:
  template:
    metadata:
      labels:
        vixens.io/sizing.dataangel: B-nano
      annotations:
        dataangel.io/bucket: "vixens-prod-adguard-home"
        dataangel.io/fs-paths: "/opt/adguardhome/work,/opt/adguardhome/conf"
        dataangel.io/s3-endpoint: "http://192.168.111.69:9000"
        dataangel.io/deployment-name: "adguard-home"
        dataangel.io/rclone-interval: "60s"
        dataangel.io/metrics-enabled: "true"
        dataangel.io/lock-enabled: "false"
    spec:
      initContainers:
        - name: dataangel
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: adguard-home-secrets
                  key: LITESTREAM_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: adguard-home-secrets
                  key: LITESTREAM_SECRET_ACCESS_KEY
          volumeMounts:
            - mountPath: /data
              $patch: delete
            - name: data
              mountPath: /opt/adguardhome/work
            - name: config
              mountPath: /opt/adguardhome/conf

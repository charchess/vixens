---
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: netvisor
  namespace: networking
spec:
  hosts:
    - netvisor.truxonline.com
  pathPrefixes:
    - /
  scaleTargetRef:
    name: netvisor-server
    kind: Deployment
    service: netvisor-server
    port: 60072
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 300

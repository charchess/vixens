---
# Prod Configuration
txtOwnerId: prod-unifi
domainFilters:
  - truxonline.com
resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

podAnnotations:
  vixens.io/fast-start: "true"
  vixens.io/service-binding: "false"
  prometheus.io/scrape: "true"
  prometheus.io/port: "7979"
  prometheus.io/path: "/metrics"

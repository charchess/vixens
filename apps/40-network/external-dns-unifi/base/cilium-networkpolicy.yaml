  namespace: networking
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: external-dns-unifi
  egress:
    - {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring

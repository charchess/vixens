---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
spec:
  template:
    metadata:
      labels:
        vixens.io/sizing.dataangel: B-nano
        vixens.io/sizing.litestream: null
        vixens.io/sizing.config-syncer: null
        vixens.io/sizing.restore-config: null
        vixens.io/sizing.restore-db: null
      annotations:
        dataangel.io/bucket: "vixens-prod-homeassistant"
        dataangel.io/sqlite-paths: "/config/home-assistant_v2.db"
        dataangel.io/fs-paths: "/config"
        dataangel.io/s3-endpoint: "http://192.168.111.69:9000"
        dataangel.io/deployment-name: "homeassistant"
        dataangel.io/rclone-interval: "60s"
        dataangel.io/metrics-enabled: "true"
        dataangel.io/lock-enabled: "false"
    spec:
      initContainers:
        - name: fix-perms
          $patch: delete
        - name: restore-config
          $patch: delete
        - name: restore-db
          $patch: delete
        - name: dataangel
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          startupProbe:
            httpGet:
              path: /ready
              port: 9090
            periodSeconds: 2
            failureThreshold: 3600
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: homeassistant-secrets
                  key: LITESTREAM_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: homeassistant-secrets
                  key: LITESTREAM_SECRET_ACCESS_KEY
          volumeMounts:
            - mountPath: /data
              $patch: delete
            - name: config
              mountPath: /config
      containers:
        - name: litestream
          $patch: delete
        - name: config-syncer
          $patch: delete

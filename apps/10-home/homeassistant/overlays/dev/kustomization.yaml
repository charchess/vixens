---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: homeassistant
resources:
  - ../../base
  - ingress.yaml
  - ingressroute-udp.yaml
components:
  - ../../../../_shared/components/dev-hibernate
  - ../../../../_shared/components/revision-history-limit
  - ../../../../_shared/components/dataangel
patches:
  - path: dataangel.yaml
  - target:
      kind: PersistentVolumeClaim
      name: homeassistant-config
    patch: |-
      - op: replace
        path: /spec/storageClassName
        value: synelia-iscsi-xfs-retain
  - target:
      kind: Deployment
      name: homeassistant
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      - op: replace
        path: /spec/template/spec/initContainers/0/ports
        value:
          - containerPort: 9091
            name: metrics
            protocol: TCP
      - op: replace
        path: /spec/template/spec/initContainers/1/image
        value: "python:3.13-alpine"

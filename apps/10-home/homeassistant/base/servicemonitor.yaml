---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: homeassistant
  namespace: homeassistant
  labels:
    app: homeassistant
spec:
  selector:
    matchLabels:
      app: homeassistant
  namespaceSelector:
    matchNames:
      - homeassistant
  endpoints:
    - port: metrics
      targetPort: 9090
      path: /metrics
      interval: 60s

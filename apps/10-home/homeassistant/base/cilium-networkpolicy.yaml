---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: homeassistant
spec:
  endpointSelector:
    matchLabels:
      app: homeassistant
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "8123"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8123"
              protocol: TCP
  egress:
    # HA → Mosquitto (MQTT broker)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: mosquitto
      toPorts:
        - ports:
            - port: "1883"
              protocol: TCP
    # HA → Frigate (API, WebSocket events, RTSP)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: media
            app: frigate
      toPorts:
        - ports:
            - port: "5000"
              protocol: TCP
            - port: "8554"
              protocol: TCP
            - port: "8555"
              protocol: TCP
    # HA → world (cloud integrations, webhooks, external APIs)
    - toEntities:
        - world

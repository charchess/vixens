---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homeassistant
  labels:
    app: homeassistant
    vixens.io/sizing: B-large
    vixens.io/backup-profile: "standard"
  annotations:
    secret.reloader.stakater.com/reload: homeassistant-config
    argocd.argoproj.io/sync-wave: "10"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homeassistant
  template:
    metadata:
      labels:
        app: homeassistant
        vixens.io/sizing: B-large
        vixens.io/backup-profile: "standard"
      annotations:
        reloader.stakater.com/auto: "true"
        vixens.io/fast-start: "true"
        dataangel.io/metrics-port: "9090"
        vixens.io/explicitly-allow-root: "true"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      priorityClassName: vixens-high
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: install-python-deps
          image: python:3.14.4-alpine
          securityContext:
            capabilities:
              add: [CHOWN]
            runAsUser: 0
          command:
            - sh
            - -c
          args:
            - |
              PACKAGES="hass-web-proxy-lib==0.0.7"
              TARGET="/config/python_packages"
              mkdir -p "$TARGET"
              INSTALLED=true
              for pkg in $PACKAGES; do
                NAME=$(echo "$pkg" | cut -d= -f1 | tr '-' '_')
                VER=$(echo "$pkg" | cut -d= -f3)
                if ls "$TARGET/"*"${NAME}"*".dist-info" 2>/dev/null | grep -q "$VER"; then
                  echo "$pkg already installed, skipping."
                else
                  echo "$pkg not found or wrong version, installing..."
                  INSTALLED=false
                fi
              done
              if [ "$INSTALLED" = "false" ]; then
                pip install --no-cache-dir --target="$TARGET" $PACKAGES
                chown -R 1000:1000 "$TARGET"
              fi
          volumeMounts:
            - name: config
              mountPath: /config
        - name: config-init
          image: busybox:1.37.0
          securityContext:
            capabilities:
              add: [CHOWN]
          command:
            - sh
            - -c
          args:
            - |
              if [ ! -s /config/configuration.yaml ]; then
                echo "No configuration found, copying default..."
                cp /tmp/ha-config/homeassistant-config /config/configuration.yaml
                chown 1000:1000 /config/configuration.yaml
              fi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: ha-config
              mountPath: /tmp/ha-config
              readOnly: true
      containers:
        - name: homeassistant
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          image: ghcr.io/home-assistant/home-assistant:2026.5.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8123
              name: http
            - containerPort: 5683
              name: coiot
              protocol: UDP
          env:
            - name: TZ
              value: Europe/Paris
            - name: PYTHONPATH
              value: /config/python_packages:/usr/local/lib/python3.13/site-packages
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: homeassistant-config
        - name: ha-config
          secret:
            secretName: homeassistant-config

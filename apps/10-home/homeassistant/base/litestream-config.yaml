---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homeassistant-litestream-config
data:
  litestream.yml: |
    dbs:
      - path: /config/home-assistant_v2.db
        replicas:
          - url: s3://$LITESTREAM_BUCKET/home-assistant_v2.db
            endpoint: $LITESTREAM_ENDPOINT
            retention: 24h
            retention-check-interval: 1h
            snapshot-interval: 6h
    addr: ":9090"

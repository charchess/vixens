---
# MINIMAL GitOps configuration for Home Assistant
# This is a FALLBACK only - real config comes from S3 backup via rclone
# Sensitive data (tokens, credentials) are managed via:
#   1. Infisical secrets (homeassistant-secrets)
#   2. S3 backup restoration (rclone)
#
# DO NOT put secrets here - they will be exposed in git history!
apiVersion: v1
kind: ConfigMap
metadata:
  name: homeassistant-config
  namespace: homeassistant
  labels:
    app: homeassistant
  annotations:
    vixens.io/note: "Fallback config only - real config from S3 backup"
data:
  configuration.yaml: |
    # Minimal fallback configuration
    # Full config is restored from S3 backup at pod startup
    # Secrets are injected from Infisical via secrets.yaml
    
    # Load default integrations
    default_config:

    # HTTP Configuration for reverse proxy (Traefik/Ingress)
    http:
      use_x_forwarded_for: true
      trusted_proxies:
        - 10.0.0.0/8
        - 192.168.0.0/16
      server_port: 8123

    homeassistant:
      allowlist_external_urls:
        - "https://homeassistant.truxonline.com/local/"

    # Text to speech
    tts:
      - platform: google_translate

    # Include files (restored from S3 backup)
    group: !include groups.yaml
    automation: !include automations.yaml
    script: !include scripts.yaml
    scene: !include scenes.yaml
    template: !include templates.yaml
    switch: !include switches.yaml
    sensor: !include sensors.yaml
    utility_meter: !include utility_meters.yaml
    media_player: !include mediaplayer.yaml
    python_script:

    # Secrets are loaded from secrets.yaml (managed by Infisical)
    # notify, device_tracker, google_assistant etc. are in full config from S3

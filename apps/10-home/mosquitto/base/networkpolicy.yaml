---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mosquitto
spec:
  podSelector:
    matchLabels:
      app: mosquitto
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: homeassistant
      ports:
        - protocol: TCP
          port: 1883
  egress:
    # Allow all egress (homelab: DNS, inter-app, external APIs)
    - {}

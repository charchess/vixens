---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: mosquitto
spec:
  endpointSelector:
    matchLabels:
      app: mosquitto
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: homeassistant
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "1883"
              protocol: TCP
  egress:
    - {}

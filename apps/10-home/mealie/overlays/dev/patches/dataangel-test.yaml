---
# TEST DataAngel v1 — remplace litestream init+sidecar par DataAngel (SQLite only)
# Filesystem backup (rclone/config-syncer) conservé inchangé
# Ref: https://github.com/truxonline/dataAngel | Issue #2264
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie
spec:
  # Override dev-hibernate pour permettre le test
  replicas: 1
  template:
    metadata:
      labels:
        # Sizing pour les nouveaux containers DataAngel
        vixens.io/sizing.data-guard-init: B-nano
        vixens.io/sizing.data-guard-sidecar: V-nano
    spec:
      initContainers:
        # Supprime le restore litestream natif
        - name: restore-db
          $patch: delete
        # DataAngel init — restore SQLite via litestream
        - name: data-guard-init
          image: charchess/dataangel:latest
          imagePullPolicy: Always
          command: ["./init"]
          securityContext:
            runAsUser: 911
            runAsGroup: 911
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 128Mi
          env:
            - name: DATA_GUARD_BUCKET
              valueFrom:
                secretKeyRef:
                  name: mealie-secrets
                  key: LITESTREAM_BUCKET
            - name: DATA_GUARD_SQLITE_PATHS
              value: "/app/data/mealie.db"
            - name: DATA_GUARD_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: mealie-secrets
                  key: LITESTREAM_ENDPOINT
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mealie-secrets
                  key: LITESTREAM_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mealie-secrets
                  key: LITESTREAM_SECRET_ACCESS_KEY
          volumeMounts:
            - name: data
              mountPath: /app/data
      containers:
        # Supprime le sidecar litestream natif
        - name: litestream
          $patch: delete
        # DataAngel sidecar — réplication SQLite continue via litestream
        - name: data-guard-sidecar
          image: charchess/dataangel:latest
          imagePullPolicy: Always
          command: ["./sidecar"]
          securityContext:
            runAsUser: 911
            runAsGroup: 911
          resources:
            requests:
              cpu: 5m
              memory: 64Mi
            limits:
              cpu: 20m
              memory: 256Mi
          env:
            - name: DATA_GUARD_BUCKET
              valueFrom:
                secretKeyRef:
                  name: mealie-secrets
                  key: LITESTREAM_BUCKET
            - name: DATA_GUARD_SQLITE_PATHS
              value: "/app/data/mealie.db"
            - name: DATA_GUARD_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: mealie-secrets
                  key: LITESTREAM_ENDPOINT
            - name: DATA_GUARD_RCLONE_INTERVAL
              value: "60s"
            - name: DATA_GUARD_METRICS_PORT
              value: "9090"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mealie-secrets
                  key: LITESTREAM_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mealie-secrets
                  key: LITESTREAM_SECRET_ACCESS_KEY
          ports:
            - containerPort: 9090
              name: metrics
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /app/data


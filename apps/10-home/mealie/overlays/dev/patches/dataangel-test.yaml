---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie
spec:
  replicas: 1
  template:
    metadata:
      labels:
        vixens.io/sizing.dataangel: B-nano
    spec:
      initContainers:
        - name: restore-config
          $patch: delete
        - name: restore-db
          $patch: delete
        - name: dataangel
          image: charchess/dataangel:dev
          imagePullPolicy: Always
          restartPolicy: Always
          command: ["./dataangel"]
          securityContext:
            runAsUser: 911
            runAsGroup: 911
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 256Mi
          env:
            - name: DATA_GUARD_BUCKET
              valueFrom:
                secretKeyRef:
                  name: mealie-secrets
                  key: LITESTREAM_BUCKET
            - name: DATA_GUARD_SQLITE_PATHS
              value: "/app/data/mealie.db"
            - name: DATA_GUARD_FS_PATHS
              value: "/app/data"
            - name: DATA_GUARD_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: mealie-secrets
                  key: LITESTREAM_ENDPOINT
            - name: DATA_GUARD_DEPLOYMENT_NAME
              value: "mealie"
            - name: AWS_REGION
              value: "us-east-1"
            - name: DATA_GUARD_RCLONE_INTERVAL
              value: "60s"
            - name: DATA_GUARD_METRICS_ENABLED
              value: "true"
            - name: DATA_GUARD_METRICS_PORT
              value: "9090"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mealie-secrets
                  key: LITESTREAM_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mealie-secrets
                  key: LITESTREAM_SECRET_ACCESS_KEY
          ports:
            - containerPort: 9090
              name: metrics
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: 9090
            initialDelaySeconds: 0
            periodSeconds: 2
          volumeMounts:
            - name: data
              mountPath: /app/data
      containers:
        - name: litestream
          $patch: delete
        - name: config-syncer
          $patch: delete

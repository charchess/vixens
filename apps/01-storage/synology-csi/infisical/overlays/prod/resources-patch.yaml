---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synology-csi-secrets
spec:
  template:
    metadata:
      labels:
        vixens.io/sizing.synology-csi-secrets: B-nano
        vixens.io/sizing: B-nano
    spec:
      containers:
        - name: synology-csi-secrets
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 20m
              memory: 128Mi

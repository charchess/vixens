---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
labels:
  - includeTemplates: true
    pairs:
      cache-bust: '2'
      vixens.lab/environment: dev
namespace: synology-csi
components:
  - ../../../../_shared/components/dev-hibernate
patches:
  # CSI controller must run to provision PVCs — override dev-hibernate for infrastructure
  - patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: synology-csi-controller
      spec:
        replicas: 1
    target:
      kind: StatefulSet
      name: synology-csi-controller
  - patch: |-
      - op: replace
        path: /parameters/igroup
        value: "vixens-dev-iscsi-group"
      - op: add
        path: /parameters/targetIps
        value: "192.168.111.70,192.168.111.71"
    target:
      kind: StorageClass
      name: synelia-iscsi-retain
  - patch: |-
      - op: add
        path: /parameters/igroup
        value: "vixens-dev-iscsi-group"
      - op: add
        path: /parameters/targetIps
        value: "192.168.111.70,192.168.111.71"
    target:
      kind: StorageClass
      name: synelia-iscsi-delete
  - patch: |-
      - op: replace
        path: /parameters/igroup
        value: "vixens-dev-iscsi-group"
      - op: add
        path: /parameters/targetIps
        value: "192.168.111.70,192.168.111.71"
    target:
      kind: StorageClass
      name: synelia-iscsi-xfs-retain
  - patch: |-
      - op: add
        path: /parameters/igroup
        value: "vixens-dev-iscsi-group"
      - op: add
        path: /parameters/targetIps
        value: "192.168.111.70,192.168.111.71"
    target:
      kind: StorageClass
      name: synelia-iscsi-xfs-delete
resources:
  - ../../base

---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
labels:
  - includeTemplates: true
    pairs:
      vixens.lab/environment: prod
namespace: synology-csi
components:
  - ../../../../_shared/components/sync-wave/wave-0
  - ../../../../_shared/components/goldilocks/enabled

patches:
  - patch: |-
      - op: replace
        path: /parameters/igroup
        value: "vixens-prod-iscsi-group"
      - op: add
        path: /parameters/targetIps
        value: "192.168.111.70,192.168.111.71"
    target:
      kind: StorageClass
      name: synelia-iscsi-retain
  - patch: |-
      - op: add
        path: /parameters/igroup
        value: "vixens-prod-iscsi-group"
      - op: add
        path: /parameters/targetIps
        value: "192.168.111.70,192.168.111.71"
    target:
      kind: StorageClass
      name: synelia-iscsi-delete
  - patch: |-
      - op: add
        path: /spec/template/metadata/annotations/vixens.io~1fast-start
        value: "true"
      - op: add
        path: /spec/template/metadata/annotations/vixens.io~1service-binding
        value: "false"
    target:
      kind: StatefulSet
      name: synology-csi-controller
  - patch: |-
      - op: add
        path: /spec/template/metadata/annotations/vixens.io~1fast-start
        value: "true"
      - op: add
        path: /spec/template/metadata/annotations/vixens.io~1service-binding
        value: "false"
    target:
      kind: DaemonSet
      name: synology-csi-node
resources:
  - ../../base

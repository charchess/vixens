---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: synelia-iscsi-retain
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: csi.san.synology.com
parameters:
  fsType: ext4
  protocol: iscsi
  lunType: thin
  # À patcher par l'overlay
  igroup: vixens-default-iscsi-group
reclaimPolicy: Retain
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: synelia-iscsi-delete
provisioner: csi.san.synology.com
parameters:
  fsType: ext4
  protocol: iscsi
reclaimPolicy: Delete
allowVolumeExpansion: true
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: synelia-iscsi-xfs-retain
provisioner: csi.san.synology.com
parameters:
  fsType: xfs
  protocol: iscsi
  lunType: thin
  igroup: vixens-default-iscsi-group
  # -K: skip TRIM/DISCARD on format — thin iSCSI LUNs hang indefinitely on DISCARD
  formatOptions: "-K"
reclaimPolicy: Retain
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: synelia-iscsi-xfs-delete
provisioner: csi.san.synology.com
parameters:
  fsType: xfs
  protocol: iscsi
  lunType: thin
  # -K: skip TRIM/DISCARD on format — thin iSCSI LUNs hang indefinitely on DISCARD
  formatOptions: "-K"
reclaimPolicy: Delete
allowVolumeExpansion: true

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: synology-csi-node
spec:
  selector:
    matchLabels:
      app: synology-csi-node
  template:
    metadata:
      annotations:
        vixens.io/explicitly-allow-root: "true"
        vixens.io/nometrics: "true"
        vixens.io/service-binding: "false"
        vixens.io/no-long-connections: "true"
        vixens.io/sizing-rationale: "G-nano: CSI node sidecar and plugin, low steady-state overhead"
      labels:
        app: synology-csi-node
        vixens.io/single-replica: "true"
        vixens.io/sizing.csi-node-driver-registrar: G-nano
        vixens.io/sizing.synology-csi-plugin: G-nano
    spec:
      hostNetwork: true
      hostPID: true
      serviceAccountName: synology-csi-node
      initContainers:
        - name: iscsi-lock-cleanup
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              rm -f /host/run/lock/iscsi/lock.write && echo "iSCSI stale lock cleared"
              OVERLAY=/host/system/overlays/usr-local-lib-containers-iscsid-diff
              mkdir -p ${OVERLAY}/etc/iscsi
              cat > ${OVERLAY}/etc/iscsi/iscsid.conf << 'EOF'
              iscsid.startup = /usr/local/sbin/iscsid
              node.startup = manual
              node.session.timeo.replacement_timeout = 120
              node.conn[0].timeo.login_timeout = 30
              node.conn[0].timeo.logout_timeout = 15
              node.conn[0].timeo.noop_out_interval = 5
              node.conn[0].timeo.noop_out_timeout = 5
              node.conn[0].iscsi.MaxRecvDataSegmentLength = 262144
              node.session.iscsi.InitialR2T = No
              node.session.iscsi.ImmediateData = Yes
              node.session.iscsi.FirstBurstLength = 262144
              node.session.iscsi.MaxBurstLength = 16776192
              node.session.cmds_max = 128
              node.session.queue_depth = 32
              node.session.err_timeo.abort_timeout = 15
              node.session.err_timeo.lu_reset_timeout = 30
              node.session.err_timeo.tgt_reset_timeout = 30
              discovery.sendtargets.auth.authmethod = None
              discovery.sendtargets.timeo.login_timeout = 30
              discovery.sendtargets.timeo.auth_timeout = 45
              discovery.sendtargets.timeo.active_timeout = 30
              EOF
              echo "iSCSI iscsid.conf ensured in overlay"
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
      priorityClassName: vixens-critical
      containers:
        - name: csi-node-driver-registrar
          image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.16.0
          args:
            - --v=5
            - --csi-address=$(ADDRESS)
            - --kubelet-registration-path=$(REGISTRATION_PATH)
          env:
            - name: ADDRESS
              value: /csi/csi.sock
            - name: REGISTRATION_PATH
              value: /var/lib/kubelet/plugins/csi.san.synology.com/csi.sock
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 5m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi/
            - name: registration-dir
              mountPath: /registration
        - name: synology-csi-plugin
          image: ghcr.io/zebernst/synology-csi:v1.2.0
          args:
            - --nodeid=$(KUBE_NODE_NAME)
            - --endpoint=$(CSI_ENDPOINT)
            - --client-info
            - /etc/synology/client-info.yml
            - --log-level=info
          env:
            - name: CSI_ENDPOINT
              value: unix:///csi/csi.sock
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 5m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: Bidirectional
            - name: plugin-dir
              mountPath: /csi/
            - name: client-info
              mountPath: /etc/synology
              readOnly: true
            - name: host-root
              mountPath: /host
            - name: device-dir
              mountPath: /dev
      volumes:
        - name: kubelet-dir
          hostPath:
            path: /var/lib/kubelet
            type: Directory
        - name: plugin-dir
          hostPath:
            path: /var/lib/kubelet/plugins/csi.san.synology.com
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: Directory
        - name: client-info
          secret:
            secretName: client-info-secret
        - name: host-root
          hostPath:
            path: /
            type: Directory
        - name: device-dir
          hostPath:
            path: /dev
            type: Directory
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

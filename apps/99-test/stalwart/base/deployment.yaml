---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stalwart
  labels:
    app: stalwart
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: stalwart
  template:
    metadata:
      labels:
        app: stalwart
        vixens.io/sizing.stalwart: V-small
      annotations:
        vixens.io/explicitly-allow-root: "true"
        prometheus.io/scrape: "false"
    spec:
      priorityClassName: vixens-low
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        fsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: stalwart
          image: ghcr.io/stalwartlabs/stalwart:v0.15.5
          securityContext:
            runAsUser: 0
          env:
            - name: TZ
              value: Europe/Paris
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 25
              name: smtp
            - containerPort: 587
              name: submission
            - containerPort: 465
              name: submissions
            - containerPort: 143
              name: imap
            - containerPort: 993
              name: imaps
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /opt/stalwart
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: stalwart-data-pvc

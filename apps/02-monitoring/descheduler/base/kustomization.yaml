---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - descheduler-gen.yaml
  - priorityclasses.yaml

patches:
  - patch: |
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: descheduler
      spec:
        jobTemplate:
          spec:
            template:
              metadata:
                labels:
                  vixens.io/sizing.descheduler: G-nano
    target:
      kind: CronJob
      name: descheduler

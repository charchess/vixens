---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
labels:
  - includeSelectors: false
    pairs:
      environment: prod
namespace: monitoring
components:
  - ../../../../_shared/components/scheduling/avoid-i915

patches:
  - path: patch-infisical-env.yaml
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/lifecycle
        value:
          preStop:
            exec:
              command: ["sleep", "5"]
    target:
      kind: Deployment
      name: grafana
resources:
  - ../../base

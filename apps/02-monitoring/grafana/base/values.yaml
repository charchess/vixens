---
# Grafana standalone configuration

# Deployment strategy
deploymentStrategy:
  type: Recreate
# Persistence
persistence:
  enabled: true
  storageClassName: synelia-iscsi-retain
  size: 10Gi
# Admin credentials via Infisical (configured separately)
admin:
  existingSecret: grafana-admin
  userKey: admin-user
  passwordKey: admin-password
# Datasources configuration
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.monitoring.svc.cluster.local
        access: proxy
        isDefault: true
        editable: true
      - name: Loki
        type: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        access: proxy
        isDefault: false
        editable: true
# Resources (Silver: limits defined)
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

priorityClassName: vixens-critical
# Probes (Elite Status)
livenessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 60
  timeoutSeconds: 30
  failureThreshold: 10
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /api/health
    port: 3000
  initialDelaySeconds: 60
  timeoutSeconds: 30
  failureThreshold: 10
  periodSeconds: 10
# Pod Annotations for scraping
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"
  prometheus.io/path: "/metrics"
annotations:  # Deployment metadata annotations (Gold maturity: sync-wave + goldilocks)
  argocd.argoproj.io/sync-wave: "10"
  goldilocks.fairwinds.com/enabled: "true"
  vpa.kubernetes.io/updateMode: "Off"
revisionHistoryLimit: 3
# Tolerations for control-plane nodes
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
# Service
service:
  type: ClusterIP
  port: 80
  targetPort: 3000
# Sidecar for dashboard discovery
sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    searchNamespace: ALL
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  livenessProbe:
    exec:
      command:
        - ls
        - /tmp
    initialDelaySeconds: 30
    periodSeconds: 60
  readinessProbe:
    exec:
      command:
        - ls
        - /tmp
    initialDelaySeconds: 10
    periodSeconds: 30

# Deployment labels for maturity tracking (chart uses .Values.labels for deployment metadata)
labels:
  app.kubernetes.io/managed-by: argocd

# Pod sizing labels
podLabels:
  vixens.io/sizing.grafana: G-medium
  vixens.io/sizing.grafana-sc-dashboard: G-small

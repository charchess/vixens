---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
components:
  - ../../../../_shared/components/sync-wave/wave-10
  - ../../../../_shared/components/goldilocks/enabled
  - ../../../../_shared/components/priority/low

patches:
  - path: patch-infisical-env.yaml
  # Goldilocks Controller - Add sizing labels to deployment metadata
  - patch: |-
      - op: add
        path: /metadata/labels/vixens.io~1sizing-v2
        value: "true"
    target:
      kind: Deployment
      name: goldilocks-controller
  # Goldilocks Controller - Add sizing label to pod template
  - patch: |-
      - op: add
        path: /spec/template/metadata/labels/vixens.io~1sizing.goldilocks-controller
        value: G-nano
    target:
      kind: Deployment
      name: goldilocks-controller
  # Goldilocks Controller - Remove manual resources (anti-pattern fix)
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value: {}
    target:
      kind: Deployment
      name: goldilocks-controller
  # Goldilocks Dashboard - Add sizing labels to deployment metadata
  - patch: |-
      - op: add
        path: /metadata/labels/vixens.io~1sizing-v2
        value: "true"
    target:
      kind: Deployment
      name: goldilocks-dashboard
  # Goldilocks Dashboard - Add sizing label to pod template
  - patch: |-
      - op: add
        path: /spec/template/metadata/labels/vixens.io~1sizing.goldilocks-dashboard
        value: V-small
    target:
      kind: Deployment
      name: goldilocks-dashboard
  # Goldilocks Dashboard - Remove manual resources (anti-pattern fix)
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value: {}
    target:
      kind: Deployment
      name: goldilocks-dashboard
  - patch: |-
      - op: add
        path: /spec/template/metadata/labels/environment
        value: prod
    target:
      kind: Deployment
      name: goldilocks-controller
  - patch: |-
      - op: add
        path: /spec/template/metadata/labels/environment
        value: prod
    target:
      kind: Deployment
      name: goldilocks-dashboard
  # Graceful shutdown bypass — pure controllers with no user connections
  - patch: |-
      - op: add
        path: /spec/template/metadata/annotations/vixens.io~1no-long-connections
        value: "true"
    target:
      kind: Deployment
      name: goldilocks-controller
  - patch: |-
      - op: add
        path: /spec/template/metadata/annotations/vixens.io~1no-long-connections
        value: "true"
    target:
      kind: Deployment
      name: goldilocks-dashboard
resources:
  - ingress.yaml
  - ../../base

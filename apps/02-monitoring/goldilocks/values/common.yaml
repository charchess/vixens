---
controller:
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  priorityClassName: vixens-low
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
  resources:
    requests: {}  # Explicitly empty - Kyverno mutates via sizing labels
    limits: {}
  deployment:
    additionalLabels:
      vixens.io/sizing.goldilocks: G-nano  # container name: goldilocks
    podAnnotations:
      vixens.io/fast-start: "true"
      vixens.io/no-long-connections: "true"
      vixens.io/nometrics: "true"  # goldilocks-controller has no Prometheus metrics port defined
    annotations:  # Deployment metadata (Gold maturity)
      argocd.argoproj.io/sync-wave: "10"
      goldilocks.fairwinds.com/enabled: "true"
      vpa.kubernetes.io/updateMode: "Off"
  revisionHistoryLimit: 3

dashboard:
  replicaCount: 1
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  priorityClassName: vixens-low
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
  resources:
    requests: {}  # Explicitly empty - Kyverno mutates via sizing labels
    limits: {}
  deployment:
    additionalLabels:
      vixens.io/sizing.goldilocks: G-nano  # container name: goldilocks
    podAnnotations:
      vixens.io/fast-start: "true"
      vixens.io/no-long-connections: "true"
      vixens.io/nometrics: "true"  # goldilocks-dashboard is a web UI with no /metrics endpoint
    annotations:  # Deployment metadata (Gold maturity)
      argocd.argoproj.io/sync-wave: "10"
      goldilocks.fairwinds.com/enabled: "true"
      vpa.kubernetes.io/updateMode: "Off"
  revisionHistoryLimit: 3

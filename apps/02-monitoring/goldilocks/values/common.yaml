---
controller:
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
  podLabels:
    vixens.io/sizing.goldilocks-controller: G-nano
  deployment:
    podAnnotations:
      vixens.io/fast-start: "true"
    annotations:  # Deployment metadata (Gold maturity)
      argocd.argoproj.io/sync-wave: "10"
      goldilocks.fairwinds.com/enabled: "true"
      vpa.kubernetes.io/updateMode: "Off"
  revisionHistoryLimit: 3

dashboard:
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
  podLabels:
    vixens.io/sizing.goldilocks-dashboard: V-small
  deployment:
    podAnnotations:
      vixens.io/fast-start: "true"
    annotations:  # Deployment metadata (Gold maturity)
      argocd.argoproj.io/sync-wave: "10"
      goldilocks.fairwinds.com/enabled: "true"
      vpa.kubernetes.io/updateMode: "Off"
  revisionHistoryLimit: 3

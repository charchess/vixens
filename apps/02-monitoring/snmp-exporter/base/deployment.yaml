---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snmp-exporter
  annotations:
    argocd.argoproj.io/sync-wave: "8"
    goldilocks.fairwinds.com/enabled: "true"
    vpa.kubernetes.io/updateMode: "Off"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: snmp-exporter
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: snmp-exporter
        vixens.io/sizing-v2: "true"
        vixens.io/sizing.snmp-exporter: V-nano
        vixens.io/sizing.init-config: G-nano
        vixens.io/sizing.init-vmscrape: G-nano
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9116"
        prometheus.io/path: "/metrics"
        vixens.io/fast-start: "true"
        vixens.io/no-long-connections: "true"
        vixens.io/backup-profile: ephemeral
    spec:
      serviceAccountName: snmp-exporter
      priorityClassName: vixens-low
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: init-config
          image: busybox:1.37
          command:
            - sh
            - -c
            - 'sed "s|\${SNMP_COMMUNITY}|${SNMP_COMMUNITY}|g" /config-tpl/snmp.yml > /config-out/snmp.yml && echo "Config generated"'
          env:
            - name: SNMP_COMMUNITY
              valueFrom:
                secretKeyRef:
                  name: snmp-exporter-secrets
                  key: SNMP_COMMUNITY
          volumeMounts:
            - name: config-tpl
              mountPath: /config-tpl
            - name: config-out
              mountPath: /config-out
        - name: init-vmscrape
          image: bitnami/kubectl:1.32
          command:
            - sh
            - -c
            - |
              sed \
                -e "s|\${SNMP_TARGET_UDM}|${SNMP_TARGET_UDM}|g" \
                -e "s|\${SNMP_TARGET_SW_BAIE}|${SNMP_TARGET_SW_BAIE}|g" \
                -e "s|\${SNMP_TARGET_SW_ATELIER}|${SNMP_TARGET_SW_ATELIER}|g" \
                -e "s|\${SNMP_TARGET_AP_COULOIR}|${SNMP_TARGET_AP_COULOIR}|g" \
                -e "s|\${SNMP_TARGET_AP_CUISINE}|${SNMP_TARGET_AP_CUISINE}|g" \
                -e "s|\${SNMP_TARGET_AP_SALON}|${SNMP_TARGET_AP_SALON}|g" \
                -e "s|\${SNMP_TARGET_AP_ATELIER}|${SNMP_TARGET_AP_ATELIER}|g" \
                /tpl/vmscrape.yaml | kubectl apply --timeout=30s -f - && echo "VMStaticScrape applied"
          env:
            - name: SNMP_TARGET_UDM
              valueFrom:
                secretKeyRef:
                  name: snmp-exporter-secrets
                  key: SNMP_TARGET_UDM
            - name: SNMP_TARGET_SW_BAIE
              valueFrom:
                secretKeyRef:
                  name: snmp-exporter-secrets
                  key: SNMP_TARGET_SW_BAIE
            - name: SNMP_TARGET_SW_ATELIER
              valueFrom:
                secretKeyRef:
                  name: snmp-exporter-secrets
                  key: SNMP_TARGET_SW_ATELIER
            - name: SNMP_TARGET_AP_COULOIR
              valueFrom:
                secretKeyRef:
                  name: snmp-exporter-secrets
                  key: SNMP_TARGET_AP_COULOIR
            - name: SNMP_TARGET_AP_CUISINE
              valueFrom:
                secretKeyRef:
                  name: snmp-exporter-secrets
                  key: SNMP_TARGET_AP_CUISINE
            - name: SNMP_TARGET_AP_SALON
              valueFrom:
                secretKeyRef:
                  name: snmp-exporter-secrets
                  key: SNMP_TARGET_AP_SALON
            - name: SNMP_TARGET_AP_ATELIER
              valueFrom:
                secretKeyRef:
                  name: snmp-exporter-secrets
                  key: SNMP_TARGET_AP_ATELIER
          volumeMounts:
            - name: vmscrape-tpl
              mountPath: /tpl
      containers:
        - name: snmp-exporter
          image: prom/snmp-exporter:v0.26.0
          args:
            - --config.file=/config/snmp.yml
            - --log.level=info
          ports:
            - name: http
              containerPort: 9116
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: config-out
              mountPath: /config
      volumes:
        - name: config-tpl
          configMap:
            name: snmp-exporter-config
        - name: config-out
          emptyDir: {}
        - name: vmscrape-tpl
          configMap:
            name: snmp-exporter-vmscrape-tpl

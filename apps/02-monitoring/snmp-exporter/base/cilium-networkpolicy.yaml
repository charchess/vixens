---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: snmp-exporter
  namespace: monitoring
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: snmp-exporter
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "9116"
              protocol: TCP
  egress:
    # snmp-exporter → SNMP devices on local network (port 161 UDP)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "161"
              protocol: UDP

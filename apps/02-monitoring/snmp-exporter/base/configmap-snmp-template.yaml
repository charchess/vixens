---
apiVersion: v1
kind: ConfigMap
metadata:
  name: snmp-exporter-config-template
  namespace: monitoring
data:
  snmp.yml.tmpl: |
    # SNMP Exporter config — IF-MIB (interfaces/ports)
    # ${SNMP_COMMUNITY} is substituted at pod startup via envsubst

    auths:
      default:
        community: ${SNMP_COMMUNITY}
        version: 2

    modules:
      if_mib:
        auth: default
        walk:
          - 1.3.6.1.2.1.2.2.1    # ifTable (interfaces)
          - 1.3.6.1.2.1.31.1.1.1  # ifXTable (64-bit counters + ifName/ifAlias)
          - 1.3.6.1.2.1.1.3       # sysUpTime
          - 1.3.6.1.2.1.1.5       # sysName
        lookups:
          # Add ifName label (human-readable port name, e.g. "Gi1/0/1")
          - source_indexes: [ifIndex]
            lookup: 1.3.6.1.2.1.31.1.1.1.1
            drop_source_indexes: false
          # Add ifAlias label (admin description, e.g. "uplink-to-core")
          - source_indexes: [ifIndex]
            lookup: 1.3.6.1.2.1.31.1.1.1.18
            drop_source_indexes: false
          # Add ifDescr label (interface type description)
          - source_indexes: [ifIndex]
            lookup: 1.3.6.1.2.1.2.2.1.2
            drop_source_indexes: false
        overrides:
          # Drop 32-bit traffic counters — use 64-bit ifHC* instead
          ifInOctets:
            ignore: true
          ifOutOctets:
            ignore: true
          ifInUcastPkts:
            ignore: true
          ifOutUcastPkts:
            ignore: true
          ifInNUcastPkts:
            ignore: true
          ifOutNUcastPkts:
            ignore: true
          # Drop noise
          ifPhysAddress:
            ignore: true
          ifSpecific:
            ignore: true
          ifLastChange:
            ignore: true
          ifMtu:
            ignore: true
          ifType:
            ignore: true

---
# snmp.yml template — ${SNMP_COMMUNITY} et ${SNMP_COMMUNITY_FULL} substitués par l'init container
# unifi_v2c      : 20 chars → switches (USW-Lite firmware truncate à 20)
# unifi_v2c_full : 21 chars → UDM + APs (pas de troncature)
apiVersion: v1
kind: ConfigMap
metadata:
  name: snmp-exporter-config
data:
  snmp.yml: |
    auths:
      unifi_v2c:
        community: ${SNMP_COMMUNITY}
        version: 2
      unifi_v2c_full:
        community: ${SNMP_COMMUNITY_FULL}
        version: 2

    modules:
      if_mib:
        walk:
          - 1.3.6.1.2.1.1.3      # sysUpTime
          - 1.3.6.1.2.1.2        # interfaces table
          - 1.3.6.1.2.1.31.1.1   # ifXTable (64-bit counters + ifName/ifAlias)
        metrics:
          - name: sysUpTime
            oid: 1.3.6.1.2.1.1.3.0
            type: gauge
            help: Time since last reinit (centiseconds)

          - name: ifOperStatus
            oid: 1.3.6.1.2.1.2.2.1.8
            type: gauge
            help: Operational state of the interface (1=up, 2=down, 3=testing)
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString
              - labels: [ifIndex]
                labelname: ifName
                oid: 1.3.6.1.2.1.31.1.1.1.1
                type: DisplayString
              - labels: [ifIndex]
                labelname: ifAlias
                oid: 1.3.6.1.2.1.31.1.1.1.18
                type: DisplayString

          - name: ifHighSpeed
            oid: 1.3.6.1.2.1.31.1.1.1.15
            type: gauge
            help: Current bandwidth estimate in Mbps
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString
              - labels: [ifIndex]
                labelname: ifName
                oid: 1.3.6.1.2.1.31.1.1.1.1
                type: DisplayString
              - labels: [ifIndex]
                labelname: ifAlias
                oid: 1.3.6.1.2.1.31.1.1.1.18
                type: DisplayString

          - name: ifHCInOctets
            oid: 1.3.6.1.2.1.31.1.1.1.6
            type: counter
            help: Total octets received on the interface (64-bit)
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString
              - labels: [ifIndex]
                labelname: ifName
                oid: 1.3.6.1.2.1.31.1.1.1.1
                type: DisplayString
              - labels: [ifIndex]
                labelname: ifAlias
                oid: 1.3.6.1.2.1.31.1.1.1.18
                type: DisplayString

          - name: ifHCOutOctets
            oid: 1.3.6.1.2.1.31.1.1.1.10
            type: counter
            help: Total octets transmitted on the interface (64-bit)
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString
              - labels: [ifIndex]
                labelname: ifName
                oid: 1.3.6.1.2.1.31.1.1.1.1
                type: DisplayString
              - labels: [ifIndex]
                labelname: ifAlias
                oid: 1.3.6.1.2.1.31.1.1.1.18
                type: DisplayString

          - name: ifInErrors
            oid: 1.3.6.1.2.1.2.2.1.14
            type: counter
            help: Inbound packets with errors
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString
              - labels: [ifIndex]
                labelname: ifName
                oid: 1.3.6.1.2.1.31.1.1.1.1
                type: DisplayString
              - labels: [ifIndex]
                labelname: ifAlias
                oid: 1.3.6.1.2.1.31.1.1.1.18
                type: DisplayString

          - name: ifOutErrors
            oid: 1.3.6.1.2.1.2.2.1.20
            type: counter
            help: Outbound packets that could not be transmitted due to errors
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString
              - labels: [ifIndex]
                labelname: ifName
                oid: 1.3.6.1.2.1.31.1.1.1.1
                type: DisplayString
              - labels: [ifIndex]
                labelname: ifAlias
                oid: 1.3.6.1.2.1.31.1.1.1.18
                type: DisplayString

          - name: ifInDiscards
            oid: 1.3.6.1.2.1.2.2.1.13
            type: counter
            help: Inbound packets discarded even though no errors detected
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString
              - labels: [ifIndex]
                labelname: ifName
                oid: 1.3.6.1.2.1.31.1.1.1.1
                type: DisplayString
              - labels: [ifIndex]
                labelname: ifAlias
                oid: 1.3.6.1.2.1.31.1.1.1.18
                type: DisplayString

          - name: ifOutDiscards
            oid: 1.3.6.1.2.1.2.2.1.19
            type: counter
            help: Outbound packets discarded even though no errors detected
            indexes:
              - labelname: ifIndex
                type: gauge
            lookups:
              - labels: [ifIndex]
                labelname: ifDescr
                oid: 1.3.6.1.2.1.2.2.1.2
                type: DisplayString
              - labels: [ifIndex]
                labelname: ifName
                oid: 1.3.6.1.2.1.31.1.1.1.1
                type: DisplayString
              - labels: [ifIndex]
                labelname: ifAlias
                oid: 1.3.6.1.2.1.31.1.1.1.18
                type: DisplayString

      udm_resources:
        walk:
          - 1.3.6.1.4.1.2021.11  # UCD-SNMP-MIB CPU raw counters
          - 1.3.6.1.4.1.2021.4   # UCD-SNMP-MIB memory
          - 1.3.6.1.2.1.1.3      # sysUpTime
        metrics:
          - name: sysUpTime
            oid: 1.3.6.1.2.1.1.3.0
            type: gauge
            help: Time since last reinit (centiseconds)

          # CPU raw counters (UCD-SNMP-MIB) — use rate() in Grafana
          - name: ssCpuRawUser
            oid: 1.3.6.1.4.1.2021.11.50.0
            type: counter
            help: CPU time spent in user space (raw ticks)
          - name: ssCpuRawNice
            oid: 1.3.6.1.4.1.2021.11.51.0
            type: counter
            help: CPU time spent in nice processes (raw ticks)
          - name: ssCpuRawSystem
            oid: 1.3.6.1.4.1.2021.11.52.0
            type: counter
            help: CPU time spent in kernel space (raw ticks)
          - name: ssCpuRawIdle
            oid: 1.3.6.1.4.1.2021.11.53.0
            type: counter
            help: CPU idle time (raw ticks)
          - name: ssCpuRawWait
            oid: 1.3.6.1.4.1.2021.11.54.0
            type: counter
            help: CPU time waiting for I/O (raw ticks)
          - name: ssCpuRawInterrupt
            oid: 1.3.6.1.4.1.2021.11.56.0
            type: counter
            help: CPU time spent handling hardware interrupts (raw ticks)

          # Memory (UCD-SNMP-MIB) — values in KB
          - name: memTotalReal
            oid: 1.3.6.1.4.1.2021.4.5.0
            type: gauge
            help: Total RAM in KB
          - name: memAvailReal
            oid: 1.3.6.1.4.1.2021.4.6.0
            type: gauge
            help: Available RAM in KB (excluding buffers/cache)
          - name: memBuffer
            oid: 1.3.6.1.4.1.2021.4.14.0
            type: gauge
            help: Memory used as buffers in KB
          - name: memCached
            oid: 1.3.6.1.4.1.2021.4.15.0
            type: gauge
            help: Memory used as cache in KB

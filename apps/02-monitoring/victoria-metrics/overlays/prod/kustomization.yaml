---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
labels:
  - includeSelectors: false
    pairs:
      environment: prod
resources:
  - ../../base
  - ssa-vmagent.yaml
  - ssa-vmalert.yaml
  - ssa-vmsingle.yaml
  - ssa-vmalertmanager.yaml
patches:
  - path: patch-infisical-env.yaml
    target:
      kind: InfisicalSecret
      name: vm-alertmanager-secrets-sync

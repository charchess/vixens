---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
labels:
  - includeSelectors: false
    pairs:
      environment: prod
resources:
  - ../../base
patches:
  - path: patch-infisical-env.yaml
    target:
      kind: InfisicalSecret
      name: vm-alertmanager-secrets-sync
  - patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: "7"
      - op: add
        path: /metadata/annotations/goldilocks.fairwinds.com~1enabled
        value: "true"
      - op: add
        path: /metadata/annotations/vpa.kubernetes.io~1updateMode
        value: "Off"
      - op: replace
        path: /spec/revisionHistoryLimit
        value: 3
    target:
      kind: Deployment
      name: vmsingle-vm-stack
  - patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: "7"
      - op: add
        path: /metadata/annotations/goldilocks.fairwinds.com~1enabled
        value: "true"
      - op: add
        path: /metadata/annotations/vpa.kubernetes.io~1updateMode
        value: "Off"
      - op: replace
        path: /spec/revisionHistoryLimit
        value: 3
    target:
      kind: Deployment
      name: vmagent-vm-stack
  - patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: "7"
      - op: add
        path: /metadata/annotations/goldilocks.fairwinds.com~1enabled
        value: "true"
      - op: add
        path: /metadata/annotations/vpa.kubernetes.io~1updateMode
        value: "Off"
      - op: replace
        path: /spec/revisionHistoryLimit
        value: 3
    target:
      kind: Deployment
      name: vmalert-vm-stack
  - patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: "7"
      - op: add
        path: /metadata/annotations/goldilocks.fairwinds.com~1enabled
        value: "true"
      - op: add
        path: /metadata/annotations/vpa.kubernetes.io~1updateMode
        value: "Off"
      - op: replace
        path: /spec/revisionHistoryLimit
        value: 3
    target:
      kind: StatefulSet
      name: vmalertmanager-vm-stack
  - patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: "7"
      - op: add
        path: /metadata/annotations/goldilocks.fairwinds.com~1enabled
        value: "true"
      - op: add
        path: /metadata/annotations/vpa.kubernetes.io~1updateMode
        value: "Off"
      - op: replace
        path: /spec/revisionHistoryLimit
        value: 3
    target:
      kind: Deployment
      name: victoria-metrics-victoria-metrics-operator
  - patch: |-
      - op: add
        path: /metadata/annotations/argocd.argoproj.io~1sync-wave
        value: "7"
      - op: add
        path: /metadata/annotations/goldilocks.fairwinds.com~1enabled
        value: "true"
      - op: add
        path: /metadata/annotations/vpa.kubernetes.io~1updateMode
        value: "Off"
    target:
      kind: Deployment
      name: victoria-metrics-kube-state-metrics

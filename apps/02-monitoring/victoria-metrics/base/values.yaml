---
# VictoriaMetrics K8s Stack — replaces Prometheus
# Chart: victoria-metrics-k8s-stack 0.72.5

# Shorten resource name prefix to avoid >63 char Service names
# (victoria-metrics-victoria-metrics-k8s-stack-* was 45 chars before suffix)
fullnameOverride: vm-stack

# --- VM Operator ---
victoria-metrics-operator:
  enabled: true
  podLabels:
    vixens.io/priority-class: vixens-low
    vixens.io/sizing.operator: V-nano
    app.kubernetes.io/managed-by: argocd
  resources:
    requests:
      cpu: 5m
      memory: 64Mi
    limits:
      cpu: 20m
      memory: 256Mi
  annotations:
    vixens.io/service-binding: "false"
    vixens.io/fast-start: "true"
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: /metrics
    goldilocks.fairwinds.com/enabled: "true"
    vpa.kubernetes.io/updateMode: "Off"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

# --- VMSingle (replaces prometheus-server) ---
vmsingle:
  enabled: true
  spec:
    revisionHistoryLimitCount: 3
    retentionPeriod: "30d"
    storage:
      storageClassName: synelia-iscsi-retain
      resources:
        requests:
          storage: 10Gi
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: "1"
        memory: 1Gi
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    podMetadata:
      annotations:
        vixens.io/fast-start: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8429"
        # vmsingle V-large = 2560Mi
        vixens.io/vpa.max-memory: "2560Mi"
      labels:
        vixens.io/sizing.vmsingle: V-large
    priorityClassName: vixens-critical

# --- VMAgent (scraper, replaces prometheus scraping) ---
vmagent:
  enabled: true
  spec:
    revisionHistoryLimitCount: 3
    scrapeInterval: 30s
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    podMetadata:
      annotations:
        vixens.io/fast-start: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8429"
        prometheus.io/path: "/metrics"
      labels:
        vixens.io/sizing.vmagent: V-nano
        vixens.io/sizing.config-reloader: G-nano
    priorityClassName: vixens-critical
    inlineRelabelConfig:
      # Go runtime internals (every exporter)
      - action: drop
        source_labels: [__name__]
        regex: "go_(gc|memstats|threads|goroutines|info).*"
      # Process metrics (every exporter)
      - action: drop
        source_labels: [__name__]
        regex: "process_(cpu_seconds_total|resident_memory_bytes|virtual_memory_bytes|open_fds|max_fds|start_time_seconds)"
      # Promhttp handler internals
      - action: drop
        source_labels: [__name__]
        regex: "promhttp_metric_handler_.*"
      # Workqueue internals (controller-manager, scheduler)
      - action: drop
        source_labels: [__name__]
        regex: "workqueue_(depth|adds_total|queue_duration_seconds_bucket|work_duration_seconds_bucket|unfinished_work_seconds|longest_running_processor_seconds).*"
      # Kyverno policy execution histogram buckets
      - action: drop
        source_labels: [__name__]
        regex: "kyverno_policy_execution_duration_seconds_bucket"
      # Hubble port distribution (high cardinality)
      - action: drop
        source_labels: [__name__]
        regex: "hubble_port_distribution_total"

# --- VMAlert (alert evaluation) ---
vmalert:
  enabled: true
  spec:
    revisionHistoryLimitCount: 3
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    priorityClassName: vixens-critical
    podMetadata:
      annotations:
        vixens.io/fast-start: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8880"
        prometheus.io/path: "/metrics"
      labels:
        vixens.io/sizing.vmalert: V-nano
        vixens.io/sizing.config-reloader: G-nano

# --- Alertmanager (keep Discord config from Prometheus) ---
alertmanager:
  enabled: true
  spec:
    revisionHistoryLimitCount: 3
    configSecret: alertmanager-config
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    priorityClassName: vixens-critical
    podMetadata:
      annotations:
        vixens.io/fast-start: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "9093"
        prometheus.io/path: "/metrics"
      labels:
        vixens.io/sizing.alertmanager: V-nano
        vixens.io/sizing.config-reloader: G-nano
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by:
        - alertname
        - cluster
        - service
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: discord-notifications
      routes:
        - match:
            severity: critical
          receiver: discord-notifications
    receivers:
      - name: discord-notifications
        slack_configs:
          - api_url_file: /etc/alertmanager-secrets/DISCORD_WEBHOOK_URL
            channel: '#alerts'
            send_resolved: true

# --- Node exporter (subchart) ---
prometheus-node-exporter:
  enabled: true
  priorityClassName: vixens-critical
  podAnnotations:
    vixens.io/fast-start: "true"
  podLabels:
    vixens.io/sizing.node-exporter: V-nano
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  hostNetwork: true
  hostPID: true
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# --- Kube-state-metrics (subchart) ---
kube-state-metrics:
  enabled: true
  collectors:
    - daemonsets
    - deployments
    - namespaces
    - nodes
    - persistentvolumeclaims
    - persistentvolumes
    - pods
    - replicasets
    - statefulsets
    - cronjobs
    - jobs
  priorityClassName: vixens-critical
  podAnnotations:
    vixens.io/service-binding: "false"
    vixens.io/fast-start: "true"
    vixens.io/no-long-connections: "true"
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: /metrics
  podLabels:
    vixens.io/sizing.kube-state-metrics: V-micro
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# --- Grafana (disabled — already deployed separately) ---
grafana:
  enabled: false

# --- Default scrape configs ---
defaultDashboards:
  enabled: true
  dashboards:
    node-exporter-full:
      enabled: false  # Too large for K8s annotation limit (>262144 bytes)

kubelet:
  enabled: true
  vmScrape:
    spec:
      interval: "30s"
      metricRelabelConfigs:
        # Drop noisy cadvisor metrics nobody checks
        - action: drop
          source_labels: [__name__]
          regex: "container_(tasks_state|memory_failures_total|blkio_device_usage_total).*"
        # Drop kubelet runtime operation detail
        - action: drop
          source_labels: [__name__]
          regex: "kubelet_runtime_operations_duration_seconds_bucket"

kubeApiServer:
  enabled: true
  vmScrape:
    spec:
      endpoints:
        - port: https
          scheme: https
          bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
          tlsConfig:
            caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            serverName: kubernetes
          interval: "60s"
          metricRelabelConfigs:
            # Drop all apiserver histogram buckets (~130k series)
            - action: drop
              source_labels: [__name__]
              regex: "(apiserver_request_duration_seconds|apiserver_request_sli_duration_seconds|apiserver_request_body_size_bytes|apiserver_response_sizes|apiserver_watch_cache_read_wait_seconds|apiserver_watch_list_duration_seconds)_bucket"
            # Drop admission controller internals
            - action: drop
              source_labels: [__name__]
              regex: "apiserver_admission_.*"

kubeControllerManager:
  enabled: true
  vmScrape:
    spec:
      endpoints:
        - port: http-metrics
          scheme: https
          bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
          tlsConfig:
            caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            insecureSkipVerify: true
          interval: "60s"

kubeScheduler:
  enabled: true
  vmScrape:
    spec:
      endpoints:
        - port: http-metrics
          scheme: https
          bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
          tlsConfig:
            caFile: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            insecureSkipVerify: true
          interval: "60s"

kubeEtcd:
  enabled: true
  vmScrape:
    spec:
      endpoints:
        - port: http-metrics
          scheme: http
          interval: "60s"
          metricRelabelConfigs:
            # Drop etcd histogram buckets
            - action: drop
              source_labels: [__name__]
              regex: "etcd_request_duration_seconds_bucket"
            # Drop debug/disk detail metrics
            - action: drop
              source_labels: [__name__]
              regex: "etcd_(debugging|disk_defrag|mvcc_db_total_size_in_use|server_slow).*"

coreDns:
  enabled: true

kubeProxy:
  enabled: false  # Cilium replaces kube-proxy

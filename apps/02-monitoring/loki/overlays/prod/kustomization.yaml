---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
commonLabels:
  environment: prod
resources:
  - ../../base
patches:
  - path: infisical-patch.yaml
    target:
      kind: InfisicalSecret
      name: loki-secrets-sync
  - target:
      kind: StatefulSet
      name: loki
    patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: loki
      spec:
        template:
          metadata:
            labels:
              vixens.io/sizing.loki: G-medium

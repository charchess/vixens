---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: loki
spec:
  endpointSelector:
    matchLabels:
      app: loki
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "3100"
              protocol: TCP
  egress:
    - {}

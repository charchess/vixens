---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-syslog-config
  namespace: monitoring
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        5
        Daemon       off
        Log_Level    info
        HTTP_Server  on
        HTTP_Listen  0.0.0.0
        HTTP_Port    2020

    [INPUT]
        Name         syslog
        Listen       0.0.0.0
        Port         514
        Mode         udp
        Parser       syslog-rfc3164-local

    [INPUT]
        Name         syslog
        Listen       0.0.0.0
        Port         514
        Mode         tcp
        Parser       syslog-rfc3164-local

    [FILTER]
        Name         modify
        Match        *
        Add          cluster prod
        Add          source external

    [OUTPUT]
        Name         loki
        Match        *
        Host         loki.monitoring.svc.cluster.local
        Port         3100
        Labels       job=syslog, cluster=prod
        Auto_Kubernetes_Labels off
        Line_Format  json

  parsers.conf: |
    [PARSER]
        Name         syslog-rfc3164-local
        Format       regex
        Regex        ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
        Time_Key     time
        Time_Format  %b %d %H:%M:%S
        Time_Keep    on

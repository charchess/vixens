---
# Kustomize Component: CP Toleration
#
# Injects control-plane toleration into all Deployments, StatefulSets, and DaemonSets.
# Required for scheduling on CP nodes when workers are under memory pressure.
#
# Note: The add-cp-toleration Kyverno MutatePolicy also injects this at admission,
# but the manifest must declare it explicitly to pass the check-cp-toleration audit policy.
#
# Usage in overlay:
#   components:
#     - ../../../../_shared/components/tolerations
#
# Reference: apps/00-infra/kyverno/base/policies/add-cp-toleration.yaml

apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  - target:
      kind: Deployment
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: all-workloads
      spec:
        template:
          spec:
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule

  - target:
      kind: StatefulSet
    patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: all-workloads
      spec:
        template:
          spec:
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule

  - target:
      kind: DaemonSet
    patch: |-
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: all-workloads
      spec:
        template:
          spec:
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule

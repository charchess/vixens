---
# Kustomize Component: Goldilocks Enabled
#
# Enables Goldilocks VPA recommendations for resource optimization.
# Sets VPA to observation mode (Off) - recommendations only, no auto-apply.
#
# Typical usage: All applications requiring VPA resource recommendations
#
# Usage in overlay:
#   components:
#     - ../../../../_shared/components/goldilocks/enabled
#
# Reference: https://goldilocks.docs.fairwinds.com/

apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  # Apply Goldilocks annotations to all Deployments
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: all-deployments
        annotations:
          goldilocks.fairwinds.com/enabled: "true"
          vpa.kubernetes.io/updateMode: "Off"
    target:
      kind: Deployment

  # Apply Goldilocks annotations to all StatefulSets
  - patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: all-statefulsets
        annotations:
          goldilocks.fairwinds.com/enabled: "true"
          vpa.kubernetes.io/updateMode: "Off"
    target:
      kind: StatefulSet

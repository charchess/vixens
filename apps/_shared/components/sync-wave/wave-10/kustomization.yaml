---
# Kustomize Component: Sync Wave 10
#
# ArgoCD sync-wave annotation for standard applications.
# Wave 10 is the DEFAULT application layer, deploying AFTER infrastructure.
#
# Typical usage: Most application workloads (Jellyfin, n8n, Vaultwarden, etc.)
#
# Usage in overlay:
#   components:
#     - ../../../../_shared/components/sync-wave/wave-10
#
# Reference: https://argo-cd.readthedocs.io/en/stable/user-guide/sync-waves/

apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

patches:
  # Apply sync-wave=10 to all Deployments
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: all-deployments
        annotations:
          argocd.argoproj.io/sync-wave: "10"
    target:
      kind: Deployment

  # Apply sync-wave=10 to all StatefulSets
  - patch: |-
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: all-statefulsets
        annotations:
          argocd.argoproj.io/sync-wave: "10"
    target:
      kind: StatefulSet

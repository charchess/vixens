---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: penpot-exporter
  namespace: tools
  labels:
    app: penpot-exporter
    component: exporter
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: penpot-exporter
  template:
    metadata:
      annotations:
        vixens.io/fast-start: "true"
        vixens.io/no-long-connections: "true"
      labels:
        app: penpot-exporter
        component: exporter
        vixens.io/sizing.exporter: V-small
        vixens.io/backup-profile: "standard"
    spec:
      priorityClassName: vixens-medium
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: exporter
          image: penpotapp/exporter:2.14.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: penpot-secrets
          env:
            - name: PENPOT_PUBLIC_URI
              value: "https://design.truxonline.com"
            - name: PENPOT_REDIS_URI
              valueFrom:
                secretKeyRef:
                  name: penpot-secrets
                  key: PENPOT_REDIS_URI
          ports:
            - containerPort: 6061
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 20
            periodSeconds: 10
      securityContext:
        # runAsNonRoot: true  # DISABLED: penpot/exporter runs as root — verify image before re-enabling
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: Always

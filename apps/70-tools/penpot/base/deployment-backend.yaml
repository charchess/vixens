---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: penpot-backend
  namespace: tools
  labels:
    app: penpot-backend
    component: backend
    vixens.io/sizing-v2: "true"
    vixens.io/vpa-mode: Off
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: penpot-backend
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        vixens.io/fast-start: "true"
        vixens.io/no-long-connections: "true"
      labels:
        app: penpot-backend
        component: backend
        vixens.io/sizing.backend: B-large
        vixens.io/backup-profile: standard
    spec:
      priorityClassName: vixens-medium
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: backend
          image: penpotapp/backend:2.13.3
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: penpot-secrets
          env:
            - name: PENPOT_FLAGS
              value: "enable-registration enable-login-with-password disable-secure-session-cookies disable-email-verification enable-access-tokens"
            - name: PENPOT_PUBLIC_URI
              value: "https://design.truxonline.com"
            - name: PENPOT_DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: penpot-secrets
                  key: PENPOT_DATABASE_URI
            - name: PENPOT_REDIS_URI
              valueFrom:
                secretKeyRef:
                  name: penpot-secrets
                  key: PENPOT_REDIS_URI
            - name: PENPOT_OBJECTS_STORAGE_BACKEND
              value: "fs"
            - name: PENPOT_OBJECTS_STORAGE_FS_DIRECTORY
              value: "/opt/data/objects"
          ports:
            - containerPort: 6060
              name: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            failureThreshold: 20
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /opt/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: penpot-data
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: Always

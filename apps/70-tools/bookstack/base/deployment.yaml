---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstack
  labels:
    app: bookstack
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bookstack
  template:
    metadata:
      labels:
        app: bookstack
        vixens.io/sizing.bookstack: V-small
        vixens.io/sizing.config-syncer: V-nano
        vixens.io/sizing.restore-config: B-nano
        vixens.io/backup-profile: "standard"
      annotations:
        reloader.stakater.com/auto: "true"
        vixens.io/fast-start: "true"
        vixens.io/no-long-connections: "true"
        vixens.io/explicitly-allow-root: "true"
    spec:
      priorityClassName: vixens-low
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-run-dir
          image: busybox:1.37.0
          command: ["sh", "-c", "chown 1000:1000 /run"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: run
              mountPath: /run
        - name: restore-config
          image: rclone/rclone:1.73
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          command:
            - sh
            - -c
          args:
            - |
              export RCLONE_CONFIG_S3_TYPE=s3
              export RCLONE_CONFIG_S3_PROVIDER=Other
              export RCLONE_CONFIG_S3_ACCESS_KEY_ID=$LITESTREAM_ACCESS_KEY_ID
              export RCLONE_CONFIG_S3_SECRET_ACCESS_KEY=$LITESTREAM_SECRET_ACCESS_KEY
              export RCLONE_CONFIG_S3_ENDPOINT=$LITESTREAM_ENDPOINT
              rclone copy s3:$LITESTREAM_BUCKET/config /config \
                --transfers 4 \
                --exclude "*.log" \
                --exclude "cache/**" \
                || true
          envFrom:
            - secretRef:
                name: bookstack-secrets
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: bookstack
          image: lscr.io/linuxserver/bookstack:26.03.20
          ports:
            - containerPort: 80
              name: http
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Paris
            - name: APP_URL
              value: "https://bookstack.truxonline.com"
            - name: DB_HOST
              value: "bookstack-mariadb"
            - name: DB_PORT
              value: "3306"
            - name: DB_DATABASE
              value: "bookstack"
            - name: DB_USERNAME
              value: "bookstack"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bookstack-secrets
                  key: DB_PASSWORD
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: bookstack-secrets
                  key: APP_KEY
            - name: AUTH_METHOD
              value: "oidc"
            - name: AUTH_AUTO_INITIATE
              value: "true"
            - name: OIDC_NAME
              value: "Authentik"
            - name: OIDC_DISPLAY_NAME_CLAIMS
              value: "name"
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: bookstack-secrets
                  key: OIDC_CLIENT_ID
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bookstack-secrets
                  key: OIDC_CLIENT_SECRET
            - name: OIDC_ISSUER
              valueFrom:
                secretKeyRef:
                  name: bookstack-secrets
                  key: OIDC_ISSUER
            - name: OIDC_ISSUER_DISCOVER
              value: "true"
            - name: OIDC_END_SESSION_ENDPOINT
              value: "true"
            - name: OIDC_USER_TO_GROUPS
              value: "true"
            - name: OIDC_GROUPS_CLAIM
              value: "groups"
            - name: OIDC_ADDITIONAL_SCOPES
              value: "groups"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: run
              mountPath: /run
            - name: config
              mountPath: /config
        - name: config-syncer
          image: rclone/rclone:1.73
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          command:
            - sh
            - -c
          args:
            - |
              export RCLONE_CONFIG_S3_TYPE=s3
              export RCLONE_CONFIG_S3_PROVIDER=Other
              export RCLONE_CONFIG_S3_ACCESS_KEY_ID=$LITESTREAM_ACCESS_KEY_ID
              export RCLONE_CONFIG_S3_SECRET_ACCESS_KEY=$LITESTREAM_SECRET_ACCESS_KEY
              export RCLONE_CONFIG_S3_ENDPOINT=$LITESTREAM_ENDPOINT
              sync_s3() {
                rclone sync /config s3:$LITESTREAM_BUCKET/config \
                  --exclude "*.log" \
                  --exclude "cache/**";
              }
              while true; do
                sync_s3;
                sleep 60;
              done
          envFrom:
            - secretRef:
                name: bookstack-secrets
          volumeMounts:
            - name: config
              mountPath: /config
          livenessProbe:
            exec:
              command: ["pgrep", "-f", "sync_s3"]
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 5
      volumes:
        - name: run
          emptyDir: {}
        - name: config
          persistentVolumeClaim:
            claimName: bookstack-config-pvc

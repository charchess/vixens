---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstack-mariadb
  labels:
    app: bookstack-mariadb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bookstack-mariadb
  template:
    metadata:
      labels:
        app: bookstack-mariadb
        vixens.io/sizing.mariadb: V-small
        vixens.io/sizing.db-backup: V-nano
        vixens.io/backup-profile: "standard"
      annotations:
        vixens.io/fast-start: "true"
        vixens.io/explicitly-allow-root: "true"
    spec:
      priorityClassName: vixens-low
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-run-dir
          image: busybox:1.37.0
          command: ["sh", "-c", "chown 1000:1000 /run"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: run
              mountPath: /run
      containers:
        - name: mariadb
          image: lscr.io/linuxserver/mariadb:11.4.8
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Paris
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bookstack-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: bookstack
            - name: MYSQL_USER
              value: bookstack
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bookstack-secrets
                  key: DB_PASSWORD
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD}"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD}"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD}"
            failureThreshold: 20
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: run
              mountPath: /run
            - name: config
              mountPath: /config
        - name: db-backup
          image: alpine:3.23
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
          args:
            - |
              apk add --no-cache mariadb-client rclone > /dev/null 2>&1
              export RCLONE_CONFIG_S3_TYPE=s3
              export RCLONE_CONFIG_S3_PROVIDER=Other
              export RCLONE_CONFIG_S3_ACCESS_KEY_ID=$LITESTREAM_ACCESS_KEY_ID
              export RCLONE_CONFIG_S3_SECRET_ACCESS_KEY=$LITESTREAM_SECRET_ACCESS_KEY
              export RCLONE_CONFIG_S3_ENDPOINT=$LITESTREAM_ENDPOINT
              while true; do
                TIMESTAMP=$(date +%Y%m%d-%H%M)
                mariadb-dump -h bookstack-mariadb -u bookstack -p"$DB_PASSWORD" bookstack > /tmp/bookstack.sql
                if [ $? -eq 0 ] && [ -s /tmp/bookstack.sql ]; then
                  rclone copyto /tmp/bookstack.sql "s3:$LITESTREAM_BUCKET/mariadb/bookstack-${TIMESTAMP}.sql"
                  rclone copyto /tmp/bookstack.sql "s3:$LITESTREAM_BUCKET/mariadb/bookstack-latest.sql"
                  echo "[$(date)] Backup success: bookstack-${TIMESTAMP}.sql"
                else
                  echo "[$(date)] Backup FAILED or empty"
                fi
                sleep 900
              done
          envFrom:
            - secretRef:
                name: bookstack-secrets
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pgrep -f "mariadb-dump" || pgrep -f "sleep 900" || exit 1
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pgrep -f "mariadb-dump" || pgrep -f "sleep 900" || exit 1
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: run
          emptyDir: {}
        - name: config
          persistentVolumeClaim:
            claimName: bookstack-mariadb-pvc

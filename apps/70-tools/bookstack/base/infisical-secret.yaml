---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: bookstack-secrets-sync
  labels:
    vixens.lab/managed-by: argocd
spec:
  hostAPI: http://192.168.111.69:8085
  resyncInterval: 60
  authentication:
    universalAuth:
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: argocd
      secretsScope:
        projectSlug: vixens
        envSlug: dev
        secretsPath: /apps/70-tools/bookstack
  managedSecretReference:
    secretName: bookstack-secrets
    creationPolicy: Owner
    secretNamespace: tools

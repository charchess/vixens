---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tools
components:
  - ../../../../_shared/components/sync-wave/wave-9
  - ../../../../_shared/components/goldilocks/enabled
  - ../../../../_shared/components/nometrics

patches:
  - path: infisical-config-patch.yaml
    target:
      kind: InfisicalSecret
      name: homepage-config-sync
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: homepage
  - patch: |-
      - op: replace
        path: /spec/storageClassName
        value: local-path-delete
    target:
      kind: PersistentVolumeClaim
      name: homepage-config
resources:
  - ../../base
  - ingress.yaml
  - ingress-redirect.yaml
  - infisical-secret.yaml

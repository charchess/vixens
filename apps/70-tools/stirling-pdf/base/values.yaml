---
# Stirling-PDF Helm Values
# Ref:
# https://github.com/Stirling-Tools/Stirling-PDF-chart/blob/main/values.yaml

image:
  registry: docker.stirlingpdf.com
  repository: stirlingtools/stirling-pdf
  pullPolicy: IfNotPresent
  tag: 2.7.0
replicaCount: 1
# resources managed by Kyverno sizing (B-large: req=1Gi, lim=2Gi — Java+LibreOffice combo)
# Tolerations for control-plane nodes if needed
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
# Probes configuration (Increased timeouts for slow startup)
probes:
  liveness:
    enabled: true
    httpGet:
      path: /
      port: 8080
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    enabled: true
    httpGet:
      path: /
      port: 8080
    initialDelaySeconds: 0
    periodSeconds: 10
    failureThreshold: 3
  startup:
    enabled: true
    httpGet:
      path: /
      port: 8080
    failureThreshold: 36
    periodSeconds: 10
envs:
  - name: SYSTEM_ROOTURIPATH
    value: /
  - name: SECURITY_ENABLELOGIN
    value: "false"
securityContext:
  enabled: true
  fsGroup: 1000
podLabels:
  vixens.io/sizing.stirling-pdf-chart: B-large
podAnnotations:
  # fast-start: liveness probe confirms HTTP is ready within 30s; LibreOffice loads lazily
  vixens.io/fast-start: "true"
  vixens.io/service-binding: "false"

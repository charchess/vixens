---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: stirling-pdf
  namespace: tools
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: stirling-pdf
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
  egress:
    - {}

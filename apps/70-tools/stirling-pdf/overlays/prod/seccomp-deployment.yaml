---
# Standalone Deployment resource merged by ArgoCD with the Helm source output.
# Required because the Helm chart (stirling-pdf-chart 2.2.0) does not render
# seccompProfile.type from values.securityContext, so we must inject it via
# ArgoCD multi-source strategic merge.
# LibreOffice (unoserver) requires seccompProfile: Unconfined to function.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stirling-pdf-stirling-pdf-chart
  namespace: tools
  labels:
    vixens.io/sizing.stirling-pdf-chart: G-medium
spec:
  template:
    spec:
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: Unconfined

---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tools
resources:
  - ../../base
  - ingress.yaml

components:
  - ../../../../_shared/components/gold-maturity
  - ../../../../_shared/components/revision-history-limit

patches:
  - patch: |-
      - op: add
        path: /metadata/labels/vixens.io~1sizing-v2
        value: "true"
      - op: add
        path: /metadata/labels/vixens.io~1vpa-mode
        value: "Off"
      - op: add
        path: /spec/template/metadata/labels/vixens.io~1sizing-v2
        value: "true"
    target:
      kind: Deployment
      name: stirling-pdf-stirling-pdf-chart

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: nocodb
  namespace: tools
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: nocodb
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
  egress:
    # nocodb → world (NAS/MinIO at 192.168.111.69:9000 for file storage)
    - toEntities:
        - world
    # nocodb → databases (PostgreSQL/MariaDB)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases

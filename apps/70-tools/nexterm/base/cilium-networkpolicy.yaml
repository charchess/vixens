apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: nexterm
  namespace: tools
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: nexterm
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring

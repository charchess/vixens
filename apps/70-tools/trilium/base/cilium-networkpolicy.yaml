---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: trilium
  namespace: tools
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: trilium
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
  egress:
    # trilium → world (NAS/MinIO at 192.168.111.69:9000 for attachments)
    - toEntities:
        - world

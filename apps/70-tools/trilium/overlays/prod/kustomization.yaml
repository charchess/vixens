---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - infisical-secret.yaml
components:
  - ../../../../_shared/components/sync-wave/wave-9
  - ../../../../_shared/components/goldilocks/enabled
  - ../../../../_shared/components/nometrics
  - ../../../../_shared/components/poddisruptionbudget/0
  - ../../../../_shared/components/dataangel

patches:
  - path: dataangel.yaml
  # Temporary: bind to existing iSCSI PV so ArgoCD desired state matches live.
  # Remove once DataAngel has backed up to S3 and local-path migration is done.
  - patch: |-
      - op: add
        path: /spec/volumeName
        value: pvc-2089fa07-ad0d-4a0a-a9cf-b3b28dc08b4b
    target:
      kind: PersistentVolumeClaim
      name: trilium-data-pvc
  - target:
      kind: Ingress
      name: trilium
    patch: |-
      - op: replace
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt-prod
      - op: replace
        path: /spec/rules/0/host
        value: notes.truxonline.com
      - op: replace
        path: /spec/tls/0/hosts/0
        value: notes.truxonline.com
      - op: replace
        path: /spec/tls/0/secretName
        value: trilium-tls-prod

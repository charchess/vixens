---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
patches:
- patch: "- op: replace\n  path: /spec/authentication/universalAuth/secretsScope/envSlug\n\
    \  value: dev"
  target:
    kind: InfisicalSecret
    name: vikunja-secrets-sync
- patch: "- op: replace\n  path: /metadata/annotations/cert-manager.io~1cluster-issuer\n\
    \  value: letsencrypt-staging"
  target:
    kind: Ingress
    name: vikunja
resources:
- ../../base
components:
- ../../../../_shared/components/dev-hibernate

---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
patches:
- patch: "- op: replace\n  path: /spec/authentication/universalAuth/secretsScope/envSlug\n\
    \  value: dev"
  target:
    kind: InfisicalSecret
    name: changedetection-secrets-sync
- patch: "- op: replace\n  path: /spec/template/spec/containers/0/env/0/value\n  value:\
    \ https://changedetection.dev.truxonline.com"
  target:
    kind: Deployment
    name: changedetection
resources:
- ../../base
- ingress.yaml
components:
- ../../../../_shared/components/dev-hibernate

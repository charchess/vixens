---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
components:
  - ../../../../_shared/components/sync-wave/wave-9
  - ../../../../_shared/components/goldilocks/enabled
  - ../../../../_shared/components/nometrics
  - ../../../../_shared/components/infisical/env-prod
  - ../../../../_shared/components/dataangel
  - ../../../../_shared/components/poddisruptionbudget/1

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: https://changedetection.truxonline.com
    target:
      kind: Deployment
      name: changedetection
  - path: dataangel.yaml
  - patch: |-
      - op: replace
        path: /spec/storageClassName
        value: local-path-retain
    target:
      kind: PersistentVolumeClaim
      name: changedetection-datastore-pvc
resources:
  - ../../base
  - ingress.yaml

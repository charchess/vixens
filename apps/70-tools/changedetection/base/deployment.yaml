---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: changedetection
  labels:
    app: changedetection
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: changedetection
  template:
    metadata:
      annotations:
        vixens.io/fast-start: "true"
        vixens.io/no-long-connections: "true"
        # changedetection V-small(640Mi) + browserless V-medium(1280Mi) = 1920Mi
        vixens.io/vpa.max-memory: "1920Mi"

      labels:
        kubectl.kubernetes.io/restartedAt: "2026-03-12T110000Z"
        app: changedetection
        vixens.io/sizing.changedetection: V-small
        vixens.io/sizing.browserless: V-medium
        vixens.io/backup-profile: "standard"
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      priorityClassName: vixens-low
      initContainers: []
      containers:
        - name: changedetection
          resources:
            requests:
              cpu: 25m
              memory: 256Mi
            limits:
              cpu: 100m
              memory: 1Gi
          image: ghcr.io/dgtlmoon/changedetection.io:0.55.1
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: BASE_URL
              value: https://changedetection.dev.truxonline.com # Will be patched in overlays
            - name: PLAYWRIGHT_DRIVER_URL
              value: ws://localhost:3000/?stealth=1&--disable-web-security=true
          volumeMounts:
            - name: datastore
              mountPath: /datastore
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 15
            periodSeconds: 10
            timeoutSeconds: 5
        - name: browserless
          resources:
            requests:
              cpu: 50m
              memory: 512Mi
            limits:
              cpu: 200m
              memory: 2Gi
          image: browserless/chrome:1.61.1-puppeteer-16.2.0
          ports:
            - containerPort: 3000
              name: playwright
          env:
            - name: SCREEN_WIDTH
              value: "1920"
            - name: SCREEN_HEIGHT
              value: "1080"
            - name: SCREEN_DEPTH
              value: "24"
            - name: ENABLE_DEBUGGER
              value: "false"
            - name: PRE_BOOT_CHROME
              value: "true"
            - name: CONNECTION_TIMEOUT
              value: "300000"
            - name: MAX_CONCURRENT_SESSIONS
              value: "10"
            - name: CHROME_REFRESH_TIME
              value: "600000"
          livenessProbe:
            tcpSocket:
              port: playwright
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: playwright
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: datastore
          emptyDir: {}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

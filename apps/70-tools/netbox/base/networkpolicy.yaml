---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: netbox
spec:
  podSelector:
    matchLabels:
      app: netbox
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from Traefik (HTTP) and KEDA HTTP interceptor
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keda
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow all egress (homelab: DNS, inter-app, external APIs)
    - {}

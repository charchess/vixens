---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbox
  labels:
    app: netbox
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: netbox
  template:
    metadata:
      labels:
        app: netbox
        vixens.io/sizing.netbox: B-medium
        vixens.io/backup-profile: "standard"
      annotations:
        vixens.io/no-long-connections: "true"
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      priorityClassName: vixens-medium
      initContainers: []
      containers:
        - name: netbox
          resources:
            requests:
              cpu: 50m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          image: ghcr.io/charchess/netbox-plugins:v4.5.8-12cb130
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: DB_HOST
              value: postgresql-shared-rw.databases.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: netbox
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: netbox-db-secrets
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: netbox-db-secrets
                  key: password
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: netbox-secrets
                  key: SECRET_KEY
            - name: REDIS_HOST
              value: redis-shared.databases.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: ALLOWED_HOSTS
              value: netbox.dev.truxonline.com # Should be patched in overlays
            - name: DB_WAIT_DEBUG
              value: "1"
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: netbox-media-storage
              mountPath: /opt/netbox/media
            - name: plugins-config
              mountPath: /etc/netbox/config/plugins.py
              subPath: plugins.py
              readOnly: true
      volumes:
        - name: netbox-media-storage
          emptyDir: {}
        - name: plugins-config
          configMap:
            name: netbox-plugins-config
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

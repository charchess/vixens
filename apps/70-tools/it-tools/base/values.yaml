---
# IT-Tools Helm Values
# Chart: jeffresc/it-tools

replicaCount: 1
podLabels:
  vixens.io/sizing.it-tools: B-nano
  vixens.io/priority-class: vixens-low
  vixens.io/backup-profile: "relaxed"
podAnnotations:
  vixens.io/fast-start: "true"
  vixens.io/service-binding: "false"
  vixens.io/nometrics: "true"
  vixens.io/no-long-connections: "true"
  kubectl.kubernetes.io/restartedAt: "2026-03-11T23:00:00Z"
image:
  repository: ghcr.io/corentinth/it-tools
  pullPolicy: IfNotPresent
  tag: 2024.10.22-7ca5933 # Pinned version (Renovate compatible)
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
# Security context alignment
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  readOnlyRootFilesystem: false # Nginx needs to write some temp files usually
  capabilities:
    drop:
      - ALL
# Service configuration
service:
  type: ClusterIP
  port: 8080
resources:
  requests:
    cpu: "10m"
    memory: "64Mi"
  limits:
    cpu: "100m"
    memory: "128Mi"
priorityClassName: vixens-low

---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
labels:
  - pairs:
      environment: prod
components:
  - ../../../../_shared/components/sync-wave/wave-9
  - ../../../../_shared/components/goldilocks/enabled
  - ../../../../_shared/components/nometrics
  - ../../../../_shared/components/dataangel
  - ../../../../_shared/components/poddisruptionbudget/1

patches:
  - path: patch-nextauth-url.yaml
  - path: dataangel.yaml
  - patch: |-
      - op: replace
        path: /spec/storageClassName
        value: local-path-delete
    target:
      kind: PersistentVolumeClaim
      name: linkwarden-data
resources:
  - ../../base
  - infisical-secret.yaml
  - ingress.yaml
  - httpscaledobject.yaml

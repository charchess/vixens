---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: headlamp
spec:
  template:
    metadata:
      labels:
        vixens.io/sizing.headlamp: G-small
    spec:
      containers:
        - name: headlamp
          resources:
            limits:
              cpu: 500m
              memory: 192Mi
            requests:
              cpu: 11m
              memory: 128Mi

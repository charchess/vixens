---
# Add fast-start bypass for check-startup-probe policy.
# trivy-operator is a Go binary that starts in < 1s — no startupProbe needed.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trivy-trivy-operator
  namespace: security
spec:
  template:
    metadata:
      annotations:
        vixens.io/fast-start: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"

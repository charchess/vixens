---
apiVersion: v1
kind: Service
metadata:
  name: trivy-server
  namespace: security
  labels:
    app.kubernetes.io/name: trivy-server
spec:
  ports:
    - name: http
      port: 4954
      targetPort: 4954
  selector:
    app.kubernetes.io/name: trivy-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trivy-server
  namespace: security
  labels:
    app.kubernetes.io/name: trivy-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: trivy-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trivy-server
    spec:
      containers:
        - name: trivy-server
          image: aquasec/trivy:0.59.1
          args:
            - server
            - --listen
            - 0.0.0.0:4954
          ports:
            - name: http
              containerPort: 4954
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /home/trivy/.cache
      volumes:
        - name: data
          emptyDir: {} # Default to emptyDir in base, will be PVC in prod overlay

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-worker
spec:
  template:
    metadata:
      labels:
        vixens.io/sizing.authentik-worker: G-large
    spec:
      priorityClassName: vixens-critical
      containers:
        - name: authentik-worker
          resources:
            requests:
              cpu: 200m
              memory: 768Mi
            limits:
              cpu: 500m
              memory: 2Gi

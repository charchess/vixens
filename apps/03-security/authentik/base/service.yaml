---
apiVersion: v1
kind: Service
metadata:
  name: authentik
  namespace: auth
  labels:
    app: authentik-server
spec:
  selector:
    app: authentik-server
  ports:
    - name: http
      port: 9000
      targetPort: 9000
      protocol: TCP
    - name: metrics
      port: 9300
      targetPort: 9300
      protocol: TCP

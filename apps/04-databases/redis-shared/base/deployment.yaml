---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-shared
  labels:
    vixens.io/vpa-mode: Auto
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-shared
  template:
    metadata:
      labels:
        app: redis-shared
        vixens.io/sizing.redis: V-micro
        vixens.io/backup-profile: "relaxed"
      annotations:
        vixens.io/fast-start: "true"
        vixens.io/no-long-connections: "true"
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: redis
          image: redis:8-alpine
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
          resources:
            requests:
              cpu: "25m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "1Gi"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-shared-credentials
                  key: password
          ports:
            - name: redis
              containerPort: 6379
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

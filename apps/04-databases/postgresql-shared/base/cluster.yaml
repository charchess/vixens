---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgresql-shared
  namespace: databases
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    environment: prod
spec:
  instances: 1 # Single instance in dev (scalable to 3 for HA in staging/prod)
  priorityClassName: vixens-critical
  imageName: ghcr.io/cloudnative-pg/postgresql:17.6-system-trixie
  inheritedMetadata:
    labels:
      vixens.io/sizing.postgres: G-large  # 2Gi memory - prevents Kyverno 128Mi fallback OOMKill
  superuserSecret:
    name: postgresql-admin-credentials
  managed:
    roles:
      - name: docspell
        ensure: present
        login: true
        passwordSecret:
          name: docspell-postgresql-credentials
      - name: linkwarden
        ensure: present
        login: true
        passwordSecret:
          name: linkwarden-postgresql-credentials
      - name: netbox
        ensure: present
        login: true
        passwordSecret:
          name: netbox-postgresql-credentials
#      - name: authentik
#        ensure: present
#        login: true
#        passwordSecret:
#          name: authentik-postgresql-credentials
      - name: scanopy
        ensure: present
        login: true
        passwordSecret:
          name: scanopy-postgresql-credentials
      - name: vaultwarden
        ensure: present
        login: true
        passwordSecret:
          name: vaultwarden-postgresql-credentials
      - name: nocodb
        ensure: present
        login: true
        passwordSecret:
          name: nocodb-postgresql-credentials
      #      - name: penpot  # TODO: re-enable once Infisical vault has 'username: penpot' at
        #        ensure: present  #       /apps/04-databases/postgresql-shared/penpot (prod env)
        #        login: true  #       Without this key, CNPG loops on 'username key doesn't exist'
        #        passwordSecret:  #       blocking the entire cluster from becoming Ready.
          #          name: penpot-postgresql-credentials  # penpot role still exists in DB, app still connects.
      - name: firefly
        ensure: present
        login: true
        passwordSecret:
          name: firefly-iii-postgresql-credentials
  postgresql:
    pg_hba:
      - host all postgres all trust
      - host all all all md5
    parameters:
      max_connections: "500"
      shared_buffers: 512MB
      effective_cache_size: 512MB
  bootstrap:
    initdb:
      database: postgres
      owner: postgres
      secret:
        name: postgresql-admin-credentials
  storage:
    size: 200Gi # Shared across multiple databases
    storageClass: synelia-iscsi-retain
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 512Mi
  affinity:
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
  monitoring:
    enablePodMonitor: false # Enable later with Prometheus integration
  backup:
    barmanObjectStore:
      destinationPath: s3://vixens-prod-postgresql-shared/
      endpointURL: http://synelia.internal.truxonline.com:9000
      s3Credentials:
        accessKeyId:
          name: postgresql-backup-s3
          key: LITESTREAM_ACCESS_KEY_ID
        secretAccessKey:
          name: postgresql-backup-s3
          key: LITESTREAM_SECRET_ACCESS_KEY
    retentionPolicy: "30d"

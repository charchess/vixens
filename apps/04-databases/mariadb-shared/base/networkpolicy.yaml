---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mariadb-shared
spec:
  podSelector:
    matchLabels:
      app: mariadb-shared
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 3306
  egress:
    # Allow all egress (homelab: DNS, inter-app, external APIs)
    - {}

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb-shared
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
spec:
  serviceName: mariadb-shared
  replicas: 1
  selector:
    matchLabels:
      app: mariadb-shared
  template:
    metadata:
      labels:
        app: mariadb-shared
        vixens.io/sizing.mariadb: SB-micro
        vixens.io/sizing.db-backup: V-nano
        vixens.io/sizing.mysqld-exporter: V-nano
        vixens.io/backup-profile: "standard"
      annotations:
        vixens.io/fast-start: "true"
        vixens.io/no-long-connections: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "9104"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: mariadb
          image: mariadb:12.2
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-shared-credentials
                  key: MARIADB_ROOT_PASSWORD
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - mariadb-admin ping -h localhost -u root -p$MARIADB_ROOT_PASSWORD
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mariadb-admin ping -h localhost -u root -p$MARIADB_ROOT_PASSWORD
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mariadb-admin ping -h localhost -u root -p$MARIADB_ROOT_PASSWORD
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
        - name: db-backup
          image: alpine:3.23
          securityContext:
            runAsUser: 999
            runAsGroup: 999
          command:
            - sh
            - -c
          args:
            - |
              apk add --no-cache mariadb-client rclone > /dev/null 2>&1
              export RCLONE_CONFIG_S3_TYPE=s3
              export RCLONE_CONFIG_S3_PROVIDER=Other
              export RCLONE_CONFIG_S3_ACCESS_KEY_ID=$LITESTREAM_ACCESS_KEY_ID
              export RCLONE_CONFIG_S3_SECRET_ACCESS_KEY=$LITESTREAM_SECRET_ACCESS_KEY
              export RCLONE_CONFIG_S3_ENDPOINT=$LITESTREAM_ENDPOINT
              while true; do
                TIMESTAMP=$(date +%Y%m%d-%H%M)
                for DB in $(mariadb -u root -p$MARIADB_ROOT_PASSWORD -h 127.0.0.1 \
                    -e "SHOW DATABASES;" --skip-column-names 2>/dev/null \
                    | grep -vE "^(information_schema|performance_schema|mysql|sys)$" \
                    | grep -v "lost\+found"); do
                  mariadb-dump -u root -p$MARIADB_ROOT_PASSWORD -h 127.0.0.1 \
                    --single-transaction --quick "$DB" > /tmp/$DB.sql 2>/dev/null
                  if [ $? -eq 0 ] && [ -s /tmp/$DB.sql ]; then
                    rclone copyto /tmp/$DB.sql "s3:$LITESTREAM_BUCKET/mariadb/$DB-${TIMESTAMP}.sql"
                    rclone copyto /tmp/$DB.sql "s3:$LITESTREAM_BUCKET/mariadb/$DB-latest.sql"
                    echo "[$(date)] Backup OK: $DB (${TIMESTAMP})"
                  fi
                done
                sleep 900
              done
          envFrom:
            - secretRef:
                name: mariadb-shared-credentials
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pgrep -f "mariadb-dump" || pgrep -f "sleep 900" || exit 1
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 5
        - name: mysqld-exporter
          image: prom/mysqld-exporter:v0.17.0
          args:
            - --mysqld.address=127.0.0.1:3306
            - --mysqld.username=root
          env:
            - name: MYSQLD_EXPORTER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-shared-credentials
                  key: MARIADB_ROOT_PASSWORD
          ports:
            - containerPort: 9104
              name: metrics
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9104
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9104
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: synelia-iscsi-retain
        resources:
          requests:
            storage: 10Gi

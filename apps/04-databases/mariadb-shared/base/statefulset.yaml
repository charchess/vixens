---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb-shared
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    vixens.io/vpa-mode: Auto
spec:
  serviceName: mariadb-shared
  replicas: 1
  selector:
    matchLabels:
      app: mariadb-shared
  template:
    metadata:
      labels:
        app: mariadb-shared
        vixens.io/sizing.mariadb: SB-micro
        vixens.io/backup-profile: "standard"
      annotations:
        vixens.io/fast-start: "true"
        vixens.io/no-long-connections: "true"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: mariadb
          image: mariadb:12.2
          ports:
            - containerPort: 3306
              name: mysql
          resources:
            requests:
              cpu: "10m"
              memory: "128Mi"
            limits:
              cpu: "100m"
              memory: "512Mi"
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-shared-credentials
                  key: MARIADB_ROOT_PASSWORD
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -u root -p$MARIADB_ROOT_PASSWORD
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -u root -p$MARIADB_ROOT_PASSWORD
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: synelia-iscsi-retain
        resources:
          requests:
            storage: 10Gi

---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Patches-only overlay for Helm-generated resources
# Used by ArgoCD multi-source to patch Deployments post-render

patches:
  # cert-manager controller - add readinessProbe
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/readinessProbe
        value:
          httpGet:
            path: /livez
            port: http-healthz
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
    target:
      kind: Deployment
      name: cert-manager

  # cert-manager-cainjector - add both probes
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/livenessProbe
        value:
          httpGet:
            path: /healthz
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
      - op: add
        path: /spec/template/spec/containers/0/readinessProbe
        value:
          httpGet:
            path: /healthz
            port: http
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
    target:
      kind: Deployment
      name: cert-manager-cainjector

---
# Production environment overrides for cert-manager
# VLAN 201 (192.168.201.0/24)

# ============================================================================
# Production-Specific Settings
# ============================================================================
# Production-grade resource limits (Emerald - Guaranteed QoS)
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 100m
    memory: 128Mi
# Webhook resources
webhook:
  priorityClassName: vixens-high
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 128Mi
# CA Injector resources
cainjector:
  priorityClassName: vixens-high
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 128Mi
  extraArgs:
    - --health-probe-bind-address=:6080
  livenessProbe:
    httpGet:
      path: /healthz
      port: 6080
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /readyz
      port: 6080
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 3
# Production-grade replica count
replicaCount: 2
# ============================================================================
# Production Monitoring
# ============================================================================
# Enable Prometheus metrics for production
# prometheus:
#  enabled: true
#  servicemonitor:
#    enabled: true

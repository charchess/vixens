---
# Common cert-manager configuration for ALL environments
# These values are shared across dev, test, staging, and production

# ============================================================================
# CRD Installation
# ============================================================================
# Install cert-manager CRDs as part of the Helm release
installCRDs: true
# ============================================================================
# Global Configuration
# ============================================================================
global:
  priorityClassName: vixens-high
  leaderElection:
    # Leader election namespace (should match deployment namespace)
    namespace: cert-manager
# ============================================================================
# Control Plane Tolerations
# ============================================================================
# All cert-manager components run on control plane nodes
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
# Pod sizing labels for controller
podLabels:
  vixens.io/sizing.cert-manager: G-nano
podAnnotations:
  vixens.io/fast-start: "true"
# Webhook component
webhook:
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  podLabels:
    vixens.io/sizing.webhook: G-nano
  podAnnotations:
    vixens.io/fast-start: "true"
# CA Injector component
cainjector:
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  podLabels:
    vixens.io/sizing.cainjector: G-nano
  podAnnotations:
    vixens.io/fast-start: "true"
# Startup API check tolerations
startupapicheck:
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  podAnnotations:
    vixens.io/fast-start: "true"

---
# crowdsec-agent (collecte logs, pas d'ingress externe)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: crowdsec-agent
  namespace: crowdsec
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: crowdsec-agent
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
  egress:
    # crowdsec-agent → crowdsec-lapi:8080 (push decisions/alerts)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: crowdsec
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # crowdsec-agent → world (CrowdSec Hub: version.crowdsec.net, hub updates)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# crowdsec-lapi — reçoit des requêtes de Traefik (bouncer), agents crowdsec et monitoring
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: crowdsec-lapi
  namespace: crowdsec
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: crowdsec-lapi
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
        - matchLabels:
            io.kubernetes.pod.namespace: crowdsec
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
  egress:
    # crowdsec-lapi → databases (PostgreSQL for decisions/bans storage)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: databases
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # crowdsec-lapi → world (CrowdSec Central API for community blocklists)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP

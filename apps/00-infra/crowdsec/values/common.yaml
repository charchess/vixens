---
# CrowdSec Helm values - common (all environments)
# Chart: crowdsecurity/crowdsec
# Docs: https://docs.crowdsec.net/docs/getting_started/install_crowdsec_service

container_runtime: containerd

image:
  repository: crowdsecurity/crowdsec
  tag: ""  # uses chart AppVersion
  pullPolicy: IfNotPresent

# ============================================================================
# LAPI (Local API) - decision engine
# ============================================================================
lapi:
  enabled: true
  replicas: 1

  env:
    - name: BOUNCER_KEY_traefik
      valueFrom:
        secretKeyRef:
          name: crowdsec-secrets
          key: CROWDSEC_BOUNCER_KEY
    - name: ENROLL_KEY
      valueFrom:
        secretKeyRef:
          name: crowdsec-secrets
          key: ENROLL_KEY
    - name: ENROLL_INSTANCE_NAME
      value: "vixens-k8s"
    - name: CROWDSEC_DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: crowdsec-secrets
          key: CROWDSEC_DB_PASSWORD

  persistentVolume:
    data:
      enabled: false
    config:
      enabled: true
      size: 1Gi
      storageClassName: synelia-iscsi-retain

  strategy:
    type: Recreate  # required with RWO PVC

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  priorityClassName: vixens-medium

  podLabels:
    vixens.io/sizing.crowdsec-lapi: V-micro
    vixens.io/priority-class: vixens-medium

  podAnnotations:
    vixens.io/service-binding: "false"
    vixens.io/no-long-connections: "true"
    vixens.io/sizing-rationale: "V-micro: ~100-150Mi LAPI + PostgreSQL backend"
    prometheus.io/scrape: "true"
    prometheus.io/port: "6060"
    prometheus.io/path: "/metrics"

# ============================================================================
# Agent (log acquisition + detection)
# ============================================================================
agent:
  enabled: true

  acquisition:
    - namespace: traefik
      podName: traefik-*
      program: traefik

  env:
    - name: COLLECTIONS
      value: "crowdsecurity/traefik crowdsecurity/http-cve crowdsecurity/base-http-scenarios"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  priorityClassName: vixens-medium

  podLabels:
    vixens.io/sizing.crowdsec-agent: V-micro
    vixens.io/priority-class: vixens-medium

  podAnnotations:
    vixens.io/service-binding: "false"
    vixens.io/no-long-connections: "true"
    vixens.io/sizing-rationale: "V-micro: hub init (50+ collections) needs 512Mi; steady-state ~80Mi"

# ============================================================================
# LAPI config
# ============================================================================
config:
  config.yaml.local: |
    db_config:
      type: postgresql
      user: crowdsec
      password: ${CROWDSEC_DB_PASSWORD}
      db_name: crowdsec
      host: postgresql-shared-rw.databases.svc.cluster.local
      port: 5432
      sslmode: disable
    api:
      server:
        auto_registration:
          enabled: true
          token: ${REGISTRATION_TOKEN}
          allowed_ranges:
            - "10.244.0.0/16"

  profiles.yaml: |
    name: default_ip_remediation
    filters:
      - Alert.Remediation == true && Alert.GetScope() == "Ip"
    decisions:
      - type: ban
        duration: 4h
    on_success: break
    ---
    name: default_range_remediation
    filters:
      - Alert.Remediation == true && Alert.GetScope() == "Range"
    decisions:
      - type: ban
        duration: 4h
    on_success: break

---
# CrowdSec Helm values - common (all environments)
# Chart: crowdsecurity/crowdsec
# Docs: https://docs.crowdsec.net/docs/getting_started/install_crowdsec_service

container_runtime: containerd

image:
  repository: crowdsecurity/crowdsec
  tag: ""  # uses chart AppVersion
  pullPolicy: IfNotPresent

# ============================================================================
# LAPI (Local API) - decision engine
# ============================================================================
lapi:
  enabled: true
  replicas: 1

  env:
    - name: BOUNCER_KEY_traefik
      valueFrom:
        secretKeyRef:
          name: crowdsec-secrets
          key: CROWDSEC_BOUNCER_KEY
    - name: ENROLL_KEY
      valueFrom:
        secretKeyRef:
          name: crowdsec-secrets
          key: ENROLL_KEY
    - name: ENROLL_INSTANCE_NAME
      value: "vixens-k8s"
    - name: CROWDSEC_DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: crowdsec-secrets
          key: CROWDSEC_DB_PASSWORD

  persistentVolume:
    data:
      enabled: false
    config:
      enabled: true
      size: 1Gi
      storageClassName: synelia-iscsi-retain

  strategy:
    type: Recreate  # required with RWO PVC

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

agent:
  enabled: false

# ============================================================================
# LAPI config
# ============================================================================
config:
  config.yaml.local: |
    db_config:
      type: postgresql
      user: crowdsec
      password: ${CROWDSEC_DB_PASSWORD}
      db_name: crowdsec
      host: postgresql-shared-rw.databases.svc.cluster.local
      port: 5432
      sslmode: disable

  profiles.yaml: |
    name: default_ip_remediation
    filters:
      - Alert.Remediation == true && Alert.GetScope() == "Ip"
    decisions:
      - type: ban
        duration: 4h
    on_success: break
    ---
    name: default_range_remediation
    filters:
      - Alert.Remediation == true && Alert.GetScope() == "Range"
    decisions:
      - type: ban
        duration: 4h
    on_success: break

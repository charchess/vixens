---
# Production environment overrides for Traefik
# VLAN 201 (192.168.201.0/24)

# ============================================================================
# LoadBalancer Service Configuration
# ============================================================================
service:
  type: LoadBalancer
  annotations:
    io.cilium/lb-ipam-ips: 192.168.201.70
  spec:
    externalTrafficPolicy: Cluster
# ============================================================================
# Production-Specific Settings
# ============================================================================
# Log level for production (less verbose)
logs:
  general:
    level: WARN
  access:
    enabled: true
# Production-grade resource limits (Burstable)
resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 2000m
    memory: 2Gi
# High availability with multiple replicas
additionalArguments:
  - "--experimental.plugins.bouncer.moduleName=github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
  - "--experimental.plugins.bouncer.version=v1.5.1"
  - "--entrypoints.websecure.http.middlewares=traefik-bouncer@kubernetescrd"

deployment:
  replicas: 2
  podLabels:
    app: traefik  # For legacy Kyverno policy compatibility
    app.kubernetes.io/name: traefik
  podAnnotations:
    kubectl.kubernetes.io/restartedAt: "2026-03-12T04:35:00Z"
# Ensure traefik pods spread across nodes
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: traefik
# ============================================================================
# Production Metrics & Monitoring
# ============================================================================
metrics:
  prometheus:
    enabled: true
    addEntryPointsLabels: true
    addServicesLabels: true
    addRoutersLabels: true
    serviceMonitor:
      enabled: true
      namespace: traefik
      interval: 60s
# ============================================================================
# Production Pod Disruption Budget
# ============================================================================
podDisruptionBudget:
  enabled: true
  minAvailable: 1

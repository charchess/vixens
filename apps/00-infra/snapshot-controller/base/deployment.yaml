---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snapshot-controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app: snapshot-controller
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: snapshot-controller
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      serviceAccountName: snapshot-controller
      priorityClassName: vixens-critical
      containers:
        - name: snapshot-controller
          image: registry.k8s.io/sig-storage/snapshot-controller:v8.5.0
          args:
            - --v=5
            - --leader-election=true
            - --leader-election-namespace=snapshot-controller

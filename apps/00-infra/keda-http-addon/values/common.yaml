---
# KEDA HTTP Add-on
podLabels:
  vixens.io/priority-class: vixens-medium

operator:
  podAnnotations:
    vixens.io/service-binding: "false"
    vixens.io/fast-start: "true"
    vixens.io/nometrics: "true"

interceptor:
  podAnnotations:
    vixens.io/service-binding: "false"
    vixens.io/fast-start: "true"
    vixens.io/nometrics: "true"
  replicas:
    min: 1
    max: 1
    # Stirling-PDF cold-start: ~40s JWT key gen + ~2min Spring Boot = ~3min total
    waitTimeout: 300s
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

scaler:
  podAnnotations:
    vixens.io/service-binding: "false"
    vixens.io/fast-start: "true"
    vixens.io/nometrics: "true"
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

---
# KEDA HTTP Add-on
interceptor:
  replicas:
    min: 1
    max: 1
  # Java apps (Stirling-PDF) need ~60s cold-start; 20s default causes 502 on scale-up
  waitTimeout: 120s
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

scaler:
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

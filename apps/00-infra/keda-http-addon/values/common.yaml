---
# KEDA HTTP Add-on
interceptor:
  replicas:
    min: 1
    max: 1
    # Stirling-PDF cold-start: ~40s JWT key gen + ~2min Spring Boot = ~3min total
    waitTimeout: 300s
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

scaler:
  replicas: 1
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

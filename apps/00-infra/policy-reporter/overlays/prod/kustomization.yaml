---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: policy-reporter
resources:
  - ../../base
  - ingress.yaml
labels:
  - includeSelectors: false
    pairs:
      environment: prod
components:
  - ../../../../_shared/components/priority/low

patches:
  - patch: |-
      - op: add
        path: /spec/template/metadata/labels/vixens.io~1sizing.kyverno-plugin
        value: "V-nano"
    target:
      kind: Deployment
      name: policy-reporter-kyverno-plugin
  - patch: |-
      - op: add
        path: /spec/template/metadata/labels/vixens.io~1sizing.ui
        value: "V-nano"
    target:
      kind: Deployment
      name: policy-reporter-ui

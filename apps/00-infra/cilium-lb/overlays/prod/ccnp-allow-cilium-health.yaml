---
# Autorise les health checks inter-nœuds Cilium (port 4240)
# remote-node → tous les pods sur port 4240 (cilium-health)
# Nécessaire avec enableDefaultDeny.ingress: true
# enableDefaultDeny: false = additif seulement
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-cilium-health
spec:
  endpointSelector: {}
  enableDefaultDeny:
    ingress: false
    egress: false
  ingress:
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "4240"
              protocol: TCP
    # ICMP EchoRequest pour les health IPs inter-nœuds (10.244.x.x/health)
    - fromEntities:
        - host
        - remote-node
      icmps:
        - fields:
            - type: 8
              family: IPv4
  egress:
    - toEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "4240"
              protocol: TCP
    # ICMP EchoReply pour les health IPs inter-nœuds
    - toEntities:
        - host
        - remote-node
      icmps:
        - fields:
            - type: 0
              family: IPv4

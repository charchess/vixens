kind: Kustomization
commonLabels:
  app.kubernetes.io/name: cilium-lb
  app.kubernetes.io/instance: cilium-lb
  app.kubernetes.io/part-of: infrastructure
  app.kubernetes.io/managed-by: argocd

resources:
  - ippool.yaml
  - l2policy.yaml
  - ccnp-default-deny.yaml
  - ccnp-allow-traefik.yaml
  - ccnp-allow-prometheus.yaml
  - ccnp-allow-coredns.yaml
components:
  - ../../../_shared/components/revision-history-limit

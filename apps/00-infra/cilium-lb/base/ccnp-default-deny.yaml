---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: default-deny-baseline
spec:
  endpointSelector:
    matchExpressions:
      - key: io.kubernetes.pod.namespace
        operator: NotIn
        values:
          - kube-system
          - cilium-secrets
          - cert-manager
          - argocd
          - infisical-operator-system
          - snapshot-controller
          - velero
  enableDefaultDeny:
    ingress: false
    egress: false
  ingress:
    - {}
  egress:
    - {}

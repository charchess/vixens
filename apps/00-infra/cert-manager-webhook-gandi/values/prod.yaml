---
# Production environment overrides for cert-manager-webhook-gandi
# VLAN 201 (192.168.201.0/24)

# ============================================================================
# Production-Specific Settings
# ============================================================================
priorityClassName: vixens-high
# Production-grade resource limits (Emerald - Guaranteed QoS)
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 50m
    memory: 128Mi
# Production-grade replica count
replicaCount: 2
# Spread replicas across nodes (Platinum: check-topology-spread)
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: cert-manager-webhook-gandi

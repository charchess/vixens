---
# Velero deployment patches for Silver maturity
# - Add priorityClassName (Bronze requirement)
# - Add sizing labels (Bronze requirement - enables Kyverno mutation)
# - Remove manual resources (let Kyverno sizing-v2-mutate handle it)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: velero
  labels:
    vixens.io/sizing-v2: "true"
    vixens.io/sizing.velero: V-medium
spec:
  template:
    metadata:
      labels:
        vixens.io/sizing.velero: V-medium
    spec:
      priorityClassName: vixens-critical
      containers:
        - name: velero
          # Resources will be mutated by Kyverno based on vixens.io/sizing.velero label
          startupProbe:
            httpGet:
              path: /metrics
              port: 8085
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 30  # 5 min max startup time
          resources: {}

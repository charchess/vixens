---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Velero is Helm-managed (multi-source). Patches target Helm-rendered Deployments via ArgoCD SSA.
resources: []

patches:
  # Graceful shutdown bypass — velero is a backup controller, no user connections to drain
  - patch: |-
      - op: add
        path: /spec/template/metadata/annotations/vixens.io~1no-long-connections
        value: "true"
    target:
      kind: Deployment
      name: velero

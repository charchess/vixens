---
# Velero Kustomize Overlay - Patches pour maturity Silver
# Appliqué par-dessus le Helm chart via ArgoCD multi-source

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pas de base - velero utilise Helm directement via ArgoCD
# Ces patches s'appliquent par-dessus le déploiement Helm
resources: []

patches:
  - path: deployment-patches.yaml
    target:
      kind: Deployment
      name: velero

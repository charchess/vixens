---
# Velero uses Helm-only deployment (no Kustomize base resources)
# Sizing labels are applied via Helm podLabels in values/common.yaml
# Kustomize patches don't work with ArgoCD multi-source Helm apps

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Empty - all configuration via Helm values
resources: []

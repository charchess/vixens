---
# Velero - Final SOTA 2026 Configuration
image:
  repository: velero/velero
  tag: v1.18.0
  pullPolicy: IfNotPresent

configuration:
  uploaderType: kopia
  defaultRepoMaintainFrequency: 24h


  # STORAGE LOCATION
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: vixens-prod-velero
      prefix: backups
      default: true
      accessMode: ReadWrite
      config:
        region: us-east-1
        s3ForcePathStyle: "true"
        s3Url: http://192.168.111.69:9000

  # MAINTENANCE JOB RESOURCES
  # Template reads: .Values.configuration.repositoryMaintenanceJob.repositoryConfigData
  repositoryMaintenanceJob:
    repositoryConfigData:
      global:
        podResources:
          cpuRequest: "100m"
          memoryRequest: "256Mi"
          cpuLimit: "500m"
          memoryLimit: "1Gi"
        keepLatestMaintenanceJobs: 3

# BACKUP SCHEDULES
schedules:
  daily-databases:
    disabled: false
    schedule: "0 2 * * *"
    template:
      ttl: "720h"
      includedNamespaces: ["databases"]
      snapshotVolumes: true
      excludedNamespaceScopedResources: []
      excludedClusterScopedResources: []
  daily-home:
    disabled: false
    schedule: "0 4 * * *"
    template:
      ttl: "168h"
      includedNamespaces: ["homeassistant"]
      snapshotVolumes: true
      excludedNamespaceScopedResources: []
      excludedClusterScopedResources: []
  weekly-full:
    disabled: false
    schedule: "0 3 * * 0"
    template:
      ttl: "2160h"
      includedNamespaces: ["*"]
      excludedNamespaces: ["kube-system", "kube-public", "kube-node-lease", "velero"]
      snapshotVolumes: false
      defaultVolumesToFsBackup: false

# CLEANUP SETTINGS
maintenanceCronJob:
  enabled: false
upgradeCRDs: true
cleanUpCRDs: false

kubectl:
  image:
    repository: bitnami/kubectl
    tag: latest
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi

# Deployment labels for sizing-v2 policy enablement
labels:

# Pod labels for sizing-v2 policy (Bronze maturity requirement)
podLabels:
  vixens.io/sizing.velero: SB-small
podAnnotations:
  vixens.io/fast-start: "true"
  vixens.io/noingressneeded: "true"
  vixens.io/no-long-connections: "true"
annotations:  # Deployment metadata (Gold maturity: sync-wave + goldilocks)
  argocd.argoproj.io/sync-wave: "10"
  goldilocks.fairwinds.com/enabled: "true"
  vpa.kubernetes.io/updateMode: "Off"
revisionHistoryLimit: 3

# Priority class for Bronze maturity
priorityClassName: vixens-critical

# Resources managed by Kyverno sizing-v2-mutate policy
# Labels: vixens.io/sizing.velero: V-medium (applied via Helm podLabels)
# resources: {}  # Commented - let Kyverno mutate

deployNodeAgent: true

nodeAgent:
  uploaderType: kopia
  priorityClassName: vixens-critical
  labels:
  podAnnotations:
    vixens.io/fast-start: "true"
    vixens.io/noingressneeded: "true"
  podLabels:
    vixens.io/sizing.node-agent: SB-nano
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.14.0
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins

---
# velero server
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: velero
  namespace: velero
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: velero
  egress:
    - {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring

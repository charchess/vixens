---
apiVersion: v1
kind: ConfigMap
metadata:
  name: velero-repo-maintenance
  namespace: velero
data:
  global: |
    {
      "podResources": {
        "cpuRequest": "100m",
        "memoryRequest": "256Mi",
        "cpuLimit": "500m",
        "memoryLimit": "1Gi"
      },
      "keepLatestMaintenanceJobs": 3
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keda-admission-webhooks
  namespace: keda
  annotations:
    goldilocks.fairwinds.com/enabled: "true"
    vpa.kubernetes.io/updateMode: "Off"
    argocd.argoproj.io/sync-wave: "1"
    vixens.io/sizing-rationale: "G-nano: KEDA admission webhook lightweight Go process, ~25Mi steady-state"
spec:
  template:
    metadata:
      labels:
        vixens.io/sizing.keda-admission-webhooks: G-nano
    spec:
      priorityClassName: vixens-medium

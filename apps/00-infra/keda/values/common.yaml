---
# KEDA Operator
crds:
  install: false

operator:
  replicaCount: 1
  revisionHistoryLimit: 3

metricsServer:
  replicaCount: 1
  revisionHistoryLimit: 3

webhooks:
  replicaCount: 1
  revisionHistoryLimit: 3

# Control plane tolerations
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

# Resources — G-nano sizing (5m CPU req, 64Mi mem): Kyverno sizing-v2-mutate will enforce
# correct limits based on vixens.io/sizing.* pod labels defined in podLabels below.
resources:
  operator:
    requests:
      cpu: 5m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  metricsServer:
    requests:
      cpu: 5m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  webhooks:
    requests:
      cpu: 5m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi

# Global priority class for all keda components (Platinum requirement)
priorityClassName: vixens-medium

# Per-component pod labels — sizing labels for Kyverno sizing-v2-mutate (Platinum)
podLabels:
  keda:
    vixens.io/sizing.keda-operator: G-nano
  metricsAdapter:
    vixens.io/sizing.keda-operator-metrics-apiserver: G-nano
  webhooks:
    vixens.io/sizing.keda-admission-webhooks: G-nano

# Per-component pod annotations
podAnnotations:
  keda:
    vixens.io/fast-start: "true"
    vixens.io/nometrics: "true"
    vixens.io/service-binding: "false"
    vixens.io/no-long-connections: "true"
  metricsAdapter:
    vixens.io/fast-start: "true"
    vixens.io/nometrics: "true"
    vixens.io/service-binding: "false"
    vixens.io/no-long-connections: "true"
  webhooks:
    vixens.io/fast-start: "true"
    vixens.io/nometrics: "true"
    vixens.io/service-binding: "false"
    vixens.io/no-long-connections: "true"

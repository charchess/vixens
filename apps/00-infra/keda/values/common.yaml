---
# KEDA Operator
crds:
  install: false

operator:
  replicaCount: 1
  revisionHistoryLimit: 3
  priorityClassName: vixens-medium
  annotations:
    goldilocks.fairwinds.com/enabled: "true"
    vpa.kubernetes.io/updateMode: "Off"
    argocd.argoproj.io/sync-wave: "1"
    vixens.io/sizing-rationale: "G-nano: KEDA operator lightweight Go process, ~20Mi steady-state"
  podLabels:
    vixens.io/sizing.keda-operator: G-nano

metricsServer:
  replicaCount: 1
  revisionHistoryLimit: 3
  priorityClassName: vixens-medium
  annotations:
    goldilocks.fairwinds.com/enabled: "true"
    vpa.kubernetes.io/updateMode: "Off"
    argocd.argoproj.io/sync-wave: "1"
    vixens.io/sizing-rationale: "G-nano: KEDA metrics adapter lightweight Go process, ~30Mi steady-state"
  podLabels:
    vixens.io/sizing.keda-operator-metrics-apiserver: G-nano

webhooks:
  replicaCount: 1
  revisionHistoryLimit: 3
  priorityClassName: vixens-medium
  annotations:
    goldilocks.fairwinds.com/enabled: "true"
    vpa.kubernetes.io/updateMode: "Off"
    argocd.argoproj.io/sync-wave: "1"
    vixens.io/sizing-rationale: "G-nano: KEDA admission webhook lightweight Go process, ~25Mi steady-state"
  podLabels:
    vixens.io/sizing.keda-admission-webhooks: G-nano

# Control plane tolerations
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

# Resources (will be overridden by Kyverno sizing-v2-mutate based on sizing labels above)
resources:
  operator:
    requests:
      cpu: 5m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  metricsServer:
    requests:
      cpu: 5m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  webhooks:
    requests:
      cpu: 5m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi

podLabels:
  vixens.io/priority-class: vixens-medium

podAnnotations:
  keda:
    vixens.io/fast-start: "true"
    vixens.io/nometrics: "true"
    vixens.io/service-binding: "false"
  metricsAdapter:
    vixens.io/fast-start: "true"
    vixens.io/nometrics: "true"
    vixens.io/service-binding: "false"
  webhooks:
    vixens.io/fast-start: "true"
    vixens.io/nometrics: "true"
    vixens.io/service-binding: "false"

---
# KEDA Operator
crds:
  install: false

operator:
  replicaCount: 1
  revisionHistoryLimit: 3

metricsServer:
  replicaCount: 1
  revisionHistoryLimit: 3

webhooks:
  replicaCount: 1
  revisionHistoryLimit: 3

# Control plane tolerations
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

# Resources — Kyverno sizing-v2-mutate enforces correct limits based on vixens.io/sizing.*
# pod labels defined in podLabels below. Values here are informational only (overridden).
# operator/metricsAdapter: G-medium (50m CPU, 512Mi mem) — keda needs 100m+/512Mi historically
# webhooks: G-small (25m CPU, 256Mi mem) — lightweight webhook validator
resources:
  operator:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      cpu: 50m
      memory: 512Mi
  metricsServer:
    requests:
      cpu: 50m
      memory: 512Mi
    limits:
      cpu: 50m
      memory: 512Mi
  webhooks:
    requests:
      cpu: 25m
      memory: 256Mi
    limits:
      cpu: 25m
      memory: 256Mi

# Global priority class for all keda components (Platinum requirement)
priorityClassName: vixens-medium

podLabels:
  keda:
    vixens.io/sizing.keda-operator: G-medium
  metricsAdapter:
    vixens.io/sizing.keda-operator-metrics-apiserver: G-medium
  webhooks:
    vixens.io/sizing.keda-admission-webhooks: G-small

# Per-component pod annotations
podAnnotations:
  keda:
    vixens.io/fast-start: "true"
    vixens.io/nometrics: "true"
    vixens.io/service-binding: "false"
    vixens.io/no-long-connections: "true"
  metricsAdapter:
    vixens.io/fast-start: "true"
    vixens.io/nometrics: "true"
    vixens.io/service-binding: "false"
    vixens.io/no-long-connections: "true"
  webhooks:
    vixens.io/fast-start: "true"
    vixens.io/nometrics: "true"
    vixens.io/service-binding: "false"
    vixens.io/no-long-connections: "true"

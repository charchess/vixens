---
# KEDA Operator
crds:
  install: false

operator:
  replicaCount: 1
  revisionHistoryLimit: 3

metricsServer:
  replicaCount: 1
  revisionHistoryLimit: 3

webhooks:
  replicaCount: 1
  revisionHistoryLimit: 3

# Control plane tolerations
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

# Resources — G-nano sizing (5m CPU req, 64Mi mem): Kyverno sizing-v2-mutate will enforce
# correct limits based on vixens.io/sizing.* pod labels injected via kustomize overlay patches.
resources:
  operator:
    requests:
      cpu: 5m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  metricsServer:
    requests:
      cpu: 5m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  webhooks:
    requests:
      cpu: 5m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi

podLabels:
  vixens.io/priority-class: vixens-medium

podAnnotations:
  keda:
    vixens.io/fast-start: "true"
    vixens.io/nometrics: "true"
    vixens.io/service-binding: "false"
  metricsAdapter:
    vixens.io/fast-start: "true"
    vixens.io/nometrics: "true"
    vixens.io/service-binding: "false"
  webhooks:
    vixens.io/fast-start: "true"
    vixens.io/nometrics: "true"
    vixens.io/service-binding: "false"

kind: PolicyException
metadata:
  name: nometrics-exception
  namespace: kyverno
spec:
  exceptions:
    - policyName: check-servicemonitor
      ruleNames:
        - check-servicemonitor-exists
  match:
    any:
      - resources:
          kinds:
            - Pod
          namespaces:
            - infisical-operator-system

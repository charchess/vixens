---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  labels:
    argocd.argoproj.io/instance: kyverno
  name: require-resources
  annotations:
    policies.kyverno.io/title: Require Resources
    policies.kyverno.io/category: Maturity (Silver)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Resources requests and limits are required for all containers for maturity Level 2 (Silver).
      Exception: Pods with vixens.io/sizing.* labels are exempt (resources mutated by Kyverno sizing-v2-mutate policy).
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: validate-resources
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
          # Exclude: Pods with vixens.io/sizing.* labels (Kyverno mutation)
          - resources:
              kinds:
                - Pod
              selector:
                matchExpressions:
                  - key: "vixens.io/sizing.*"
                    operator: Exists
      validate:
        message: "CPU and memory resource requests and limits are required."
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    memory: "?*"
                    cpu: "?*"
                  limits:
                    memory: "?*"
                    cpu: "?*"

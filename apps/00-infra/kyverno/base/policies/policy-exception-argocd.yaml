---
# PolicyException for ArgoCD components to bypass Kyverno sizing-v2-mutate.
# Allows explicit resource overrides to prevent Kyverno from overriding
# container resources on memory-constrained cluster.
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: argocd-sizing-exception
  namespace: kyverno
spec:
  exceptions:
    - policyName: sizing-v2-mutate
      ruleNames:
        - v2-container-sizing
        - v2-init-container-sizing
        - v2-unlabeled-sidecar-defaults
  match:
    any:
      - resources:
          kinds:
            - Pod
          namespaces:
            - argocd
          names:
            - "argocd-application-controller-*"
            - "argocd-repo-server-*"

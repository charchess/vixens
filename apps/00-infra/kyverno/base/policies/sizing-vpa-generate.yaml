---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:vpa-manager
  labels:
    app.kubernetes.io/managed-by: kyverno
rules:
  - apiGroups:
      - autoscaling.k8s.io
    resources:
      - verticalpodautoscalers
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno:vpa-manager
  labels:
    app.kubernetes.io/managed-by: kyverno
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno:vpa-manager
subjects:
  - kind: ServiceAccount
    name: kyverno-background-controller
    namespace: kyverno
  - kind: ServiceAccount
    name: kyverno-admission-controller
    namespace: kyverno
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: sizing-vpa-generate
  annotations:
    policies.kyverno.io/title: Sizing VPA Generate
    policies.kyverno.io/category: Resource Management
    policies.kyverno.io/description: >-
      Automatically generates a VerticalPodAutoscaler for any Deployment or
      StatefulSet whose pod template has at least one vixens.io/sizing.* label.
      No explicit trigger label required — presence of sizing labels is sufficient.
      Generated VPA uses updateMode: Auto (pod evict+recreate on recommendation apply).
      Note: InPlaceOrRecreate requires VPA >= 1.7.0 (current: 1.6.0). Tracked as
      follow-up task for VPA upgrade.
      VPA uses RequestsAndLimits to maintain the 4x cpu/memory ratio as it tunes
      V-* containers. minAllowed and maxAllowed (safety defaults) are always set.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: generate-vpa
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
      preconditions:
        any:
          - key: "{{ request.object.spec.template.metadata.labels | keys(@) | [?starts_with(@, 'vixens.io/sizing.')] | length(@) }}"
            operator: GreaterThan
            value: 0
      generate:
        apiVersion: autoscaling.k8s.io/v1
        kind: VerticalPodAutoscaler
        name: "vixens-{{ request.object.metadata.name }}"
        namespace: "{{ request.object.metadata.namespace }}"
        synchronize: true
        data:
          apiVersion: autoscaling.k8s.io/v1
          kind: VerticalPodAutoscaler
          metadata:
            name: "vixens-{{ request.object.metadata.name }}"
            namespace: "{{ request.object.metadata.namespace }}"
            labels:
              app.kubernetes.io/managed-by: kyverno
          spec:
            targetRef:
              apiVersion: apps/v1
              kind: "{{ request.object.kind }}"
              name: "{{ request.object.metadata.name }}"
            updatePolicy:
              # V-* sizing label present → Auto (VPA manages resources)
              # B-*/SB-*/G-* only → Off (Goldilocks recommend-only)
              updateMode: >-
                {{ request.object.spec.template.metadata.labels | values(@) | [?starts_with(@, 'V-')] | length(@) > `0` && 'Auto' || 'Off' }}
            resourcePolicy:
              containerPolicies:
                - containerName: "*"
                  controlledValues: RequestsAndLimits
                  minAllowed:
                    cpu: "5m"
                    memory: "64Mi"
                  maxAllowed:
                    cpu: "8000m"
                    memory: "16Gi"

---
# RBAC: Allow Kyverno controllers to manage/inspect VPA objects
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:vpa-manager
  labels:
    app.kubernetes.io/managed-by: kyverno
rules:
  - apiGroups:
      - autoscaling.k8s.io
    resources:
      - verticalpodautoscalers
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno:vpa-manager
  labels:
    app.kubernetes.io/managed-by: kyverno
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno:vpa-manager
subjects:
  - kind: ServiceAccount
    name: kyverno-background-controller
    namespace: kyverno
  - kind: ServiceAccount
    name: kyverno-admission-controller
    namespace: kyverno
---
# Kyverno Policy: Sizing VPA Generate
#
# Generates a VerticalPodAutoscaler for any Deployment or StatefulSet that:
#   (a) has at least one container labeled with a V-* sizing label, OR
#   (b) has any container without a vixens.io/sizing.* label (sidecar auto-discovery)
#
# Generated VPA:
#   - updateMode: Off (observation only — activate manually per app after 48-72h)
#   - containerPolicies:
#     - mode: Off     for containers with G-*, B-*, SB-* labels (Kyverno manages sizing)
#     - RequestsOnly  for containers with V-* labels or no label (VPA tunes requests only)
#     - minAllowed: cpu=5m, memory=64Mi (floor for deflation)
#
# Activation: After reviewing VPA recommendations, set updateMode: Auto manually.
#
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: sizing-vpa-generate
  annotations:
    policies.kyverno.io/title: Sizing VPA Generate
    policies.kyverno.io/category: Resource Management
    policies.kyverno.io/description: >-
      Automatically generates a VerticalPodAutoscaler for Deployments and
      StatefulSets using the v2 sizing system. VPAs start in Off mode for
      safe observation. Activate per-app after reviewing recommendations.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: generate-vpa
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
              # Trigger: Deployment/StatefulSet must have this label on its OWN metadata
              # (not pod template). Add this when migrating an app to v2 sizing.
              selector:
                matchLabels:
                  vixens.io/sizing-v2: "true"
      generate:
        apiVersion: autoscaling.k8s.io/v1
        kind: VerticalPodAutoscaler
        name: "vixens-{{ request.object.metadata.name }}"
        namespace: "{{ request.object.metadata.namespace }}"
        synchronize: true
        data:
          apiVersion: autoscaling.k8s.io/v1
          kind: VerticalPodAutoscaler
          metadata:
            name: "vixens-{{ request.object.metadata.name }}"
            namespace: "{{ request.object.metadata.namespace }}"
            labels:
              app.kubernetes.io/managed-by: kyverno
              vixens.io/sizing-v2: "true"
          spec:
            targetRef:
              apiVersion: apps/v1
              kind: "{{ request.object.kind }}"
              name: "{{ request.object.metadata.name }}"
            updatePolicy:
              updateMode: "Off"
            resourcePolicy:
              containerPolicies:
                # Observe all containers — unlabeled sidecars get VPA recommendations.
                # minAllowed is the floor; VPA won't shrink below this.
                - containerName: "*"
                  minAllowed:
                    cpu: "5m"
                    memory: "64Mi"

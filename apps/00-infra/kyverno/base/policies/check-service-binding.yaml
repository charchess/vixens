---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: check-service-binding
  annotations:
    policies.kyverno.io/title: Verify Service Binding
    policies.kyverno.io/category: Maturity (Bronze)
    policies.kyverno.io/description: >-
      Ensures that each pod is targeted by at least one Service.
      Set vixens.io/service-binding: "false" to bypass (explicit acknowledgement that
      this workload is a controller/worker/daemon that does not need to receive traffic).
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-service-exists
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - monitoring
                - velero
          - resources:
              annotations:
                vixens.io/service-binding: "false"
      context:
        # Safely read app label — returns '' if absent, avoiding JMESPath errors
        - name: app_label
          variable:
            jmesPath: "request.object.metadata.labels.app || ''"
        - name: service_count
          apiCall:
            urlPath: "/api/v1/namespaces/{{request.namespace}}/services"
            jmesPath: "items[?spec.selector.app == '{{app_label}}'] | length(@)"
      validate:
        message: >-
          No Service found targeting app={{app_label}} in namespace
          {{request.namespace}}. Add vixens.io/service-binding: 'false'
          to bypass (controllers/workers/daemons that don't receive traffic).
        deny:
          conditions:
            all:
              - key: "{{ service_count || '0' }}"
                operator: Equals
                value: 0

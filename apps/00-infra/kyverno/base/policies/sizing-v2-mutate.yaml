|| (request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'B-micro' || request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'SB-micro' || request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'V-micro') && '100m' || (request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'B-nano' || request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'SB-nano' || request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'V-nano') && '50m' || null }}
                        memory: >-
                          {{ request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'G-2xlarge' && '4Gi' || request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'G-xlarge' && '2Gi' || request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'G-large' && '1Gi' || request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'G-medium' && '512Mi' || request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'G-small' && '256Mi' || request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'G-micro' && '128Mi' || request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'G-nano' && '64Mi' || (request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'B-2xlarge') && '8Gi' || (request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'B-xlarge') && '4Gi' || (request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'B-large') && '2Gi' || (request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'B-medium') && '1Gi' || (request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'B-small') && '512Mi' || (request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'B-micro') && '256Mi' || (request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'B-nano') && '128Mi' || (request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'SB-2xlarge' || request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'V-2xlarge') && '16Gi' || (request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'SB-xlarge' || request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'V-xlarge') && '8Gi' || (request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'SB-large' || request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'V-large') && '4Gi' || (request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'SB-medium' || request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'V-medium') && '2Gi' || (request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'SB-small' || request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'V-small') && '1Gi' || (request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'SB-micro' || request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'V-micro') && '512Mi' || (request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'SB-nano' || request.object.metadata.labels."vixens.io/sizing.{{element.name}}" == 'V-nano') && '256Mi' || null }}

    # Rule 3: Unlabeled sidecar defaults
    # Containers without ANY vixens.io/sizing.* label receive baseline sidecar defaults.
    # VPA (via sizing-vpa-generate.yaml) will then tune these per-pod-per-container.
    - name: v2-unlabeled-sidecar-defaults
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              names:
                - trivy-server
              namespaces:
                - security
      mutate:
        foreach:
          - list: "request.object.spec.containers || '[]'"
            preconditions:
              all:
                # Only act on containers that have NO v2 sizing label.
                # Use keys() to avoid 'Unknown key' JMESPath error on absent labels.
                - key: "{{ request.object.metadata.labels | keys(@) | [?@ == 'vixens.io/sizing.{{element.name}}'] | length(@) }}"
                  operator: Equals
                  value: "0"
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{ element.name }}"
                    resources:
                      requests:
                        cpu: "10m"
                        memory: "128Mi"
                      limits:
                        cpu: "100m"
                        memory: "512Mi"

---
# sizing-mutate.yaml (v1) — DEPRECATED, replaced by sizing-v2-mutate.yaml
#
# All containers have been migrated to v2-style labels (MODE-size, e.g. B-nano, V-small).
# This policy is now a no-op: preconditions ensure it never fires.
# Kept as an empty shell to avoid ArgoCD drift until it can be cleanly removed.
#
# See: feat/sizing-full-v2 — migration of all v1 labels to v2 format
# TODO: delete this file once the no-op behavior is confirmed stable in prod
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: sizing-mutate
  annotations:
    policies.kyverno.io/title: Granular Sizing Mutation (DEPRECATED)
    policies.kyverno.io/category: Resource Management
    policies.kyverno.io/description: >-
      DEPRECATED. All labels migrated to v2 format (sizing-v2-mutate).
      This policy fires on no containers (preconditions block all v2 labels).
spec:
  validationFailureAction: Audit
  background: false
  rules:
    # Rule 1: Per-container Sizing — DEPRECATED, never fires (all labels are v2-style)
    - name: granular-container-sizing
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              names:
                - trivy-server
              namespaces:
                - security
      mutate:
        foreach:
          - list: "request.object.spec.containers || '[]'"
            preconditions:
              all:
                # All containers now use v2-style labels (containing '-').
                # This precondition ensures v1 never fires on any container.
                - key: "{{ contains(request.object.metadata.labels.\"vixens.io/sizing.{{element.name}}\" || 'none', '-') }}"
                  operator: Equals
                  value: "false"
            patchStrategicMerge:
              spec:
                containers:
                  - (name): "{{ element.name }}"
                    resources:
                      requests:
                        cpu: "10m"
                        memory: "64Mi"
                      limits:
                        cpu: "100m"
                        memory: "128Mi"

    # Rule 2: Init Containers Sizing — DEPRECATED, never fires
    - name: granular-init-container-sizing
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              names:
                - trivy-server
              namespaces:
                - security
      mutate:
        foreach:
          - list: "request.object.spec.initContainers || '[]'"
            preconditions:
              all:
                # All init containers now use v2-style labels (containing '-').
                - key: "{{ contains(request.object.metadata.labels.\"vixens.io/sizing.{{element.name}}\" || 'none', '-') }}"
                  operator: Equals
                  value: "false"
            patchStrategicMerge:
              spec:
                initContainers:
                  - (name): "{{ element.name }}"
                    resources:
                      requests:
                        cpu: "10m"
                        memory: "64Mi"
                      limits:
                        cpu: "100m"
                        memory: "128Mi"

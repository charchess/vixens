---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: check-vpa-recommendations
  annotations:
    policies.kyverno.io/title: Require VPA Recommendations
    policies.kyverno.io/category: Maturity (Platinum)
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Deployments and StatefulSets must have a VPA object with recommendations for maturity
      Level 4 (Platinum). Mode V-* sizing label auto-passes via Goldilocks pipeline.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-vpa-goldilocks
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
      validate:
        message: "VPA/Goldilocks pipeline must be configured (goldilocks.fairwinds.com/enabled and vpa.kubernetes.io/updateMode annotations required) for maturity Level 4 (Platinum)."
        pattern:
          metadata:
            annotations:
              goldilocks.fairwinds.com/enabled: "true"
              vpa.kubernetes.io/updateMode: "?*"

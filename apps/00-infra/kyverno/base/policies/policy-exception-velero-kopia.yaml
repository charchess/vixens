---
# PolicyException: Velero kopia repository maintenance jobs
#
# Velero spawns short-lived kopia maintenance pods (velero-repo-maintenance-*)
# to manage backup repository housekeeping. These pods have explicit resources
# set via the velero-repo-maintenance-config ConfigMap (1Gi memory limit).
# The sizing-mutate policy must NOT override these resources, otherwise the
# maintenance job runs at micro (128Mi) and OOMKills.
#
# Task: vixens-343j
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: velero-kopia-sizing-exception
  namespace: kyverno
spec:
  exceptions:
    - policyName: sizing-mutate
      ruleNames:
        - granular-container-sizing
        - granular-init-container-sizing
  match:
    any:
      - resources:
          kinds:
            - Pod
          namespaces:
            - velero
          names:
            - "velero-repo-maintenance-*"

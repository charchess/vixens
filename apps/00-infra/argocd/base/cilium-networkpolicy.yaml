---
# ArgoCD — communication interne entre composants
# Critique : sans cette CNP, selfHeal est bloqué quand le default-deny est actif
# argocd-application-controller <-> argocd-repo-server <-> argocd-redis <-> argocd-server
# endpointSelector: {} = tous les pods du namespace argocd
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: argocd
  namespace: argocd
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: argocd
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
    - fromEntities:
        - host
        - remote-node
  egress:
    # argocd-controller → redis, repo-server, dex, server (intra-namespace)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: argocd
    # argocd-controller → kube-apiserver (manage cluster resources, watch CRDs)
    - toEntities:
        - kube-apiserver
    # argocd-repo-server → git/helm repos, argocd-server → SSO/webhooks
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "80"
              protocol: TCP

---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  - ../../base
  - ingress.yaml

patches:
  - path: resources-patch.yaml
  - path: patches/argocd-params.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: argocd-redis
    path: patches/redis-resources-json.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: argocd-redis
    path: patches/redis-probes-json.yaml
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: argocd-dex-server
    path: patches/dex-run-as-user-json.yaml
  # QW3: priorityClassName vixens-critical for all ArgoCD workloads
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: placeholder
      spec:
        template:
          spec:
            priorityClassName: vixens-critical
    target:
      kind: Deployment
  - patch: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: placeholder
      spec:
        template:
          spec:
            priorityClassName: vixens-critical
    target:
      kind: StatefulSet
  # fast-start: ArgoCD components start quickly, no startup probe needed
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: placeholder
      spec:
        template:
          metadata:
            annotations:
              vixens.io/fast-start: "true"
    target:
      kind: Deployment
  - patch: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: placeholder
      spec:
        template:
          metadata:
            annotations:
              vixens.io/fast-start: "true"
    target:
      kind: StatefulSet

components:
  - ../../../../_shared/components/revision-history-limit

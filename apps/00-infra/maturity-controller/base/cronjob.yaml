---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: maturity-controller
  namespace: kyverno
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: maturity-controller
          initContainers:
            - name: kubectl-copy
              image: bitnami/kubectl:latest
              command:
                - sh
                - -c
                - cp /opt/bitnami/kubectl/bin/kubectl /tools/kubectl
              volumeMounts:
                - name: tools
                  mountPath: /tools
          containers:
            - name: controller
              image: python:3.12-slim
              command:
                - python3
                - /scripts/sync_maturity.py
              env:
                - name: PATH
                  value: "/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              volumeMounts:
                - name: script
                  mountPath: /scripts
                - name: tools
                  mountPath: /tools
          restartPolicy: OnFailure
          volumes:
            - name: script
              configMap:
                name: maturity-script
            - name: tools
              emptyDir: {}

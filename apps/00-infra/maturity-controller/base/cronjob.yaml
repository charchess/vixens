---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: maturity-controller
  namespace: kyverno
spec:
  schedule: "*/15 * * * *"
  timeZone: Europe/Paris
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          serviceAccountName: maturity-controller
          initContainers:
            - name: kubectl-copy
              image: bitnami/kubectl@sha256:13f055d594719a59102c67d2b0c57c92f74c7fc86a02fb2e18736999082e0848
              command:
                - sh
                - -c
                - cp /opt/bitnami/kubectl/bin/kubectl /tools/kubectl
              volumeMounts:
                - name: tools
                  mountPath: /tools
          containers:
            - name: controller
              image: python:3.14-slim
              command:
                - python3
                - /scripts/sync_maturity.py
              env:
                - name: PATH
                  value: "/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
              volumeMounts:
                - name: script
                  mountPath: /scripts
                - name: tools
                  mountPath: /tools
          restartPolicy: OnFailure
          volumes:
            - name: script
              configMap:
                name: maturity-script
            - name: tools
              emptyDir: {}

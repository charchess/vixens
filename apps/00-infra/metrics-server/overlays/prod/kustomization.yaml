---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
patches:
  - patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 100m
            memory: 200Mi
    target:
      kind: Deployment
      name: metrics-server
  # nometrics: metrics-server uses port 10250 (HTTPS API), not a Prometheus scrape endpoint
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: metrics-server
      spec:
        template:
          metadata:
            annotations:
              vixens.io/nometrics: "true"
    target:
      kind: Deployment
      name: metrics-server
resources:
  - ../../base

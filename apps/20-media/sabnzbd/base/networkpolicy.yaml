---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sabnzbd
spec:
  podSelector:
    matchLabels:
      app: sabnzbd
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from Traefik (HTTP)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8080
    # Allow ingress from media namespace (arr apps: whisparr, radarr, sonarr, etc.)
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # Allow all egress (homelab: DNS, inter-app, external APIs)
    - {}

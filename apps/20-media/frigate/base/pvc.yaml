---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-config-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-delete
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-cache-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-delete
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frigate-litestream-config
data:
  litestream.yml: |
    dbs:
      - path: /tmp/cache/frigate.db
        replicas:
          - url: s3://$LITESTREAM_BUCKET/frigate.db
            endpoint: $LITESTREAM_ENDPOINT
          - path: /config/frigate.db
    addr: ":9090"

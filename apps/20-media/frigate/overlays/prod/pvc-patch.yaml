---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-config-pvc
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  storageClassName: synelia-iscsi-xfs-retain
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: frigate-cache-pvc
spec:
  storageClassName: synelia-iscsi-xfs-retain
  resources:
    requests:
      storage: 10Gi

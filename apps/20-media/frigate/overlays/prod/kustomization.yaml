---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress.yaml
  - cache-pvc.yaml

components:
  - ../../../../_shared/components/infisical/env-prod
  - ../../../../_shared/components/sync-wave/wave-7
  - ../../../../_shared/components/goldilocks/enabled
  - ../../../../_shared/components/base
  - ../../../../_shared/components/revision-history-limit
  - ../../../../_shared/components/metrics
  - ../../../../_shared/components/poddisruptionbudget/0
  - ../../../../_shared/components/dataangel

patches:
  - target:
      kind: InfisicalSecret
      name: frigate-config-sync
    path: infisical-config-patch.yaml
  - target:
      kind: Deployment
      name: frigate
    path: shm-patch-named.yaml
  - target:
      kind: Deployment
      name: frigate
    path: node-affinity-patch.yaml
  - target:
      kind: Deployment
      name: frigate
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: frigate
      spec:
        template:
          metadata:
            labels:
              vixens.io/sizing.frigate: SB-xlarge
              vixens.io/sizing.litestream: V-nano
              vixens.io/sizing.config-syncer: V-nano
            annotations:
              vixens.io/explicitly-allow-root: "true"
          spec:
            securityContext:
              runAsNonRoot: false
              runAsUser: 0
              fsGroup: 0
            initContainers:
              - name: restore-config
                securityContext:
                  runAsUser: 0
                  runAsGroup: 0
              - name: validate-config
                securityContext:
                  runAsUser: 0
                  runAsGroup: 0
            containers:
              - name: frigate
                securityContext:
                  privileged: true
                  runAsUser: 0
                  runAsGroup: 0
              - name: litestream
                securityContext:
                  runAsUser: 0
                  runAsGroup: 0
              - name: config-syncer
                securityContext:
                  runAsUser: 0
                  runAsGroup: 0
  - path: pvc-patch.yaml
  - path: dataangel.yaml
  - target:
      kind: Deployment
      name: frigate
    patch: |-
      - op: replace
        path: /spec/template/spec/volumes/3
        value:
          name: cache
          persistentVolumeClaim:
            claimName: frigate-cache-pvc

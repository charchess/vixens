---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress.yaml

components:
  - ../../../../_shared/components/infisical/env-prod
  - ../../../../_shared/components/sync-wave/wave-7
  - ../../../../_shared/components/goldilocks/enabled
  - ../../../../_shared/components/base
  - ../../../../_shared/components/revision-history-limit
  - ../../../../_shared/components/metrics
  - ../../../../_shared/components/poddisruptionbudget/0
  - ../../../../_shared/components/dataangel

patches:
  - target:
      kind: Deployment
      name: frigate
    path: shm-patch-named.yaml
  - target:
      kind: Deployment
      name: frigate
    path: node-affinity-patch.yaml
  - target:
      kind: Deployment
      name: frigate
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: frigate
      spec:
        template:
          metadata:
            labels:
              vixens.io/sizing.frigate: V-2xlarge
            annotations:
              vixens.io/explicitly-allow-root: "true"
              vixens.io/vpa.update-mode: "Off"
          spec:
            securityContext:
              runAsNonRoot: false
              runAsUser: 0
              fsGroup: 0
            initContainers:
              - name: validate-config
                securityContext:
                  runAsUser: 0
                  runAsGroup: 0
            containers:
              - name: frigate
                securityContext:
                  privileged: true
                  runAsUser: 0
                  runAsGroup: 0
  - path: pvc-patch.yaml
  - path: dataangel.yaml

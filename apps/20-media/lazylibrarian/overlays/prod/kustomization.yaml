---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - ingress.yaml

components:
  - ../../../../_shared/components/sync-wave/wave-10
  - ../../../../_shared/components/goldilocks/enabled
  - ../../../../_shared/components/revision-history-limit

patches:
  - target:
      kind: InfisicalSecret
      name: lazylibrarian-secrets-sync
    patch: |-
      - op: replace
        path: /spec/authentication/universalAuth/secretsScope/envSlug
        value: prod

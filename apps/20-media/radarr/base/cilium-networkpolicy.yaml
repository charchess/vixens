---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: radarr
spec:
  endpointSelector:
    matchLabels:
      app: radarr
  ingress:
    - fromEntities:
        - host
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "7878"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
  egress:
    # radarr → Prowlarr (indexer searches)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: media
            app: prowlarr
      toPorts:
        - ports:
            - port: "9696"
              protocol: TCP
    # radarr → world (TMDB, metadata APIs)
    - toEntities:
        - world

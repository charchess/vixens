---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: prowlarr
  namespace: media
  labels:
    app: prowlarr
spec:
  selector:
    matchLabels:
      app: prowlarr
  namespaceSelector:
    matchNames:
      - media
  endpoints:
    - port: metrics
      targetPort: 9090
      path: /metrics
      interval: 60s

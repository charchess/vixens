apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: pyload
  namespace: downloads
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: pyload
  egress:
    - {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: pyload
  namespace: downloads
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: pyload
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
  egress:
    # pyload → world (download sources, NAS/MinIO at 192.168.111.69:9000)
    - toEntities:
        - world

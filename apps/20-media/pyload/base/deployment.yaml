---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyload
  labels:
    app: pyload
    vixens.io/sizing-v2: "true"
    vixens.io/vpa-mode: Auto
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: pyload
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pyload
        vixens.io/sizing.pyload: V-small
        vixens.io/backup-profile: "relaxed"
      annotations:
        vixens.io/service-binding: "false"
        vixens.io/no-long-connections: "true"
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      priorityClassName: vixens-low
      containers:
        - name: pyload
          image: lscr.io/linuxserver/pyload-ng:0.5.0
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Paris
            - name: HTTP_PROXY
              value: http://gluetun.services.svc.cluster.local:8888
            - name: HTTPS_PROXY
              value: http://gluetun.services.svc.cluster.local:8888
            - name: NO_PROXY
              value: localhost,127.0.0.1,10.0.0.0/8,192.168.0.0/16
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 15
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: pyload-config-pvc
        - name: downloads
          nfs:
            server: 192.168.111.69
            path: /volume3/Downloads/pyload
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

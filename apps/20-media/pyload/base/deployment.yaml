---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyload
  labels:
    app: pyload
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: pyload
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pyload
        vixens.io/sizing.pyload: V-small
        vixens.io/backup-profile: "relaxed"
      annotations:
        vixens.io/service-binding: "false"
        vixens.io/no-long-connections: "true"
        kubectl.kubernetes.io/restartedAt: "2026-03-11T22:15:00Z"
        vixens.io/explicitly-allow-root: "true"
        vixens.io/vpa.min-memory: "64Mi"
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      priorityClassName: vixens-low
      initContainers:
        - name: fix-run-dir
          image: busybox:1.37.0
          command: ["sh", "-c", "chown 1000:1000 /run"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: run
              mountPath: /run
      containers:
        - name: pyload
          resources:
            requests:
              cpu: 5m
              memory: 256Mi
            limits:
              cpu: 20m
              memory: 512Mi
          image: lscr.io/linuxserver/pyload-ng:0.5.0
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Paris
            - name: HTTP_PROXY
              value: http://gluetun.services.svc.cluster.local:8888
            - name: HTTPS_PROXY
              value: http://gluetun.services.svc.cluster.local:8888
            - name: NO_PROXY
              value: localhost,127.0.0.1,10.0.0.0/8,192.168.0.0/16
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 15
            periodSeconds: 10
            timeoutSeconds: 5
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: run
              mountPath: /run
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
      volumes:
        - name: run
          emptyDir: {}
        - name: config
          emptyDir: {}
        - name: downloads
          nfs:
            server: 192.168.111.69
            path: /volume3/Downloads/pyload
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

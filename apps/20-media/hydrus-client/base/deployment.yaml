---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hydrus-client
  labels:
    app: hydrus-client
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hydrus-client
  template:
    metadata:
      labels:
        app: hydrus-client
        vixens.io/sizing.hydrus-client: V-large
        vixens.io/sizing.litestream: V-nano
        vixens.io/sizing.check-integrity: B-medium
        vixens.io/sizing.restore-db: B-nano
        vixens.io/sizing.restore-mappings: B-nano
        vixens.io/sizing.restore-master: B-nano
        vixens.io/sizing.restore-caches: B-nano
        vixens.io/backup-profile: "relaxed"
      annotations:
        reloader.stakater.com/auto: "true"
        vixens.io/fast-start: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        vixens.io/no-long-connections: "true"
    spec:
      priorityClassName: vixens-medium
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: check-integrity
          image: keinos/sqlite3:3.52.0
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          command: ["/bin/sh", "-c"]
          args:
            - |
              touch /opt/hydrus/db/hydrus_crash.log
              for db in /opt/hydrus/db/*.db; do
                [ -e "$db" ] || continue
                echo "🔍 Checking $db..."
                if ! sqlite3 "$db" "PRAGMA quick_check;" | grep -q "ok"; then
                  echo "❌ Corruption detected in $db! Deleting for fresh restore."
                  rm -f "$db" "$db-wal" "$db-shm"
                else
                  echo "✅ $db is healthy."
                fi
              done
          volumeMounts:
            - name: config
              mountPath: /opt/hydrus/db
        - name: restore-db
          image: litestream/litestream:0.5.10
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          command: ["/bin/sh", "-c"]
          args:
            - |
              rm -f /opt/hydrus/db/*.tmp* /opt/hydrus/db/*-wal;
              DB_PATH=/opt/hydrus/db/client.db
              if [ -f "$DB_PATH" ]; then
                echo "✅ Local healthy DB found. Skipping restore."
                exit 0
              fi
              echo "⚠️ DB missing or corrupted. Restoring from S3..."
              litestream restore -config /etc/litestream.yml -if-db-not-exists -if-replica-exists "$DB_PATH"
          envFrom:
            - secretRef:
                name: hydrus-client-secrets
          volumeMounts:
            - name: config
              mountPath: /opt/hydrus/db
            - name: hydrus-client-litestream-config
              mountPath: /etc/litestream.yml
              subPath: litestream.yml
        - name: restore-mappings
          image: litestream/litestream:0.5.10
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          command: ["/bin/sh", "-c"]
          args:
            - |
              rm -f /opt/hydrus/db/*.tmp* /opt/hydrus/db/*-wal;
              DB_PATH=/opt/hydrus/db/client.mappings.db
              if [ -f "$DB_PATH" ]; then
                echo "✅ Local healthy DB found. Skipping restore."
                exit 0
              fi
              echo "⚠️ DB missing or corrupted. Restoring from S3..."
              litestream restore -config /etc/litestream.yml -if-db-not-exists -if-replica-exists "$DB_PATH"
          envFrom:
            - secretRef:
                name: hydrus-client-secrets
          volumeMounts:
            - name: config
              mountPath: /opt/hydrus/db
            - name: hydrus-client-litestream-config
              mountPath: /etc/litestream.yml
              subPath: litestream.yml
        - name: restore-master
          image: litestream/litestream:0.5.10
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          command: ["/bin/sh", "-c"]
          args:
            - |
              rm -f /opt/hydrus/db/*.tmp* /opt/hydrus/db/*-wal;
              DB_PATH=/opt/hydrus/db/client.master.db
              if [ -f "$DB_PATH" ]; then
                echo "✅ Local healthy DB found. Skipping restore."
                exit 0
              fi
              echo "⚠️ DB missing or corrupted. Restoring from S3..."
              litestream restore -config /etc/litestream.yml -if-db-not-exists -if-replica-exists "$DB_PATH"
          envFrom:
            - secretRef:
                name: hydrus-client-secrets
          volumeMounts:
            - name: config
              mountPath: /opt/hydrus/db
            - name: hydrus-client-litestream-config
              mountPath: /etc/litestream.yml
              subPath: litestream.yml
        - name: restore-caches
          image: litestream/litestream:0.5.10
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Stop deleting client.caches.db to avoid GUI popups at startup.
              # Only clean technical remnants and other db WALs.
              rm -f /opt/hydrus/db/*.tmp* /opt/hydrus/db/client.db-wal /opt/hydrus/db/client.mappings.db-wal /opt/hydrus/db/client.master.db-wal;
              echo "✅ Technical artifacts cleaned. Healthy cache preserved if present."
              exit 0
          envFrom:
            - secretRef:
                name: hydrus-client-secrets
          volumeMounts:
            - name: config
              mountPath: /opt/hydrus/db
            - name: hydrus-client-litestream-config
              mountPath: /etc/litestream.yml
              subPath: litestream.yml
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: hydrus-client
          resources:
            requests:
              cpu: 100m
              memory: 1Gi
            limits:
              cpu: 400m
              memory: 4Gi
          image: ghcr.io/hydrusnetwork/hydrus:v665
          ports:
            - containerPort: 5800
          livenessProbe:
            httpGet:
              path: /
              port: 5800
            initialDelaySeconds: 120
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 5800
            initialDelaySeconds: 30
            periodSeconds: 10
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Paris
          volumeMounts:
            - name: config
              mountPath: /opt/hydrus/db
            - name: client-files
              mountPath: /opt/hydrus/db/client_files
        - name: litestream
          resources:
            requests:
              cpu: 5m
              memory: 64Mi
            limits:
              cpu: 20m
              memory: 256Mi
          image: litestream/litestream:0.5.10
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          args:
            - replicate
            - -config
            - /etc/litestream.yml
          ports:
            - containerPort: 9090
              name: metrics
          envFrom:
            - secretRef:
                name: hydrus-client-secrets
          volumeMounts:
            - name: config
              mountPath: /opt/hydrus/db
            - name: hydrus-client-litestream-config
              mountPath: /etc/litestream.yml
              subPath: litestream.yml
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /metrics
              port: metrics
            failureThreshold: 15
            periodSeconds: 10
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: hydrus-client-config-pvc
        - name: client-files
          nfs:
            server: 192.168.111.69
            path: /volume3/Content/pictures/hentai/client_files
        - name: hydrus-client-litestream-config
          configMap:
            name: hydrus-client-litestream-config

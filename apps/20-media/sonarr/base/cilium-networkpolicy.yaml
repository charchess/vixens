---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: sonarr
spec:
  endpointSelector:
    matchLabels:
      app: sonarr
  ingress:
    - fromEntities:
        - host
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "8989"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
  egress:
    # sonarr → Prowlarr (indexer searches)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: media
            app: prowlarr
      toPorts:
        - ports:
            - port: "9696"
              protocol: TCP
    # sonarr → world (TVDB, TheTVDB, metadata APIs)
    - toEntities:
        - world

---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: media

resources:
  - ../../base
  - ingress.yaml

components:
  - ../../../../_shared/components/infisical/env-prod
  - ../../../../_shared/components/sync-wave/wave-10
  - ../../../../_shared/components/goldilocks/enabled
  - ../../../../_shared/components/base
  - ../../../../_shared/components/revision-history-limit
  - ../../../../_shared/components/metrics
  - ../../../../_shared/components/poddisruptionbudget/0
  - ../../../../_shared/components/securitycontext/s6-overlay
  - ../../../../_shared/components/dataangel

patches:
  - target:
      kind: Deployment
      name: sonarr
    path: resources-patch.yaml
  - path: dataangel.yaml
  - patch: |-
      - op: replace
        path: /spec/storageClassName
        value: local-path-delete
    target:
      kind: PersistentVolumeClaim
      name: sonarr-config-pvc

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: birdnet-go
spec:
  template:
    metadata:
      labels:
        vixens.io/sizing.birdnet-go: G-large
        vixens.io/sizing.litestream: G-small
        vixens.io/sizing.data-syncer: G-small
    spec:
      containers:
        - name: birdnet-go
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 23m
              memory: 214Mi

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: birdnet-go
  namespace: birdnet-go
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: birdnet-go
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
  egress:
    - {}
    - toEntities:
        - world

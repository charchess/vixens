---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: birdnet-go
  labels:
    app: birdnet-go
    app.kubernetes.io/managed-by: argocd
    vixens.io/sizing-v2: "true"
    vixens.io/vpa-mode: Auto
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: birdnet-go
  template:
    metadata:
      labels:
        app: birdnet-go
        vixens.io/sizing.birdnet-go: V-medium
        vixens.io/sizing.litestream: V-nano
        vixens.io/sizing.data-syncer: V-nano
        vixens.io/sizing.fix-permissions: G-nano
        vixens.io/backup-profile: "relaxed"
      annotations:
        goldilocks.fairwinds.com/enabled: "true"
        vixens.io/fast-start: "true"
        reloader.stakater.com/auto: "true"
        vixens.io/no-long-connections: "true"
        vixens.io/explicitly-allow-root: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      priorityClassName: vixens-medium
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      initContainers:
        - name: fix-permissions
          image: busybox:1.37.0
          command:
            - sh
            - -c
            - |
              chown -R 1000:1000 /data
              rm -rf /data/*.db-litestream /data/.*-litestream /data/birdnet.db /data/birdnet.db-wal /data/birdnet.db-shm
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
        - name: litestream-restore
          image: litestream/litestream:0.5.9
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          args:
            - restore
            - -config
            - /etc/litestream.yml
            - -if-replica-exists
            - /data/birdnet.db
          envFrom:
            - secretRef:
                name: birdnet-go-secrets
          volumeMounts:
            - name: data
              mountPath: /data
            - name: litestream-config
              mountPath: /etc/litestream.yml
              subPath: litestream.yml
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      containers:
        - name: birdnet-go
          image: ghcr.io/tphakala/birdnet-go:v0.6.3
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop: ["ALL"]
          env:
            - name: TZ
              value: Europe/Paris
            - name: WEB_PORT
              value: "8080"
            - name: HOME
              value: /home/birdnet
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /home/birdnet/.config/birdnet-go
            - name: data
              mountPath: /data
            - name: internals
              mountPath: /data/clips
              subPath: birdnet/clips
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
        - name: litestream
          image: litestream/litestream:0.5.9
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          args:
            - replicate
            - -config
            - /etc/litestream.yml
          ports:
            - containerPort: 9090
              name: metrics
          envFrom:
            - secretRef:
                name: birdnet-go-secrets
          volumeMounts:
            - name: data
              mountPath: /data
            - name: litestream-config
              mountPath: /etc/litestream.yml
              subPath: litestream.yml
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
        - name: data-syncer
          image: rclone/rclone:1.73
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          command:
            - sh
            - -c
          args:
            - |
              export RCLONE_CONFIG_S3_TYPE=s3
              export RCLONE_CONFIG_S3_PROVIDER=Other
              export RCLONE_CONFIG_S3_ACCESS_KEY_ID=$LITESTREAM_ACCESS_KEY_ID
              export RCLONE_CONFIG_S3_SECRET_ACCESS_KEY=$LITESTREAM_SECRET_ACCESS_KEY
              export RCLONE_CONFIG_S3_ENDPOINT=$LITESTREAM_ENDPOINT
              sync_s3() {
                rclone sync /data s3:$LITESTREAM_BUCKET/birdnet-go \
                  --exclude "*.db*" \
                  --exclude "lost+found/**" \
                  --exclude "clips/**" \
                  --exclude "*.tmp"
              }
              while true; do
                sync_s3;
                sleep 60;
              done
          envFrom:
            - secretRef:
                name: birdnet-go-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            exec:
              command:
                - pgrep
                - rclone
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            exec:
              command:
                - pgrep
                - rclone
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: birdnet-go-config
        - name: data
          persistentVolumeClaim:
            claimName: birdnet-go-data
        - name: internals
          nfs:
            server: 192.168.111.69
            path: /volume3/Internal
        - name: litestream-config
          configMap:
            name: birdnet-go-litestream-config
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

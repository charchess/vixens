---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: birdnet-go
  labels:
    app: birdnet-go
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: birdnet-go
  template:
    metadata:
      labels:
        app: birdnet-go
        vixens.io/sizing.birdnet-go: V-medium
        vixens.io/backup-profile: "relaxed"
      annotations:
        goldilocks.fairwinds.com/enabled: "true"
        vixens.io/fast-start: "true"
        reloader.stakater.com/auto: "true"
        vixens.io/no-long-connections: "true"
        dataangel.io/metrics-port: "9090"
    spec:
      priorityClassName: vixens-medium
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      initContainers: []
      containers:
        - name: birdnet-go
          image: ghcr.io/tphakala/birdnet-go:v0.6.3
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop: ["ALL"]
          env:
            - name: TZ
              value: Europe/Paris
            - name: WEB_PORT
              value: "8080"
            - name: HOME
              value: /home/birdnet
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /home/birdnet/.config/birdnet-go
              subPath: birdnet-config
            - name: data
              mountPath: /data
            - name: internals
              mountPath: /data/clips
              subPath: birdnet/clips
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: data
          emptyDir: {}
        - name: internals
          nfs:
            server: 192.168.111.69
            path: /volume3/Internal
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: mylar
spec:
  endpointSelector:
    matchLabels:
      app: mylar
  ingress:
    - fromEntities:
        - host
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "8090"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
  egress:
    # mylar → Prowlarr (indexer searches)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: media
            app: prowlarr
      toPorts:
        - ports:
            - port: "9696"
              protocol: TCP
    # mylar → world (Comic Vine, metadata APIs)
    - toEntities:
        - world

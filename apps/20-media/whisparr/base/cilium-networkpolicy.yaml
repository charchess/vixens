---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: whisparr
spec:
  endpointSelector:
    matchLabels:
      app: whisparr
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "6969"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
  egress:
    # whisparr → Prowlarr (indexer searches)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: media
            app: prowlarr
      toPorts:
        - ports:
            - port: "9696"
              protocol: TCP
    # whisparr → world (metadata APIs)
    - toEntities:
        - world

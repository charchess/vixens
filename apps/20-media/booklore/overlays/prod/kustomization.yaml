---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - ingress.yaml
components:
  - ../../../../_shared/components/gold-maturity
  - ../../../../_shared/components/nometrics

patches:
  - target:
      kind: InfisicalSecret
      name: booklore-secrets-sync
    patch: |-
      - op: replace
        path: /spec/authentication/universalAuth/secretsScope/envSlug
        value: prod


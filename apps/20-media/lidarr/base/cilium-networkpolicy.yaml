---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: lidarr
spec:
  endpointSelector:
    matchLabels:
      app: lidarr
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "8686"
              protocol: TCP
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8686"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
  egress:
    # lidarr → Prowlarr (indexer searches)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: media
            app: prowlarr
      toPorts:
        - ports:
            - port: "9696"
              protocol: TCP
    # lidarr → world (MusicBrainz, metadata APIs)
    - toEntities:
        - world

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookshelf
  labels:
    app: bookshelf
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bookshelf
  template:
    metadata:
      labels:
        app: bookshelf
        vixens.io/sizing.bookshelf: V-small
      annotations:
        vixens.io/fast-start: "true"
        vixens.io/explicitly-allow-root: "true"
        vixens.io/no-long-connections: "true"
        prometheus.io/scrape: "false"
    spec:
      priorityClassName: vixens-low
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers: []
      containers:
        - name: bookshelf
          # hardcover = Hardcover.app metadata (higher quality than Goodreads)
          # softcover = Goodreads backward compat (for migrating existing Readarr DB)
          image: ghcr.io/pennydreadful/bookshelf:hardcover
          ports:
            - containerPort: 8787
              name: http
          env:
            - name: TZ
              value: Europe/Paris
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /ping
              port: http
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
            - name: books
              mountPath: /books
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: bookshelf-config-pvc
        - name: downloads
          nfs:
            server: 192.168.111.69
            path: /volume3/Downloads
        - name: books
          nfs:
            server: 192.168.111.69
            path: /volume3/Content/ebooks

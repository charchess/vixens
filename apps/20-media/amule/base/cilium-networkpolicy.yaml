---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: amule
  namespace: downloads
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: amule
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "4711"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring
    - toPorts:
        - ports:
            - port: "4662"
              protocol: TCP
            - port: "4665"
              protocol: UDP
            - port: "4672"
              protocol: UDP
    - toEntities:
        - world
  egress:
    # amule → gluetun SOCKS5 proxy (all P2P traffic tunneled through VPN)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: services
      toPorts:
        - ports:
            - port: "1080"
              protocol: TCP

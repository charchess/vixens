---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sakapuss-data
  labels:
    app: sakapuss
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-delete
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sakapuss-media
  labels:
    app: sakapuss
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path-delete
  resources:
    requests:
      storage: 5Gi

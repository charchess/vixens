---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: gluetun
spec:
  endpointSelector:
    matchLabels:
      app: gluetun
  ingress:
    - fromEntities:
        - host
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "8888"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: downloads
      toPorts:
        - ports:
            - port: "1080"
              protocol: TCP

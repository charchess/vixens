---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: gluetun
spec:
  endpointSelector:
    matchLabels:
      app: gluetun
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "8888"
              protocol: TCP
  egress:
    - {}

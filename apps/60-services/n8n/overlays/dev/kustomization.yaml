---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: services
resources:
  - ../../base
  - ingress.yaml
components:
  - ../../../../_shared/components/revision-history-limit
patches:
  - target:
      kind: Deployment
      name: n8n
    patch: |
      - op: replace
        path: /spec/replicas
        value: 0
  - target:
      kind: InfisicalSecret
      name: n8n-secrets
    patch: |
      - op: replace
        path: /spec/authentication/universalAuth/secretsScope/envSlug
        value: dev
  - target:
      kind: InfisicalSecret
      name: n8n-db-credentials-sync
    patch: |
      - op: replace
        path: /spec/authentication/universalAuth/secretsScope/envSlug
        value: dev

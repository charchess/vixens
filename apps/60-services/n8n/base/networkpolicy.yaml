---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: n8n
spec:
  podSelector:
    matchLabels:
      app: n8n
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from Traefik (HTTP)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 5678
    # Allow ingress from tools (Changedetection)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tools
  egress:
    # Allow all egress (Workflows need to call external APIs)
    - {}

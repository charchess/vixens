---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: services
  labels:
    app: openclaw
    vixens.io/sizing-v2: "true"
    vixens.io/vpa-mode: Auto
    vixens.io/tier: "diamond"
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
        vixens.io/sizing.install-tools: B-xlarge
        vixens.io/sizing.restore-config: B-nano
        vixens.io/sizing.setup-config: G-nano
        vixens.io/sizing.install-gemini: B-medium
        vixens.io/sizing.openclaw: SB-xlarge
        vixens.io/backup-profile: "relaxed"
      annotations:
        vixens.io/fast-start: "true"
        vixens.io/nometrics: "true"
        vixens.io/no-long-connections: "true"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      priorityClassName: vixens-high
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      initContainers:
        # 1/4 — Install system tools (merged fix-perms + install-tools)
        #        Skips reinstall if TOOLS_VERSION matches. Always chowns /data/tools.
        - name: install-tools
          image: debian:trixie
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
          args:
            - |
              set -e
              TOOLS_VERSION="1"
              if [ -f /data/tools/.installed-version ] && [ "$(cat /data/tools/.installed-version)" = "$TOOLS_VERSION" ]; then
                echo "Tools v$TOOLS_VERSION already present, skipping reinstall"
              else
                echo "Installing tools v$TOOLS_VERSION..."
                export DEBIAN_FRONTEND=noninteractive
                mkdir -p /data/tools/bin /data/tools/lib
                apt-get update
                apt-get install -y --no-install-recommends \
                  jq rsync python3-pip tree nano htop git sudo nmap dnsutils \
                  netcat-traditional sqlite3 ffmpeg imagemagick curl wget \
                  ca-certificates gnupg lsb-release build-essential unzip zip gzip
                for bin in jq rsync tree nano htop git nmap netcat ffmpeg convert sqlite3; do
                  cp /usr/bin/$bin /data/tools/bin/ 2>/dev/null || true
                  ldd /usr/bin/$bin 2>/dev/null | grep "=>" | awk '{print $3}' | xargs -I {} cp {} /data/tools/lib/ 2>/dev/null || true
                done
                cp -r /usr/lib/x86_64-linux-gnu/* /data/tools/lib/ 2>/dev/null || true
                curl -sLo /data/tools/bin/kubectl "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                chmod +x /data/tools/bin/kubectl
                curl -sLo /tmp/rclone.zip https://downloads.rclone.org/rclone-current-linux-amd64.zip
                unzip -j /tmp/rclone.zip rclone -d /data/tools/bin/ && chmod +x /data/tools/bin/rclone && rm -f /tmp/rclone.zip
                curl -sSL -o /data/tools/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
                chmod +x /data/tools/bin/argocd
                curl -sLo /data/tools/bin/talosctl "https://github.com/siderolabs/talos/releases/download/$(curl -sL https://api.github.com/repos/siderolabs/talos/releases/latest | grep -oP '"tag_name":\s*"\K[^"]+' )/talosctl-linux-amd64"
                chmod +x /data/tools/bin/talosctl
                curl -sSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
                echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
                apt-get update && apt-get install -y gh && cp /usr/bin/gh /data/tools/bin/
                curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /data/tools/bin/mc && chmod +x /data/tools/bin/mc
                curl -sSL "https://github.com/Infisical/cli/releases/download/v0.43.57/cli_0.43.57_linux_amd64.tar.gz" -o /tmp/infisical.tar.gz
                tar -xzf /tmp/infisical.tar.gz -C /data/tools/bin/ infisical && chmod +x /data/tools/bin/infisical && rm /tmp/infisical.tar.gz
                curl -sSL "https://github.com/pimalaya/himalaya/releases/download/v1.2.0/himalaya.x86_64-linux.tgz" -o /tmp/himalaya.tar.gz
                tar -xzf /tmp/himalaya.tar.gz -C /data/tools/bin/ himalaya && chmod +x /data/tools/bin/himalaya && rm /tmp/himalaya.tar.gz
                curl -sSL https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip.py
                python3 /tmp/get-pip.py --root=/data/tools --ignore-installed && rm /tmp/get-pip.py
                echo "node ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/node
                echo "$TOOLS_VERSION" > /data/tools/.installed-version
                apt-get clean && rm -rf /var/lib/apt/lists/*
                echo "Tools installed successfully"
              fi
              # Always fix permissions on tool dirs (targeted — fast)
              chown -R 1000:1000 /data/tools 2>/dev/null || true
          volumeMounts:
            - name: data
              mountPath: /data
        # 2/4 — Restore config from MinIO (merged restore-data + restore-config)
        - name: restore-config
          image: rclone/rclone:1.73
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          command:
            - sh
            - -c
          args:
            - |
              echo "DEBUG: RCLONE_BUCKET=$RCLONE_BUCKET"
              # Step 1: Restore .openclaw dir and extensions from MinIO (was restore-data)
              rclone lsd s3:$RCLONE_BUCKET || echo "Rclone list failed"
              rclone copy s3:$RCLONE_BUCKET/.openclaw /data/.openclaw --transfers 4 --exclude "lost+found/**" 2>/dev/null || true
              rclone copy s3:$RCLONE_BUCKET/extensions /data/extensions --transfers 4 --exclude "lost+found/**" 2>/dev/null || true
              # Step 1b: Migrate workspace from .openclaw/workspace/ to workspace/ if needed
              # (openclaw changed workspace path between versions; legacy data lives in .openclaw/workspace/)
              LEGACY_WS=/data/.openclaw/workspace
              ACTIVE_WS=/data/workspace
              if [ -d "$LEGACY_WS" ] && [ -f "$LEGACY_WS/MEMORY.md" ]; then
                # Check if active workspace is still a blank template (IDENTITY.md has no name)
                if ! grep -q '^- \*\*Name:\*\* ' "$ACTIVE_WS/IDENTITY.md" 2>/dev/null; then
                  echo "Migrating workspace from $LEGACY_WS to $ACTIVE_WS..."
                  cp -rn "$LEGACY_WS/." "$ACTIVE_WS/" 2>/dev/null || true
                  # Force-overwrite key identity files
                  for f in IDENTITY.md USER.md SOUL.md AGENTS.md MEMORY.md; do
                    [ -f "$LEGACY_WS/$f" ] && cp -f "$LEGACY_WS/$f" "$ACTIVE_WS/$f" && echo "  migrated $f"
                  done
                  # Remove BOOTSTRAP.md if identity is now populated
                  grep -q '^- \*\*Name:\*\* ' "$ACTIVE_WS/IDENTITY.md" 2>/dev/null && rm -f "$ACTIVE_WS/BOOTSTRAP.md" && echo "  removed BOOTSTRAP.md"
                  echo "Workspace migration complete"
                else
                  echo "Active workspace already populated, skipping migration"
                fi
              fi
              # Step 2: Restore openclaw.json (was restore-config)
              if [ -f /data/backup.lock ]; then
                echo "backup.lock found - preserving local config changes"
                cp /data/openclaw.json /data/openclaw.json.bak 2>/dev/null || true
                rm -f /data/backup.lock
                exit 0
              fi
              if [ ! -s /data/openclaw.json ]; then
                echo "No config in PVC, checking MinIO..."
                rclone copy s3:$RCLONE_BUCKET/openclaw.json /data/ --transfers 4 2>/dev/null || echo "MinIO restore failed"
              fi
              if [ ! -s /data/openclaw.json ]; then
                echo "No backup found, using default config"
                cp /default-config/openclaw.json /data/openclaw.json 2>/dev/null || true
              fi
              cp /data/openclaw.json /data/openclaw.json.bak 2>/dev/null || true
              chown -R 1000:1000 /data/*.json 2>/dev/null || true
              echo "Config ready"
          envFrom:
            - secretRef:
                name: openclaw-secrets
          volumeMounts:
            - name: data
              mountPath: /data
            - name: default-config
              mountPath: /default-config
              readOnly: true
        # 3/4 — Fix config keys + write Gemini credentials (merged fix-config + setup-gemini-config)
        - name: setup-config
          image: python:3.14-alpine
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          command:
            - sh
            - -c
          args:
            - |
              python3 << 'PYEOF'
              import json, base64, os, pathlib

              # Part 1: Remove legacy invalid keys from openclaw.json
              p = '/data/openclaw.json'
              if os.path.exists(p):
                  d = json.load(open(p))
                  s = d.get('skills', {})
                  l = s.get('load', {}) if isinstance(s, dict) else {}
                  l.pop('paths', None)
                  s.pop('load', None) if isinstance(s, dict) and not l else None
                  d.pop('skills', None) if isinstance(s, dict) and not s else None
                  json.dump(d, open(p, 'w'))
                  print('Config keys checked')

              # Part 2: Write Gemini credentials from secrets
              gemini_dir = pathlib.Path('/data/.gemini')
              gemini_dir.mkdir(parents=True, exist_ok=True)
              for filename, env_key in [
                  ('oauth_creds.json',     'GEMINI_OAUTH_CREDS_B64'),
                  ('google_accounts.json', 'GEMINI_GOOGLE_ACCOUNTS_B64'),
                  ('settings.json',        'GEMINI_SETTINGS_B64'),
                  ('installation_id',      'GEMINI_INSTALLATION_ID_B64'),
              ]:
                  val = os.environ.get(env_key, '')
                  if val:
                      (gemini_dir / filename).write_bytes(base64.b64decode(val))
              print('Setup complete')
              PYEOF
          envFrom:
            - secretRef:
                name: openclaw-secrets
          volumeMounts:
            - name: data
              mountPath: /data
        # 4/4 — Install Gemini plugin + CLI (merged install-gemini-plugin + install-gemini-cli)
        #        Skips reinstall if PLUGIN_VERSION file matches. Always chowns /data/gemini-cli.
        - name: install-gemini
          image: node:24-bookworm
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          command:
            - sh
            - -c
          args:
            - |
              set -e
              PLUGIN_VERSION="2026.1.22"
              if [ -f /data/node_modules/.gemini-plugin-version ] && \
                 [ "$(cat /data/node_modules/.gemini-plugin-version)" = "$PLUGIN_VERSION" ] && \
                 [ -d /data/gemini-cli/@google ]; then
                echo "Gemini plugin v$PLUGIN_VERSION and CLI already installed, skipping"
              else
                echo "Installing gemini plugin v$PLUGIN_VERSION and CLI..."
                npm install -g @clawdbot/google-gemini-cli-auth@$PLUGIN_VERSION
                mkdir -p /data/node_modules
                cp -r /usr/local/lib/node_modules/@clawdbot /data/node_modules/
                npm install -g @google/gemini-cli
                mkdir -p /data/gemini-cli
                cp -r /usr/local/lib/node_modules/@google /data/gemini-cli/
                rm -f /data/gemini-cli/gemini
                ln -s /data/gemini-cli/@google/gemini-cli/dist/index.js /data/gemini-cli/gemini
                echo "$PLUGIN_VERSION" > /data/node_modules/.gemini-plugin-version
                echo "Gemini installed successfully"
              fi
              # Always fix permissions (targeted)
              chown -R 1000:1000 /data/node_modules /data/gemini-cli 2>/dev/null || true
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.3.8
          imagePullPolicy: Always
          command:
            - node
            - /app/openclaw.mjs
            - gateway
            - --bind
            - lan
            - run
            - --allow-unconfigured
          ports:
            - containerPort: 18789
              name: http
          env:
            - name: TZ
              value: Europe/Paris
            - name: PATH
              value: /data/tools/usr/local/bin:/data/tools/local/bin:/data/tools/bin:/data/tools/lib:/data/gemini-cli:/data/gemini-cli/@google/gemini-cli/node_modules/.bin:/usr/local/bin:/usr/local/lib/node_modules/.bin:/usr/bin:/bin
            - name: LD_LIBRARY_PATH
              value: /usr/lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu:/lib:/usr/lib:/data/tools/lib/blas
            - name: PYTHONPATH
              value: /data/tools/usr/local/lib/python3.11/dist-packages:/data/tools/local/lib/python3.11/dist-packages
            - name: GEMINI_CLI_AUTH_DIR
              value: /data/.gemini
            - name: OPENCLAW_HOME
              value: /data
            - name: OPENCLAW_CONFIG_PATH
              value: /data/openclaw.json
            - name: OPENCLAW_PLUGINS
              value: discord,github,telegram,@clawdbot/google-gemini-cli-auth
            - name: NODE_PATH
              value: /data/node_modules
            - name: OPENCLAW_LOG_LEVEL
              value: info
            - name: OPENCLAW_GATEWAY_MODE
              value: local
            - name: OPENCLAW_GATEWAY_BIND
              value: lan
            - name: OPENCLAW_GATEWAY_INSECURE_AUTH
              value: "true"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_DISCORD_TOKEN
          livenessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 120
            periodSeconds: 30
          readinessProbe:
            tcpSocket:
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            tcpSocket:
              port: 18789
            failureThreshold: 90
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
        - name: data-syncer
          image: rclone/rclone:1.73
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          command:
            - sh
            - -c
          args:
            - |
              echo "DEBUG: RCLONE_BUCKET=$RCLONE_BUCKET"

              # Rclone reads RCLONE_CONFIG_S3_* env vars automatically from envFrom secretRef
              # NOTE: excludes must be single-quoted directly in the command - never via a variable.
              # The rclone image uses WORKDIR /data, so unquoted globs (tools/**) expand to
              # real files and break the rclone arg parser.
              do_rclone_sync() {
                rclone sync /data "s3:${RCLONE_BUCKET}" \
                  --exclude 'lost+found/**' \
                  --exclude 'node_modules/**' \
                  --exclude 'tools/**' \
                  --exclude 'gemini-cli/**' \
                  --exclude 'browser/**' \
                  --exclude 'canvas/**' \
                  --exclude 'extensions/**' \
                  --exclude '.openclaw/**' \
                  --exclude 'media/**' \
                  --exclude 'netbox-mcp-server/**'
              }

              # Handle pending backup lock from external tool
              if [ -f /data/backup.lock ]; then
                echo "backup.lock found - performing immediate backup before sync loop"
                do_rclone_sync || echo "Backup failed"
                rm -f /data/backup.lock
                echo "Backup complete, lock removed"
              fi

              sync_s3() {
                do_rclone_sync || echo "Sync failed"
              }
              while true; do
                sync_s3;
                touch /tmp/healthy;
                sleep 60;
              done
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "test -f /tmp/healthy"
            initialDelaySeconds: 180
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "test -f /tmp/healthy"
            initialDelaySeconds: 180
            periodSeconds: 10
          envFrom:
            - secretRef:
                name: openclaw-secrets
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: openclaw-config
          secret:
            secretName: openclaw-config
        - name: default-config
          configMap:
            name: openclaw-config

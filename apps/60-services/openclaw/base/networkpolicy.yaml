---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw
spec:
  podSelector:
    matchLabels:
      app: openclaw
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress from Traefik (HTTP)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 18789
    # Allow ingress from tools (Changedetection)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tools
    # Allow ingress from n8n (webhook triggers)
    - from:
        - podSelector:
            matchLabels:
              app: n8n
  egress:
    # Allow all egress (homelab: DNS, inter-app, external APIs)
    - {}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sogo
  namespace: sogo
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: Replace=true,Force=true
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: app
      app.kubernetes.io/instance: sogo
      app.kubernetes.io/name: sogo
  template:
    metadata:
      labels:
        app.kubernetes.io/component: app
        app.kubernetes.io/instance: sogo
        app.kubernetes.io/name: sogo
        vixens.io/sizing.sogo: V-medium
      annotations:
        vixens.io/sizing-rationale: "V-medium: groupware SOGo, 3 workers"
        prometheus.io/scrape: "false"
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

      initContainers:
        - name: config-init
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              apk add --no-cache gettext > /dev/null 2>&1
              envsubst < /tmpl/00-main.yaml > /conf/00-main.yaml
              echo "Config written:"
              cat /conf/00-main.yaml
          env:
            - name: SOGO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sogo-secrets
                  key: SOGO_DB_PASSWORD
          volumeMounts:
            - name: config-template
              mountPath: /tmpl
            - name: sogo-config
              mountPath: /conf

      containers:
        - name: sogo
          image: sonroyaalmerol/docker-sogo:5.12.4-3
          ports:
            - containerPort: 80
              name: http
          env:
            - name: SOGO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sogo-secrets
                  key: SOGO_DB_PASSWORD
          volumeMounts:
            - name: sogo-config
              mountPath: /etc/sogo/sogo.conf.d
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /SOGo/
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /SOGo/
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

      volumes:
        - name: config-template
          configMap:
            name: sogo-config-template
        - name: sogo-config
          emptyDir: {}

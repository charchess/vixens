---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sogo
  namespace: sogo
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: Replace=true,Force=true
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: app
      app.kubernetes.io/instance: sogo
      app.kubernetes.io/name: sogo
  template:
    metadata:
      labels:
        app.kubernetes.io/component: app
        app.kubernetes.io/instance: sogo
        app.kubernetes.io/name: sogo
        vixens.io/sizing.sogo: V-medium
      annotations:
        vixens.io/sizing-rationale: "V-medium: groupware SOGo, 3 workers"
        prometheus.io/scrape: "false"
        secret.reloader.stakater.com/reload: "sogo-secrets"
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule

      initContainers:
        - name: config-init
          image: alpine:3.23
          command:
            - sh
            - -c
            - |
              apk add --no-cache gettext > /dev/null 2>&1
              envsubst < /tmpl/00-main.yaml > /conf/00-main.yaml
              echo "Config written:"
              cat /conf/00-main.yaml
          env:
            - name: SOGO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sogo-secrets
                  key: SOGO_DB_PASSWORD
          volumeMounts:
            - name: config-template
              mountPath: /tmpl
            - name: sogo-config
              mountPath: /conf
        - name: user-init
          image: alpine:3.23
          command:
            - sh
            - -c
            - |
              apk add --no-cache postgresql-client > /dev/null 2>&1
              PGPASSWORD="${SOGO_DB_PASSWORD}" psql \
                "postgresql://sogo@postgresql-shared-rw.databases.svc.cluster.local:5432/sogo?sslmode=disable" \
                -c "INSERT INTO sogo_users (c_uid, c_name, c_password, c_cn, mail, c_imap_login)
                    VALUES ('${SOGO_ADMIN_USERNAME}', '${SOGO_ADMIN_USERNAME}', MD5('${SOGO_ADMIN_PASSWORD}'), '${SOGO_ADMIN_CN}', '${SOGO_ADMIN_EMAIL}', '${SOGO_ADMIN_EMAIL}')
                    ON CONFLICT (c_uid) DO UPDATE SET
                      c_password = MD5('${SOGO_ADMIN_PASSWORD}'),
                      c_cn = '${SOGO_ADMIN_CN}',
                      mail = '${SOGO_ADMIN_EMAIL}',
                      c_imap_login = '${SOGO_ADMIN_EMAIL}';"
              echo "User ${SOGO_ADMIN_USERNAME} upserted."
          env:
            - name: SOGO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sogo-secrets
                  key: SOGO_DB_PASSWORD
            - name: SOGO_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sogo-secrets
                  key: SOGO_ADMIN_USERNAME
            - name: SOGO_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sogo-secrets
                  key: SOGO_ADMIN_PASSWORD
            - name: SOGO_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: sogo-secrets
                  key: SOGO_ADMIN_EMAIL
            - name: SOGO_ADMIN_CN
              valueFrom:
                secretKeyRef:
                  name: sogo-secrets
                  key: SOGO_ADMIN_CN

      containers:
        - name: sogo
          image: sonroyaalmerol/docker-sogo:5.12.4-3
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - CHOWN
                - DAC_OVERRIDE
                - SETGID
                - SETUID
                - FOWNER
          ports:
            - containerPort: 80
              name: http
          env:
            - name: SOGO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sogo-secrets
                  key: SOGO_DB_PASSWORD
            - name: PGSSLMODE
              value: disable
          volumeMounts:
            - name: sogo-config
              mountPath: /etc/sogo/sogo.conf.d
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /SOGo/
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /SOGo/
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3

      volumes:
        - name: config-template
          configMap:
            name: sogo-config-template
        - name: sogo-config
          emptyDir: {}

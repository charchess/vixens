---
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: stalwart-secrets-sync
  namespace: stalwart
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  hostAPI: http://192.168.111.69:8085
  resyncInterval: 60
  authentication:
    universalAuth:
      credentialsRef:
        secretName: infisical-universal-auth
        secretNamespace: argocd
      secretsScope:
        projectSlug: vixens
        envSlug: dev
        secretsPath: /apps/60-services/stalwart
  managedSecretReference:
    secretName: stalwart-secrets
    secretNamespace: stalwart
    creationPolicy: Owner

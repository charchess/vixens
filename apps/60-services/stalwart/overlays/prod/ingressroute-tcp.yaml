---
# SMTP (25) — réception courrier entrant (MX)
# Phase 1: MX pointe encore Synology — ce port est préparé mais pas actif
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: stalwart-smtp
  namespace: stalwart
spec:
  entryPoints:
    - smtp
  routes:
    - match: HostSNI(`*`)
      services:
        - name: stalwart
          port: 25
---
# Submission (587) — envoi depuis clients (STARTTLS)
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: stalwart-submission
  namespace: stalwart
spec:
  entryPoints:
    - submission
  routes:
    - match: HostSNI(`*`)
      services:
        - name: stalwart
          port: 587
---
# IMAPS (993) — IMAP over TLS (Velo, Snappymail) — TLS passthrough au niveau spec
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: stalwart-imaps
  namespace: stalwart
spec:
  entryPoints:
    - imaps
  routes:
    - match: HostSNI(`*`)
      services:
        - name: stalwart
          port: 993
  tls:
    passthrough: true

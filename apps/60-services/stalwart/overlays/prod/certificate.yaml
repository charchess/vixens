---
# TLS certificate for Stalwart mail protocols (SMTP STARTTLS + IMAPS)
# Chart mounts this as volume "certificate" → /opt/stalwart/etc/certs/
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: stalwart-cert
  namespace: stalwart
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  secretName: stalwart-cert
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - stalwart.truxonline.com
    - stalwart-admin.truxonline.com

---
# Admin UI — accès restreint, pas d'accès public prévu
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stalwart-admin
  namespace: stalwart
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web, websecure
    traefik.ingress.kubernetes.io/router.middlewares: traefik-redirect-https@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Services
    gethomepage.dev/name: Stalwart Mail
    gethomepage.dev/icon: stalwart.svg
    gethomepage.dev/description: Mail Server Admin
spec:
  ingressClassName: traefik
  rules:
    - host: stalwart-admin.truxonline.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stalwart
                port:
                  number: 80
  tls:
    - hosts:
        - stalwart-admin.truxonline.com
      secretName: stalwart-admin-tls
---
# JMAP / Webmail HTTP endpoint
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stalwart-http-redirect
  namespace: stalwart
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: traefik-redirect-https@kubernetescrd
    external-dns.alpha.kubernetes.io/target: truxonline.com
spec:
  ingressClassName: traefik
  rules:
    - host: stalwart.truxonline.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stalwart
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stalwart-jmap
  namespace: stalwart
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    external-dns.alpha.kubernetes.io/target: truxonline.com
    external-dns.alpha.kubernetes.io/public: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: stalwart.truxonline.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stalwart
                port:
                  number: 80
  tls:
    - hosts:
        - stalwart.truxonline.com
      secretName: stalwart-jmap-tls

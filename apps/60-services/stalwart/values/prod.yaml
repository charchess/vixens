---
# Stalwart Mail Server — Helm values (prod)
# Chart: oci://codeberg.org/wrenix/helm-charts stalwart-mail v1.0.5
# Phase 1: RocksDB (tout-en-un sur PVC), PostgreSQL + MinIO en Phase 2
# Docs: https://stalw.art/docs/ | https://wrenix.eu/docs/helm-charts/stalwart-mail/

fullnameOverride: stalwart

replicaCount: 1  # Clustering non supporté, garder à 1

image:
  registry: ghcr.io
  repository: stalwartlabs/stalwart
  tag: "v0.15.5"
  pullPolicy: IfNotPresent

# ============================================================================
# Admin credentials — injectées via Secret (Infisical)
# ============================================================================
env:
  - name: STALWART_ADMIN_SECRET
    valueFrom:
      secretKeyRef:
        name: stalwart-secrets
        key: STALWART_ADMIN_PASSWORD

# ============================================================================
# Persistence — PVC iSCSI Synology (Phase 1: tout sur PVC)
# /opt/stalwart : config.toml, RocksDB data, blobs, certs ACME
# ============================================================================
persistence:
  enabled: true
  storageClassName: synelia-iscsi-retain
  accessMode: ReadWriteOnce
  size: 20Gi

# ============================================================================
# Service — ClusterIP uniquement, Traefik gère l'exposition externe
# ============================================================================
service:
  type: ClusterIP

# ============================================================================
# Resources — defense-in-depth + sizing label (Kyverno override)
# ============================================================================
podLabels:
  vixens.io/sizing.stalwart: V-medium

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 2Gi

# ============================================================================
# Probes — Stalwart health endpoints
# ============================================================================
livenessProbe:
  httpGet:
    path: /healthz/live
    port: 8080
    scheme: HTTP
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /healthz/ready
    port: 8080
    scheme: HTTP
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5

# ============================================================================
# Strategy — Recreate obligatoire avec RWO PVC
# ============================================================================
strategy:
  type: Recreate

# ============================================================================
# Tolerations — autoriser scheduling sur control-plane
# ============================================================================
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

# ============================================================================
# Certificate TLS (chart génère une Certificate cert-manager pour stalwart-cert)
# ============================================================================
certificate:
  dnsNames:
    - stalwart.truxonline.com
    - stalwart-admin.truxonline.com

# ============================================================================
# Annotations pod
# ============================================================================
podAnnotations:
  vixens.io/sizing-rationale: "V-medium: mail server, RocksDB in-process"
  prometheus.io/scrape: "false"  # Stalwart metrics via /metrics si activé

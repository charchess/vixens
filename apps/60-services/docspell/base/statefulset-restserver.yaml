---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: docspell-restserver
  labels:
    app: docspell
    component: restserver
spec:
  serviceName: docspell-restserver
  replicas: 1
  selector:
    matchLabels:
      app: docspell
      component: restserver
  template:
    metadata:
      labels:
        app: docspell
        component: restserver
        vixens.io/sizing.restserver: V-medium
        vixens.io/sizing.consumedir: V-nano
        vixens.io/backup-profile: standard
      annotations:
        vixens.io/no-long-connections: "true"

    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      priorityClassName: vixens-medium
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: restserver
          image: ghcr.io/docspell/restserver:v0.43.0
          imagePullPolicy: IfNotPresent
          args:
            - /opt/docspell.conf
          ports:
            - name: api
              containerPort: 7880
              protocol: TCP
          env:
            - name: JAVA_OPTS
              value: -Xmx1024m -Xms512m
            - name: JDBC_URI
              value: jdbc:postgresql://postgresql-shared-rw.databases.svc.cluster.local:5432/docspell
            - name: JDBC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: docspell-db-credentials
                  key: username
            - name: JDBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: docspell-db-credentials
                  key: password
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: docspell-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: docspell-secrets
                  key: MINIO_SECRET_KEY
            - name: INTEGRATION_SECRET
              valueFrom:
                secretKeyRef:
                  name: docspell-secrets
                  key: INTEGRATION_SECRET
          livenessProbe:
            httpGet:
              path: /api/info/version
              port: api
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/info/version
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/info/version
              port: api
            failureThreshold: 20
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /opt/docspell.conf
              subPath: config
        - name: consumedir
          image: ghcr.io/docspell/dsc:v0.43.0
          imagePullPolicy: IfNotPresent
          args:
            - -d
            - http://localhost:7880
            - upload
            - --poll
            - 30s
            - -r
            - --delete
            - -i
            - --header
            - "Docspell-Integration:$(INTEGRATION_SECRET)"
            - /var/inbox
          env:
            - name: INTEGRATION_SECRET
              valueFrom:
                secretKeyRef:
                  name: docspell-secrets
                  key: INTEGRATION_SECRET
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: nfs-inbox
              mountPath: /var/inbox
      volumes:
        - name: config
          configMap:
            name: docspell-restserver-config
        - name: nfs-inbox
          nfs:
            server: 192.168.111.69
            path: /volume3/Internal/incoming/docspell

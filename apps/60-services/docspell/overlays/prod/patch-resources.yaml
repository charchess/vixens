---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: docspell-joex
  labels:
    vixens.io/sizing: G-large
spec:
  template:
    metadata:
      labels:
        vixens.io/sizing: G-large
    spec:
      priorityClassName: vixens-medium
      containers:
        - name: joex
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: docspell-restserver
  labels:
    vixens.io/sizing: G-large
spec:
  template:
    metadata:
      labels:
        vixens.io/sizing: G-large
    spec:
      priorityClassName: vixens-medium
      containers:
        - name: restserver
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi

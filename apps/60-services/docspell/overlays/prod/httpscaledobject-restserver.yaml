---
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: docspell-restserver
  namespace: services
spec:
  hosts:
    - docspell.truxonline.com
  pathPrefixes:
    - /
  scaleTargetRef:
    name: docspell-restserver
    kind: StatefulSet
    service: docspell-restserver
    port: 7880
  replicas:
    min: 0
    max: 1
  scaledownPeriod: 300

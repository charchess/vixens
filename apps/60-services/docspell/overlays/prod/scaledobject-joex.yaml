---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: docspell-joex
  namespace: services
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: docspell-joex
  minReplicaCount: 0
  maxReplicaCount: 1
  cooldownPeriod: 120
  triggers:
    # Scale up when jobs are pending/running in the queue
    - type: postgresql
      metadata:
        host: postgresql-shared-rw.databases.svc.cluster.local
        port: "5432"
        dbName: docspell
        query: "SELECT COUNT(*) FROM job WHERE state IN ('waiting', 'running', 'stuck')"
        targetQueryValue: "1"
        activationTargetQueryValue: "1"
        sslmode: disable
      authenticationRef:
        name: docspell-pg-auth
    # Nightly fallback: scan watched folders even if n8n didn't trigger
    - type: cron
      metadata:
        timezone: Europe/Paris
        start: "0 2 * * *"
        end: "0 6 * * *"
        desiredReplicas: "1"

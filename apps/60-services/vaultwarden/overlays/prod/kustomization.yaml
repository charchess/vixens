---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
  - ingress.yaml
components:
  - ../../../../_shared/components/sync-wave/wave-7
  - ../../../../_shared/components/goldilocks/enabled
  - ../../../../_shared/components/nometrics
  - ../../../../_shared/components/dataangel

patches:
  - path: infisical-patch.yaml
    target:
      kind: InfisicalSecret
      name: vaultwarden-secrets
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: vaultwarden
  - path: dataangel.yaml
  - patch: |-
      - op: replace
        path: /spec/storageClassName
        value: local-path-retain
    target:
      kind: PersistentVolumeClaim
      name: vaultwarden-data-pvc

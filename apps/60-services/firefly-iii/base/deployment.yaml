---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firefly-iii
  labels:
    app.kubernetes.io/name: firefly-iii
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: firefly-iii
  template:
    metadata:
      labels:
        app.kubernetes.io/name: firefly-iii
        vixens.io/sizing.firefly-iii: V-medium
        vixens.io/backup-profile: standard
      annotations:
        reloader.stakater.com/auto: "true"
        vixens.io/health-bump: "5"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
        vixens.io/service-binding: "false"
        vixens.io/fast-start: "true"
    spec:
      priorityClassName: vixens-medium
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers: []
      containers:
        - name: firefly-iii
          image: fireflyiii/core:version-6.4.16
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: APP_KEY
              valueFrom:
                secretKeyRef:
                  name: firefly-iii-secrets
                  key: APP_KEY
            - name: APP_URL
              value: "https://firefly.truxonline.com"
            - name: TRUSTED_PROXIES
              value: "*"
            - name: DB_CONNECTION
              value: pgsql
            - name: DB_HOST
              value: postgresql-shared-rw.databases.svc.cluster.local
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: firefly_iii
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: firefly-iii-secrets
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: firefly-iii-secrets
                  key: password
            - name: APP_ENV
              value: local
            - name: APP_DEBUG
              value: "false"
            - name: SITE_OWNER
              value: "admin@truxonline.com"
            - name: TZ
              value: "Europe/Paris"
          securityContext:
            runAsNonRoot: true
            runAsUser: 33
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "3"]
          volumeMounts:
            - name: static
              mountPath: /var/www/html/storage/upload
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: static
          emptyDir: {}

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: firefly-iii
  labels:
    app.kubernetes.io/managed-by: argocd
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Finance
    gethomepage.dev/name: Firefly III
    gethomepage.dev/icon: firefly-iii.svg
    gethomepage.dev/description: Personal finance manager
spec:
  ingressClassName: traefik
  rules:
    - host: firefly.truxonline.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: firefly-iii
                port:
                  name: http
  tls:
    - hosts:
        - firefly.truxonline.com
      secretName: firefly-iii-tls

---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: firefly-iii
  namespace: finance
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: firefly-iii
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # remote-node: cross-node Traefik traffic via VXLAN loses pod identity
    - fromEntities:
        - remote-node
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: monitoring

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics
  namespace: argocd
  labels:
    vixens.lab/environment: prod
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  project: default
  sources:
    - repoURL: https://victoriametrics.github.io/helm-charts
      chart: victoria-metrics-k8s-stack
      targetRevision: 0.72.5
      helm:
        releaseName: victoria-metrics
        valueFiles:
          - $values/apps/02-monitoring/victoria-metrics/base/values.yaml
    - repoURL: https://github.com/charchess/vixens.git
      targetRevision: prod-stable
      ref: values
    - repoURL: https://github.com/charchess/vixens.git
      targetRevision: prod-stable
      path: apps/02-monitoring/victoria-metrics/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: victoria-metrics-victoria-metrics-operator-admission
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
    - group: ""
      kind: Secret
      name: victoria-metrics-victoria-metrics-operator-validation
      namespace: monitoring
      jqPathExpressions:
        - .data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  sources:
    # Helm chart for Kyverno
    - repoURL: https://kyverno.github.io/kyverno/
      chart: kyverno
      targetRevision: 3.4.0
      helm:
        releaseName: kyverno
        values: |
          admissionController:
            replicas: 3
            webhookTimeout: 30
            container:
              failurePolicy: Ignore
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
            resources:
              requests:
                cpu: 500m
                memory: 512Mi
              limits:
                cpu: "1"
                memory: 1Gi
            podAnnotations:
              prometheus.io/scrape: "true"
              prometheus.io/port: "8000"
              prometheus.io/path: "/metrics"
            rbac:
              clusterRole:
                extraResources:
                  - apiGroups: [""]
                    resources: ["secrets"]
                    verbs: ["get"]

          backgroundController:
            replicas: 1
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi
            podAnnotations:
              prometheus.io/scrape: "true"
              prometheus.io/port: "8000"
              prometheus.io/path: "/metrics"

          cleanupController:
            replicas: 1
            rbac:
              clusterRole:
                extraResources:
                  - apiGroups: [""]
                    resources: ["pods"]
                    verbs: ["delete", "list"]
                  - apiGroups: ["apps"]
                    resources: ["replicasets"]
                    verbs: ["delete", "list"]
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi
            podAnnotations:
              prometheus.io/scrape: "true"
              prometheus.io/port: "8000"
              prometheus.io/path: "/metrics"

          reportsController:
            replicas: 1
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi
            podAnnotations:
              prometheus.io/scrape: "true"
              prometheus.io/port: "8000"
              prometheus.io/path: "/metrics"

          webhooksCleanup:
            enabled: true
            image:
              tag: latest
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule

          policyReportsCleanup:
            enabled: true
            image:
              tag: latest
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule

          crds:
            migration:
              tolerations:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
                  effect: NoSchedule

          features:
            policyExceptions:
              enabled: true
              namespace: kyverno
    # Policies from git repo
    - repoURL: https://github.com/charchess/vixens.git
      targetRevision: prod-stable
      path: apps/00-infra/kyverno/base/policies
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  ignoreDifferences:
    - group: kyverno.io
      kind: ClusterPolicy
      jqPathExpressions:
        - .spec.admission
        - .spec.emitWarning
        - .spec.rules[].skipBackgroundRequests
        - .spec.rules[].validate.allowExistingViolations
        - .spec.rules[].context[]?.apiCall.method
        - .spec.rules[].validate.foreach[]?.context[]?.apiCall.method
        - .spec.rules[].match.any[].resources.group
        - .spec.rules[].match.any[].resources.namespaces
        - .spec.rules[].match.any[].resources.namespaceSelector
        - .spec.rules[].match.all[].resources.group
        - .spec.rules[].match.all[].resources.namespaces
      jsonPointers:
        - /status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - Replace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

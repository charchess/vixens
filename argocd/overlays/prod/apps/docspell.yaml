---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: docspell
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "11" # After postgresql-shared (wave 4)
spec:
  project: default
  source:
    repoURL: https://github.com/charchess/vixens.git
    targetRevision: prod-stable
    path: apps/60-services/docspell/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: services
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/replicas
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

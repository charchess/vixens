---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infisical-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3" # Deployed before sealed-secrets (-1) and cilium-lb (-2)
  labels:
    app.kubernetes.io/part-of: vixens
    app.kubernetes.io/component: secrets-management
spec:
  project: default
  sources:
    # Helm chart
    - repoURL: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/
      chart: secrets-operator
      targetRevision: 0.10.26
      helm:
        values: |
            controllerManager:
              manager:
                image:
                  repository: infisical/kubernetes-operator
                  tag: v0.10.26
                # NOTE: chart does not support priorityClassName — applied via kustomize JSON6902 patch
                resources:
                  limits:
                    cpu: 500m
                    memory: 256Mi
                  requests:
                    cpu: 10m
                    memory: 64Mi
              tolerations:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
                  effect: NoSchedule
              podAnnotations:
                vixens.io/no-long-connections: "true"
                vixens.io/nometrics: "true"
              podLabels:
                vixens.io/sizing.manager: G-small
    # Kustomize overlay for pod annotations (chart has no podAnnotations support)
    - repoURL: https://github.com/charchess/vixens.git
      targetRevision: prod-stable
      path: apps/00-infra/infisical-operator/overlays/prod
      kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: infisical-operator-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

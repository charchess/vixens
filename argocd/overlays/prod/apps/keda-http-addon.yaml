---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda-http-addon
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://kedacore.github.io/charts
      chart: keda-add-ons-http
      targetRevision: 0.13.0
      helm:
        valueFiles:
          - $values/apps/00-infra/keda-http-addon/values/common.yaml
    - repoURL: https://github.com/charchess/vixens.git
      targetRevision: prod-stable
      ref: values
    - repoURL: https://github.com/charchess/vixens.git
      targetRevision: prod-stable
      path: apps/00-infra/keda-http-addon/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: keda
  # keda-add-ons-http chart v0.13.x ignores per-component podLabels (priority + sizing).
  # priorityClassName and sizing labels are injected at Deployment admission by
  # mutate-priority-class Rule 13 and mutate-pod-annotations Rules 7-9.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/spec/priorityClassName
        - /spec/template/metadata/labels/vixens.io~1sizing.keda-add-ons-http-operator
        - /spec/template/metadata/labels/vixens.io~1sizing.keda-add-ons-http-external-scaler
        - /spec/template/metadata/labels/vixens.io~1sizing.keda-add-ons-http-interceptor
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true

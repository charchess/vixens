---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crowdsec
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: crowdsec
  sources:
    - repoURL: https://crowdsecurity.github.io/helm-charts
      chart: crowdsec
      targetRevision: 0.22.1
      helm:
        valueFiles:
          - $values/apps/00-infra/crowdsec/values/common.yaml
          - $values/apps/00-infra/crowdsec/values/prod.yaml
    - repoURL: https://github.com/charchess/vixens.git
      targetRevision: prod-stable
      ref: values
    - repoURL: https://github.com/charchess/vixens.git
      targetRevision: prod-stable
      path: apps/00-infra/crowdsec/overlays/prod
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: crowdsec-lapi
      namespace: crowdsec
      jsonPointers:
        - /metadata/annotations/goldilocks.fairwinds.com~1enabled
        - /metadata/annotations/vpa.kubernetes.io~1updateMode
        - /metadata/annotations/argocd.argoproj.io~1sync-wave
        - /spec/template/metadata/annotations/kubectl.kubernetes.io~1restartedAt
        - /spec/template/spec/tolerations
        - /metadata/labels/vixens.io~1maturity
        - /metadata/labels/vixens.io~1maturity-missing
    - group: apps
      kind: DaemonSet
      name: crowdsec-agent
      namespace: crowdsec
      jsonPointers:
        - /spec/template/spec/priorityClassName
        - /spec/template/spec/priority
    - group: ""
      kind: Secret
      name: crowdsec-lapi-secrets
      namespace: crowdsec
      jsonPointers:
        - /data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

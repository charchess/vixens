---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: policy-reporter
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "8"
spec:
  project: default
  sources:
    # Helm chart
    - repoURL: https://kyverno.github.io/policy-reporter
      chart: policy-reporter
      targetRevision: 2.24.2
      helm:
        releaseName: policy-reporter
        values: |
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule

          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

          podAnnotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "2112"
            prometheus.io/path: "/metrics"
            vixens.io/fast-start: "true"
            vixens.io/service-binding: "false"
          annotations:  # Deployment metadata (Gold maturity)
            argocd.argoproj.io/sync-wave: "10"
            goldilocks.fairwinds.com/enabled: "true"
            vpa.kubernetes.io/updateMode: "Off"
          revisionHistoryLimit: 3

          podLabels:
            vixens.io/sizing.policy-reporter: small
            vixens.io/sizing: small
            vixens.io/priority-class: vixens-low
          kyvernoPlugin:
            enabled: true
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
            podAnnotations:
              vixens.io/fast-start: "true"
              vixens.io/service-binding: "false"
              prometheus.io/scrape: "true"
              prometheus.io/port: "8080"
              prometheus.io/path: "/metrics"
            podLabels:
              vixens.io/priority-class: vixens-low
            annotations:  # Deployment metadata (Gold maturity)
              argocd.argoproj.io/sync-wave: "10"
              goldilocks.fairwinds.com/enabled: "true"
              vpa.kubernetes.io/updateMode: "Off"
            revisionHistoryLimit: 3

          ui:
            enabled: true
            revisionHistoryLimit: 3
            tolerations:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
                effect: NoSchedule
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
            podLabels:
              vixens.io/priority-class: vixens-low
            podAnnotations:
              vixens.io/fast-start: "true"
              vixens.io/service-binding: "false"
              vixens.io/nometrics: "true"
            annotations:  # Deployment metadata (Gold maturity)
              argocd.argoproj.io/sync-wave: "10"
              goldilocks.fairwinds.com/enabled: "true"
              vpa.kubernetes.io/updateMode: "Off"

          rest:
            enabled: true

          metrics:
            enabled: true

          logging:
            logSize: 500

          reportFilter:
            namespaces:
              exclude:
                - kube-system
                - kyverno
                - policy-reporter
    # Ingress from git repo
    - repoURL: https://github.com/charchess/vixens.git
      targetRevision: prod-stable
      path: apps/00-infra/policy-reporter/overlays/prod
      kustomize: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: policy-reporter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: it-tools
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  project: default
  sources:
    - repoURL: https://charts.jeffresc.dev
      chart: it-tools
      targetRevision: 0.1.4
      helm:
        releaseName: it-tools
        valueFiles:
          - $values/apps/70-tools/it-tools/base/values.yaml
    - repoURL: https://github.com/charchess/vixens.git
      targetRevision: prod-stable
      ref: values
    - repoURL: https://github.com/charchess/vixens.git
      targetRevision: prod-stable
      path: apps/70-tools/it-tools/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: tools
  # jeffresc/it-tools chart v0.1.4 does not propagate priorityClassName to pod template spec.
  # priorityClassName is injected at Deployment admission by mutate-priority-class Rule 10
  # (generic Deployment rule for apps using vixens.io/priority-class podLabel).
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
        - /spec/template/spec/priorityClassName
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
